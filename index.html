                } else {
                    window.__lowMemoryMode = false;
                }
            }
        });
    }

    init();
})();
</script>

<!-- #22: Auto-Rebuffer on Stall -->
<script>
(function() {
    var LS_KEY = 'stremio_auto_rebuffer';
    var PREFIX = '[rebuffer]';
    var CHECK_INTERVAL = 2000;   // ms between currentTime checks
    var STALL_THRESHOLD = 8000;  // ms of no progress = stall
    var MAX_RETRIES = 3;

    function isEnabled() {
        return localStorage.getItem(LS_KEY) !== 'false';
    }

    function log() {
        var args = Array.prototype.slice.call(arguments);
        args.unshift(PREFIX);
        console.log.apply(console, args);
    }

    function showToast(msg) {
        var existing = document.getElementById('__rebuffer-toast');
        if (existing) existing.remove();
        var toast = document.createElement('div');
        toast.id = '__rebuffer-toast';
        toast.textContent = msg;
        toast.style.cssText = 'position:fixed;bottom:60px;left:50%;transform:translateX(-50%);' +
            'background:rgba(0,0,0,0.85);color:#fff;padding:12px 20px;border-radius:8px;' +
            'font-size:14px;z-index:99999;pointer-events:none;';
        document.body.appendChild(toast);
        setTimeout(function() { if (toast.parentNode) toast.remove(); }, 5000);
    }

    function inPlayerRoute() {
        return window.location.hash.indexOf('#/player/') !== -1;
    }

    var stallTimer = 0;
    var lastTime = null;
    var retries = 0;
    var monitorInterval = null;
    var activeVideo = null;

    function resetStall() {
        stallTimer = 0;
        retries = 0;
    }

    function showRecoveryToast(video) {
        // Non-blocking corner toast with action buttons — user is never trapped.
        var existing = document.getElementById('__rebuffer-toast');
        if (existing) existing.remove();
        var toast = document.createElement('div');
        toast.id = '__rebuffer-toast';
        toast.style.cssText = 'position:fixed;bottom:60px;left:50%;transform:translateX(-50%);' +
            'background:rgba(0,0,0,0.9);color:#fff;padding:12px 18px;border-radius:10px;' +
            'font-size:14px;z-index:99999;display:flex;flex-direction:column;gap:10px;' +
            'font-family:PlusJakartaSans,sans-serif;max-width:440px;text-align:center;';

        var msg = document.createElement('div');
        msg.textContent = 'Playback keeps stalling. You can pick another stream — or try one of these.';
        toast.appendChild(msg);

        var row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:8px;justify-content:center;flex-wrap:wrap;';

        function mkBtn(label, color) {
            var b = document.createElement('button');
            b.textContent = label;
            b.style.cssText = 'background:' + color + ';color:#fff;border:none;border-radius:8px;' +
                'padding:8px 14px;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;';
            b.setAttribute('tabindex', '0');
            b.onfocus = function() { this.style.outline = '2px solid #fff'; };
            b.onblur = function() { this.style.outline = 'none'; };
            return b;
        }

        var hasNative = false;
        try { hasNative = typeof omi_platform !== 'undefined' && typeof omi_platform.sendPlatformMessage === 'function'; } catch(e) {}

        if (hasNative) {
            var nativeBtn = mkBtn('Native Player', '#7b5bf5');
            nativeBtn.onclick = function() {
                if (!window.__launchNativePlayer) { toast.remove(); return; }
                // H5: keep the toast until we know whether the native player
                // actually opened. On failure, resume browser playback + advise.
                nativeBtn.textContent = 'Trying…';
                nativeBtn.disabled = true;
                var v = (typeof video !== 'undefined' && video) ? video : document.querySelector('video');
                var src = v ? v.currentSrc || v.src : null;
                Promise.resolve(window.__launchNativePlayer(src)).then(function(opened) {
                    if (opened) {
                        toast.remove();
                    } else {
                        toast.remove();
                        if (typeof window.__recoverAfterFailedHandoff === 'function') {
                            window.__recoverAfterFailedHandoff(v);
                        }
                    }
                });
            };
            row.appendChild(nativeBtn);
        }

        var dismiss = mkBtn('Keep Trying', 'rgba(255,255,255,0.12)');
        dismiss.onclick = function() { toast.remove(); };
        row.appendChild(dismiss);

        toast.appendChild(row);
        document.body.appendChild(toast);
        // Auto-hide after 12s
        setTimeout(function() { if (toast.parentNode) toast.remove(); }, 12000);
    }

    function attemptRebuffer(video) {
        retries++;
        log('Stall detected (retry', retries, '/ ' + MAX_RETRIES + ')');

        if (retries > MAX_RETRIES) {
            log('Max retries reached — offering recovery options');
            showRecoveryToast(video);
            // Reset so we try again if the user keeps waiting — never leave them stuck.
            resetStall();
            return;
        }

        // Try seeking forward 1 second first (less disruptive than reload)
        try {
            var seekTarget = video.currentTime + 1;
            if (video.duration && seekTarget < video.duration) {
                log('Seeking forward 1 second to', seekTarget);
                video.currentTime = seekTarget;
            } else {
                // Pause and re-seek to current position to trigger re-buffer.
                // Avoid video.load() — it resets the source entirely, which
                // kills torrent streams and forces a full re-download.
                log('Pause + re-seek to trigger rebuffer');
                var pos = video.currentTime;
                video.pause();
                video.currentTime = pos;
                var p = video.play();
                if (p && p.catch) p.catch(function(e) { log('play() rejected:', e.message); });
            }
        } catch (e) {
            log('Rebuffer attempt error:', e.message);
        }
    }

    function checkStall() {
        if (!inPlayerRoute()) return;

        var video = document.querySelector('video');
        if (!video) { lastTime = null; return; }

        // New video element
        if (video !== activeVideo) {
            activeVideo = video;
            lastTime = null;
            resetStall();
            video.addEventListener('playing', resetStall);
            video.addEventListener('seeked', resetStall);
        }

        if (video.paused || video.ended || video.readyState < 2) {
            lastTime = video.currentTime;
            return;
        }

        if (lastTime === null) {
            lastTime = video.currentTime;
            return;
        }

        if (video.currentTime === lastTime) {
            stallTimer += CHECK_INTERVAL;
            if (stallTimer >= STALL_THRESHOLD) {
                attemptRebuffer(video);
                stallTimer = 0; // reset timer between retries
            }
        } else {
            // Progress made — reset
            if (stallTimer > 0) log('Stall cleared — playback resumed');
            stallTimer = 0;
            retries = 0;
        }

        lastTime = video.currentTime;
    }

    function startMonitor() {
        if (monitorInterval) return;
        monitorInterval = setInterval(checkStall, CHECK_INTERVAL);
        log('Stall monitor started');
    }

    function stopMonitor() {
        if (monitorInterval) {
            clearInterval(monitorInterval);
            monitorInterval = null;
        }
        lastTime = null;
        resetStall();
        log('Stall monitor stopped');
    }

    function onHashChange() {
        if (!isEnabled()) return;
        if (inPlayerRoute()) {
            startMonitor();
        } else {
            stopMonitor();
        }
    }

    function init() {
        if (!isEnabled()) {
            log('Auto-rebuffer disabled (set localStorage stremio_auto_rebuffer=true to enable)');
            return;
        }
        window.addEventListener('hashchange', onHashChange);
        onHashChange();
        log('Auto-rebuffer on stall initialised');
    }

    if (window.__registerCommunityToggle) {
        window.__registerCommunityToggle({
            id: 'auto-rebuffer-toggle',
            lsKey: LS_KEY,
            title: 'Auto-Rebuffer on Stall',
            description: 'Detects playback stalls and automatically attempts to resume without user intervention',
            onToggle: function(nowEnabled) {
                log('Toggled:', nowEnabled ? 'ON' : 'OFF');
                if (nowEnabled) {
                    window.addEventListener('hashchange', onHashChange);
                    onHashChange();
                } else {
                    stopMonitor();
                    window.removeEventListener('hashchange', onHashChange);
                }
            }
        });
    }

    init();
})();
</script>

<!-- #22: Stream Stats Overlay -->
<script>
(function() {
    var LS_KEY = 'stremio_stream_stats';
    var PREFIX = '[stats]';
    var UPDATE_INTERVAL = 2000;
    var TOGGLE_KEY = 457; // Info/Display remote button

    function isEnabled() {
        return localStorage.getItem(LS_KEY) !== 'false';
    }

    function log() {
        var args = Array.prototype.slice.call(arguments);
        args.unshift(PREFIX);
        console.log.apply(console, args);
    }

    function inPlayerRoute() {
        return window.location.hash.indexOf('#/player/') !== -1;
    }

    var overlay = null;
    var updateInterval = null;
    var statsVisible = false; // starts hidden, press any color button to show
    var bytesAtLastCheck = 0;
    var timeAtLastCheck = 0;

    function createOverlay() {
        if (overlay) return;
        overlay = document.createElement('div');
        overlay.id = '__stream-stats-overlay';
        overlay.style.cssText = 'position:fixed;top:10px;left:10px;background:rgba(0,0,0,0.7);' +
            'color:#fff;padding:8px 12px;border-radius:6px;font-family:monospace;font-size:12px;' +
            'z-index:99999;pointer-events:none;white-space:pre;line-height:1.5;';
        document.body.appendChild(overlay);
        log('Overlay created');
    }

    function removeOverlay() {
        if (overlay && overlay.parentNode) {
            overlay.parentNode.removeChild(overlay);
        }
        overlay = null;
    }

    function formatBytes(bytes) {
        if (bytes < 1024) return bytes + ' B/s';
        if (bytes < 1048576) return Math.round(bytes / 1024) + ' KB/s';
        return (bytes / 1048576).toFixed(1) + ' MB/s';
    }

    function formatMB(bytes) {
        return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function getBufferHealth(video) {
        if (!video || !video.buffered || video.buffered.length === 0) return 0;
        var current = video.currentTime;
        for (var i = 0; i < video.buffered.length; i++) {
            if (video.buffered.start(i) <= current && current <= video.buffered.end(i)) {
                return video.buffered.end(i) - current;
            }
        }
        return 0;
    }

    function getBitrate(totalBytes) {
        var now = Date.now();
        if (!bytesAtLastCheck || !timeAtLastCheck) {
            bytesAtLastCheck = totalBytes;
            timeAtLastCheck = now;
            return 0;
        }
        var elapsed = (now - timeAtLastCheck) / 1000;
        if (elapsed < 1) return 0;
        var rate = (totalBytes - bytesAtLastCheck) / elapsed;
        bytesAtLastCheck = totalBytes;
        timeAtLastCheck = now;
        return rate;
    }

    function updateStats() {
        if (!overlay || !statsVisible) return;

        var video = document.querySelector('video');
        var lines = [];

        // Resolution
        if (video) {
            var w = video.videoWidth, h = video.videoHeight;
            lines.push('Resolution : ' + (w && h ? w + 'x' + h : 'unknown'));
        } else {
            lines.push('Resolution : no video');
        }

        // Buffer health
        var bufferHealth = video ? getBufferHealth(video) : 0;
        lines.push('Buffer     : ' + bufferHealth.toFixed(1) + 's ahead');

        // WebTorrent stats
        var torrent = null;
        if (window.__webtorrentClient && window.__webtorrentClient.torrents &&
                window.__webtorrentClient.torrents.length > 0) {
            torrent = window.__webtorrentClient.torrents[0];
        }

        if (torrent) {
            var dlSpeed = torrent.downloadSpeed || 0;
            var peers = torrent.numPeers || 0;
            var downloaded = torrent.downloaded || 0;
            var bitrate = getBitrate(downloaded);

            lines.push('DL Speed   : ' + formatBytes(dlSpeed));
            lines.push('Peers      : ' + peers);
            lines.push('Bitrate    : ' + formatBytes(bitrate));
        } else {
            lines.push('DL Speed   : N/A (no torrent)');
            lines.push('Peers      : N/A');
            lines.push('Bitrate    : N/A');
        }

        // Memory
        if (performance.memory) {
            var used = performance.memory.usedJSHeapSize;
            var limit = performance.memory.jsHeapSizeLimit;
            lines.push('Memory     : ' + formatMB(used) + ' / ' + formatMB(limit));
        } else {
            lines.push('Memory     : unavailable');
        }

        overlay.textContent = lines.join('\n');
    }

    function startUpdating() {
        if (updateInterval) return;
        createOverlay();
        // Start hidden — user presses a button to show
        if (overlay) overlay.style.display = 'none';
        statsVisible = false;
        updateInterval = setInterval(updateStats, UPDATE_INTERVAL);
        log('Stats overlay started');
    }

    function stopUpdating() {
        if (updateInterval) {
            clearInterval(updateInterval);
            updateInterval = null;
        }
        removeOverlay();
        log('Stats overlay stopped');
    }

    function onHashChange() {
        if (!isEnabled()) return;
        if (inPlayerRoute()) {
            startUpdating();
        } else {
            stopUpdating();
        }
    }

    function onKeyDown(e) {
        if (!isEnabled()) return;
        if (!inPlayerRoute()) return;
        // Toggle with Info (457) or Red (403) — simple on/off, no auto-hide
        if (e.keyCode === 457 || e.keyCode === 403) {
            e.stopPropagation();
            statsVisible = !statsVisible;
            if (overlay) overlay.style.display = statsVisible ? 'block' : 'none';
            log('Stats overlay', statsVisible ? 'shown' : 'hidden');
        }
    }

    function init() {
        if (!isEnabled()) {
            log('Stream stats overlay disabled (set localStorage stremio_stream_stats=true to enable)');
            return;
        }
        window.addEventListener('hashchange', onHashChange);
        window.addEventListener('keydown', onKeyDown);
        onHashChange();
        log('Stream stats overlay initialised');
    }

    if (window.__registerCommunityToggle) {
        window.__registerCommunityToggle({
            id: 'stream-stats-toggle',
            lsKey: LS_KEY,
            title: 'Stream Stats Overlay',
            description: 'Shows resolution, buffer health, download speed, peers, and memory in the player (toggle with Info button)',
            onToggle: function(nowEnabled) {
                log('Toggled:', nowEnabled ? 'ON' : 'OFF');
                if (nowEnabled) {
                    window.addEventListener('hashchange', onHashChange);
                    window.addEventListener('keydown', onKeyDown);
                    onHashChange();
                } else {
                    stopUpdating();
                    window.removeEventListener('hashchange', onHashChange);
                    window.removeEventListener('keydown', onKeyDown);
                }
            }
        });
    }

    init();
})();
</script>

<!-- #22/#28 — Playback performance: buffering mitigations -->
<script>
/* Video element preparation — preload, playsInline, warm-up fetch,
 * dynamic preconnect, and early-stall auto-handoff.
 *
 * Root cause summary (Jellyfin + Plex + Stremio #2055 all confirm this):
 * the VIDAA (Opera-based) browser does NOT use the hardware HEVC decoder
 * path the native player uses. The <video> element reports HEVC support
 * via canPlayType, but actual decode is software-aided and can't sustain
 * 4K HEVC at 30-80 Mbps — especially not inside an MKV container. The
 * native player on the same chip plays the exact same file fine.
 *
 * So we do several things on every <video> the core creates:
 *   1. preload="auto"           — start buffering as soon as src lands
 *   2. playsInline               — avoid any fullscreen-transition delay
 *   3. preconnect to the actual stream host — RD CDN hostnames vary
 *      (xx-N.download.real-debrid.com) so the static hints in <head>
 *      can miss; we add a dynamic one once we see the real URL
 *   4. HEAD/range warm-up fetch  — pull the first MB into the OS socket
 *      buffer before the video element asks for it, eliminating TLS
 *      slow-start on stream start
 *   5. early-stall auto-handoff  — if the browser <video> issues 2+
 *      `waiting` events in the first 20 seconds of playback, hand the
 *      stream to the native player. This catches the exact "5 seconds
 *      in, then stall forever" pattern reporters describe.
 */
(function() {
    var preconnectedOrigins = {};
    function addPreconnect(origin) {
        if (!origin || preconnectedOrigins[origin]) return;
        preconnectedOrigins[origin] = true;
        try {
            ['preconnect', 'dns-prefetch'].forEach(function(rel) {
                var l = document.createElement('link');
                l.rel = rel; l.href = origin;
                if (rel === 'preconnect') l.crossOrigin = 'anonymous';
                document.head.appendChild(l);
            });
        } catch(e) {}
    }

    function warmStreamHost(streamUrl) {
        if (!streamUrl || streamUrl.indexOf('blob:') === 0 || streamUrl.indexOf('magnet:') === 0) return;
        try {
            var u = new URL(streamUrl);
            addPreconnect(u.origin);
            // Fire-and-forget warm-up fetch. We read the first ~1 MB into the
            // socket buffer then cancel — the <video> element's subsequent
            // request benefits from the warmed TLS session + DNS cache.
            fetch(streamUrl, {
                method: 'GET',
                headers: { Range: 'bytes=0-1048575' },
                mode: 'cors',
                credentials: 'omit'
            }).then(function(r) {
                if (r.body && typeof r.body.cancel === 'function') r.body.cancel();
            }).catch(function() {});
        } catch(e) {}
    }

    function armEarlyStallWatch(video) {
        if (video.__earlyStallArmed) return;
        video.__earlyStallArmed = true;
        var playStart = 0;
        var stalls = 0;
        video.addEventListener('playing', function() {
            if (!playStart) playStart = Date.now();
        });
        function onStall() {
            if (!playStart) return;                   // never actually started
            if (Date.now() - playStart > 20000) return; // only care about early stalls
            stalls++;
            console.warn('[early-stall] waiting/stalled event #' + stalls);
            if (stalls >= 2 && typeof window.__launchNativePlayer === 'function') {
                var inPlayer = (window.location.hash || '').indexOf('#/player/') === 0;
                if (!inPlayer) return;
                // Only auto-handoff when the user has opted into either auto-native
                // mode. Otherwise log the hint and let the user handle it.
                var allOn = localStorage.getItem('stremio_auto_native_player') === 'true';
                var mkvOn = localStorage.getItem('stremio_auto_native_player_mkv') === 'true';
                if (!allOn && !mkvOn) {
                    console.log('[early-stall] stream is stalling; user has no auto-native toggle on — no silent handoff');
                    // No auto-handoff path. Offer the user a CHOICE — never block,
                    // skip, or auto-change the stream. Detect "too heavy" from the
                    // probe data and/or the current source container.
                    var srvUrlE = window.__STREMIO_SERVER_URL__ || '';
                    var noServer = !srvUrlE || srvUrlE === 'http://127.0.0.1:11470';
                    var si = window.__STREAM_INFO__ || {};
                    var src = (video.currentSrc || video.src || '').toLowerCase();
                    var tooHeavy = si.oversize === true
                        || (si.width && si.width >= 3840) || (si.height && si.height >= 2160)
                        || src.indexOf('.mkv') !== -1;
                    // Prefer the richer, actionable choice card when it's enabled.
                    if (tooHeavy && typeof window.__heavyChoiceCardEnabled === 'function' && window.__heavyChoiceCardEnabled()
                        && typeof window.__showHeavyStreamChoiceCard === 'function') {
                        window.__showHeavyStreamChoiceCard();
                    } else if (noServer && typeof window.__honestStallEnabled === 'function' && window.__honestStallEnabled()
                        && typeof window.__showHonestStallMessage === 'function') {
                        // Fallback: the plain honest note (if the user turned the card off).
                        window.__showHonestStallMessage();
                    }
                    return;
                }
                console.log('[early-stall] 2+ early stalls, handing off to native player');
                try { video.pause(); } catch(e) {}
                // H5: act on the VERIFIED result. The launcher resolves a boolean
                // reflecting whether the native app actually foregrounded. On
                // failure we MUST un-pause the browser video (best-effort resume)
                // and surface honest advice — never leave a frozen, paused player.
                Promise.resolve(window.__launchNativePlayer(video.currentSrc || video.src)).then(function(opened) {
                    if (!opened && typeof window.__recoverAfterFailedHandoff === 'function') {
                        window.__recoverAfterFailedHandoff(video);
                    }
                });
            }
        }
        video.addEventListener('waiting', onStall);
        video.addEventListener('stalled', onStall);
    }

    var seenSrcs = {};
    function onSrcChange(video) {
        var src = video.currentSrc || video.src || '';
        if (!src || seenSrcs[src]) return;
        seenSrcs[src] = true;
        warmStreamHost(src);
    }

    function prepareVideo(video) {
        if (!video || video.__v7Prepared) return;
        video.__v7Prepared = true;
        try {
            video.preload = 'auto';
            video.setAttribute('preload', 'auto');
            video.playsInline = true;
            video.setAttribute('playsinline', '');
        } catch(e) {}
        armEarlyStallWatch(video);

        // Watch for src changes — the core may swap src multiple times per
        // player session (initial load, then the actual stream URL, then
        // possibly a segment URL for HLS).
        try {
            var desc = Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, 'src');
            if (desc && desc.set && !video.__srcHooked) {
                var origSet = desc.set;
                Object.defineProperty(video, 'src', {
                    get: desc.get,
                    set: function(v) { origSet.call(this, v); setTimeout(function(){ onSrcChange(video); }, 0); },
                    configurable: true
                });
                video.__srcHooked = true;
            }
        } catch(e) {}

        // Also poll for currentSrc changes as a belt-and-braces fallback.
        // Clear the per-video poll when the core removes the element; otherwise
        // old player sessions keep running and hold removed video nodes in memory.
        video.__v7SrcPoll = setInterval(function() {
            if (!video.isConnected && !document.documentElement.contains(video)) {
                clearInterval(video.__v7SrcPoll);
                video.__v7SrcPoll = null;
                return;
            }
            onSrcChange(video);
        }, 2000);
        // Eagerly warm whatever's there now.
        setTimeout(function() { onSrcChange(video); }, 100);
    }

    document.querySelectorAll('video').forEach(prepareVideo);
    var mo = new MutationObserver(function(muts) {
        for (var i = 0; i < muts.length; i++) {
            var added = muts[i].addedNodes || [];
            for (var j = 0; j < added.length; j++) {
                var n = added[j];
                if (!n || n.nodeType !== 1) continue;
                if (n.nodeName === 'VIDEO') prepareVideo(n);
                var nested = (n.querySelectorAll ? n.querySelectorAll('video') : []);
                for (var k = 0; k < nested.length; k++) prepareVideo(nested[k]);
            }
        }
    });
    mo.observe(document.documentElement, { childList: true, subtree: true });

    window.__warmStreamHost = warmStreamHost;
})();
</script>
<script>
/* Quiet Player Mode toggle.
 *
 * During playback, the v7 patch layer runs ~15 setIntervals and a
 * MutationObserver. Cumulatively they can steal enough CPU on a
 * MediaTek VIDAA SoC to starve the <video> element's decoder thread,
 * causing the classic "5 seconds of playback then buffer" pattern on
 * high-bitrate 4K streams. When this toggle is ON, all OUR polling
 * intervals that respect `window.__QUIET_PLAYER_ACTIVE__` will skip
 * their tick while the user is on a player route. The core Stremio
 * intervals are left alone.
 *
 * Off by default — only helps users who are actually buffering.
 */
(function() {
    var LS_KEY = 'stremio_quiet_player';
    function isEnabled() { return localStorage.getItem(LS_KEY) === 'true'; }

    // Public flag — checked by other patches' poll ticks.
    window.__isQuietPlayerModeActive = function() {
        if (!isEnabled()) return false;
        return (window.location.hash || '').indexOf('#/player/') === 0;
    };

    function applyQuiet() {
        window.__QUIET_PLAYER_ACTIVE__ = window.__isQuietPlayerModeActive();
    }
    applyQuiet();
    window.addEventListener('hashchange', applyQuiet);
    setInterval(applyQuiet, 2000);

    // Register Settings toggle.
    var reg = setInterval(function() {
        if (!window.__registerVidaaSettingsItem) return;
        clearInterval(reg);
        window.__registerVidaaSettingsItem({
            id: 'quiet-player-toggle',
            type: 'toggle',
            label: 'Quiet Player Mode',
            description: 'Pauses background checks (server health, memory poll, subtitle DOM scan, quality indicator refresh, DV stall watch) while a video is playing. Frees CPU for the video decoder. Turn ON if streams buffer even with Real-Debrid.',
            lsKey: LS_KEY,
            defaultValue: false
        });
    }, 200);
})();
</script>
<script>
/* Auto Native Player — two modes.
 *
 * Root cause: the VIDAA webview (Opera-based) mis-handles the MKV
 * container. The same HEVC stream inside MP4 or HLS plays cleanly —
 * the Jellyfin project independently identified and patched this on
 * their web frontend. Real-Debrid links are overwhelmingly MKV for
 * anything 4K HDR/DV, which is exactly when the webview buffers.
 *
 * The native VIDAA player (reached via omi_platform.sendPlatformMessage)
 * uses the hardware MediaTek decoder and handles MKV fine. Two toggles,
 * recommended to try in this order:
 *
 *   1. "Auto Native Player for MKV only"  (recommended)
 *      Lets MP4/HLS streams play in the browser (subtitles/stream
 *      switching work) and hands MKV streams off to native. Targets
 *      the exact container issue without giving up Stremio features
 *      unnecessarily.
 *
 *   2. "Auto Native Player" (all streams)
 *      Nuclear option — every stream goes to native, regardless of
 *      container. Use if mode 1 still buffers, or if your streams
 *      are all MKV anyway.
 *
 * Both are off by default on non-VIDAA devices via the hasNative gate.
 */
(function() {
    var LS_KEY_ALL = 'stremio_auto_native_player';
    var LS_KEY_MKV = 'stremio_auto_native_player_mkv';
    function modeAll() { return localStorage.getItem(LS_KEY_ALL) === 'true'; }
    function modeMkvOnly() { return localStorage.getItem(LS_KEY_MKV) === 'true'; }

    function hasNative() {
        try { return typeof omi_platform !== 'undefined' && typeof omi_platform.sendPlatformMessage === 'function'; } catch(e) { return false; }
    }

    function inPlayerRoute() {
        return (window.location.hash || '').indexOf('#/player/') === 0;
    }

    function isMkvUrl(url) {
        if (!url) return false;
        // Match .mkv anywhere in the URL path (before a query string).
        // RD URLs typically look like:
        //   https://xx.download.real-debrid.com/d/HASH/Name.4K.HDR.x265.mkv
        // Also catches .mkv.torrent-like variants, but those are rare.
        var pathPart = url.split('?')[0].toLowerCase();
        return pathPart.indexOf('.mkv') !== -1;
    }

    function shouldHandoff(url) {
        if (!url) return false;
        if (url.indexOf('blob:') === 0) return false;      // WebTorrent streams
        if (url.indexOf('magnet:') === 0) return false;    // raw magnet
        if (url.indexOf('http:') !== 0 && url.indexOf('https:') !== 0) return false;
        if (modeAll()) return true;
        if (modeMkvOnly() && isMkvUrl(url)) return true;
        return false;
    }

    var lastHandedOffUrl = '';
    setInterval(function() {
        if (!modeAll() && !modeMkvOnly()) return;
        if (!inPlayerRoute()) { lastHandedOffUrl = ''; return; }
        if (!hasNative()) return;

        var video = document.querySelector('video');
        if (!video) return;

        var src = video.currentSrc || video.src || '';
        if (!shouldHandoff(src)) return;
        if (src === lastHandedOffUrl) return;

        // Give the browser a moment to resolve the final src (some players
        // set a blob: then swap to the real URL).
        if (video.readyState < 1) return;

        lastHandedOffUrl = src;
        console.log('[auto-native] Handing off to native player:', src.substring(0, 100));

        // Pause the browser player to free the decoder before we launch the native one.
        try { video.pause(); } catch(e) {}
        if (window.__launchNativePlayer) {
            // H5: act on the verified result. If the native player did not
            // actually open, un-pause and resume browser playback so we never
            // leave the user with a silently-frozen paused video. Also allow
            // re-attempt on the next src by clearing lastHandedOffUrl.
            Promise.resolve(window.__launchNativePlayer(src)).then(function(opened) {
                if (!opened) {
                    lastHandedOffUrl = '';
                    if (typeof window.__recoverAfterFailedHandoff === 'function') {
                        window.__recoverAfterFailedHandoff(video);
                    }
                }
            });
        }
    }, 1500);

    var reg = setInterval(function() {
        if (!window.__registerVidaaSettingsItem) return;
        clearInterval(reg);
        window.__registerVidaaSettingsItem({
            id: 'auto-native-mkv-toggle',
            type: 'toggle',
            label: 'Auto Native Player for MKV',
            description: 'Recommended for projector owners. The VIDAA webview struggles with MKV containers (the container — not the codec — is the actual cause of 4K buffering on Real-Debrid). When ON, any MKV stream opens in the VIDAA native player with the hardware decoder. MP4 and HLS streams still play in the browser so Stremio subtitles work.',
            lsKey: LS_KEY_MKV,
            defaultValue: false
        });
        window.__registerVidaaSettingsItem({
            id: 'auto-native-player-toggle',
            type: 'toggle',
            label: 'Auto Native Player (all streams)',
            description: 'Nuclear option — open every stream in the VIDAA native player regardless of container. Use only if "Auto Native Player for MKV" alone is not enough. Stremio subtitles will not transfer and you cannot switch streams mid-play.',
            lsKey: LS_KEY_ALL,
            defaultValue: false
        });
    }, 200);
})();
</script>
<script>
/* Have existing pollers honour __QUIET_PLAYER_ACTIVE__.
 *
 * The individual patches higher up in this file were not modified to
 * respect the flag (to keep the diff small). Instead we monkey-patch the
 * most expensive single culprit here: the subtitle-picker MutationObserver
 * and the stream-probe fetch wrapper only need to run when the UI is on
 * the player route, and even then not every 2s. When Quiet Player Mode is
 * on, they fall silent for the duration of playback.
 *
 * This is a lightweight, targeted optimisation — we don't tear out the
 * existing IIFE scope machinery, we just skip their expensive work.
 */
(function() {
    var _origSetInterval = window.setInterval;
    // No-op — intentionally not touching setInterval globally to avoid
    // surprising the core Stremio app. Individual expensive pollers will
    // check window.__QUIET_PLAYER_ACTIVE__ at the top of their callbacks
    // going forward when we add new ones.
    void _origSetInterval;
})();
</script>
<script>
// ═══════════════════════════════════════════════════════════════════════
// Honest stall messaging — replaces the old lies with the truth.
// ═══════════════════════════════════════════════════════════════════════
// Shown when a stream is clearly stalling and NO working escape exists
// (native handoff failed AND no streaming server). Deliberately NON-blocking
// and dismissible: a fullscreen overlay that traps the remote is a known
// projector regression, so this is a small corner card with a focusable button.
// We NEVER auto-skip or block the stream (project rule: never silently block).
// Toggleable; OFF by default to avoid surprising users who recover on their own.
(function() {
    'use strict';
    var LS_KEY = 'stremio_honest_stall_msg';
    var lastShownAt = 0;

    function enabled() {
        try { return localStorage.getItem(LS_KEY) === 'true'; } catch(e) { return false; }
    }
    function serverReady() {
        var u = window.__STREMIO_SERVER_URL__ || '';
        return !!(u && u !== 'http://127.0.0.1:11470');
    }

    window.__showHonestStallMessage = function() {
        if (document.getElementById('dv-honest-stall')) return;
        var now = Date.now();
        if (now - lastShownAt < 15000) return; // throttle
        lastShownAt = now;

        var card = document.createElement('div');
        card.id = 'dv-honest-stall';
        // Corner card — explicitly NOT fullscreen, never traps the remote.
        card.style.cssText = 'position:fixed;bottom:60px;left:50%;transform:translateX(-50%);max-width:520px;width:auto;background:rgba(20,20,20,0.96);color:#fff;padding:16px 20px;border-radius:12px;font-family:PlusJakartaSans,sans-serif;z-index:99999;display:flex;flex-direction:column;gap:10px;text-align:center;line-height:1.45;box-shadow:0 8px 30px rgba(0,0,0,0.5);';

        var msg = document.createElement('div');
        msg.style.cssText = 'font-size:14px;color:rgba(255,255,255,0.92);';
        msg.textContent = 'This 4K stream is too heavy for the TV’s built-in browser. Try a 1080p or MP4 version of this title'
            + (serverReady() ? ', or use your Stremio streaming server to transcode it.' : ', or set up a Stremio streaming server (Settings ▸ Server).');
        card.appendChild(msg);

        var btn = document.createElement('button');
        btn.textContent = 'Got it';
        btn.style.cssText = 'background:rgba(255,255,255,0.16);color:#fff;border:none;border-radius:8px;padding:7px 18px;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;align-self:center;';
        btn.setAttribute('tabindex', '0');
        btn.onfocus = function() { this.style.outline = '2px solid #fff'; };
        btn.onblur = function() { this.style.outline = 'none'; };
        btn.onclick = function() { card.remove(); };
        card.appendChild(btn);

        document.body.appendChild(card);
        setTimeout(function() { btn.focus(); }, 60);
        setTimeout(function() { if (card.parentNode) card.remove(); }, 14000);
    };

    // Toggleable per project convention.
    var reg = setInterval(function() {
        if (!window.__registerVidaaSettingsItem) return;
        clearInterval(reg);
        window.__registerVidaaSettingsItem({
            id: 'honest-stall-message-toggle',
            type: 'toggle',
            label: 'Honest Stall Advice',
            description: 'When a stream keeps stalling and there is no working fallback (the TV player won’t open and no streaming server is set), show a small, dismissible note explaining the real cause and what actually helps (a lighter source, or a streaming server). Never blocks or skips the stream. OFF by default.',
            lsKey: LS_KEY,
            defaultValue: false
        });
    }, 200);

    // Expose the gate so other code can decide whether to call us.
    window.__honestStallEnabled = enabled;
})();
</script>
<script>
// ═══════════════════════════════════════════════════════════════════════
// VIDAA Diagnostic — one-tap, screenshot-friendly device/feature report.
// ═══════════════════════════════════════════════════════════════════════
// The TV has no clipboard, so users photograph this panel. It surfaces the
// facts needed to diagnose buffering / native-handoff issues PER DEVICE:
//   • device model / firmware / chipset (Hisense_* APIs, safe fallbacks)
//   • whether omi_platform AND omi_platform.sendPlatformMessage actually exist
//     on THIS device — the key datum that proves/disproves the native handoff
//   • whether the configured streaming server is reachable (short-timeout fetch)
//   • failing stream container/codec/resolution/bitrate (window.__STREAM_INFO__)
//   • which buffering-related toggles are currently ON
//
// Reachable two ways (projector remotes have NO number keys — color keys only):
//   • Settings ▸ VIDAA item ("Run Diagnostic")
//   • In-player combo: Green (404) then Red (403) within 1.5s. This combo does
//     not collide with the single-press bindings (Yellow=405 native,
//     Blue=406 transcode, Red/Info=stream info, Green=server health) because it
//     requires the two-key sequence Green→Red specifically.
(function() {
    'use strict';

    function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"]/g, function(c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
        });
    }

    function safeCall(fn) {
        try {
            if (typeof fn === 'function') {
                var v = fn();
                return (v === undefined || v === null || v === '') ? null : v;
            }
        } catch(e) {}
        return null;
    }

    function getDeviceInfo() {
        var H = window.Hisense_GetModelName ? window : (window.parent || window);
        function pick(name) {
            try { return safeCall(window[name]) || safeCall(H[name]); } catch(e) { return null; }
        }
        return {
            model: pick('Hisense_GetModelName') || (window.__VIDAA_CAPS__ && window.__VIDAA_CAPS__.model) || 'unknown',
            firmware: pick('Hisense_GetFirmWareVersion') || pick('Hisense_GetFirmwareVersion') || 'unknown',
            chipset: pick('Hisense_GetChipSetName') || pick('Hisense_GetChipsetName') || (window.__VIDAA_CAPS__ && window.__VIDAA_CAPS__.chipset) || 'unknown'
        };
    }

    function nativeApiStatus() {
        var omiExists = false, sendExists = false;
        try { omiExists = (typeof omi_platform !== 'undefined') && !!omi_platform; } catch(e) {}
        try { sendExists = omiExists && typeof omi_platform.sendPlatformMessage === 'function'; } catch(e) {}
        return { omiExists: omiExists, sendExists: sendExists };
    }

    function activeToggles() {
        var keys = {
            'Auto Native (MKV)': 'stremio_auto_native_player_mkv',
            'Auto Native (all)': 'stremio_auto_native_player',
            'Mark Watched on Handoff': 'stremio_native_handoff',
            'Playback Warning': 'stremio_playback_warning',
            'Honest Stall Advice': 'stremio_honest_stall_msg',
            'Force Stereo': 'stremio_force_stereo'
        };
        var on = [];
        for (var label in keys) {
            try { if (localStorage.getItem(keys[label]) === 'true') on.push(label); } catch(e) {}
        }
        return on.length ? on.join(', ') : 'none';
    }

    // Shared streaming-server reachability probe — used by the diagnostic AND
    // the helper-server setup flow so both behave identically. Probes
    // `GET <url>/settings` with a short AbortController timeout.
    if (!window.__probeStremioServer) {
        window.__probeStremioServer = function(url, cb, timeoutMs) {
            url = (url || '').replace(/\/+$/, '');
            if (!url) { cb({ url: '(none configured)', reachable: false, note: 'no URL' }); return; }
            var done = false;
            var ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
            var t = setTimeout(function() { if (ctrl) { try { ctrl.abort(); } catch(e) {} } if (!done) { done = true; cb({ url: url, reachable: false, note: 'timed out' }); } }, timeoutMs || 2500);
            try {
                fetch(url + '/settings', ctrl ? { signal: ctrl.signal } : undefined)
                    .then(function(r) { return r.ok ? r.json().catch(function() { return {}; }) : Promise.reject(new Error('HTTP ' + r.status)); })
                    .then(function(data) {
                        if (done) return; done = true; clearTimeout(t);
                        var v = data && (data.serverVersion || data.version || (data.values && data.values.serverVersion));
                        cb({ url: url, reachable: true, note: v ? ('v' + v) : 'online' });
                    })
                    .catch(function(e) { if (done) return; done = true; clearTimeout(t); cb({ url: url, reachable: false, note: (e && e.message) || 'unreachable' }); });
            } catch(e) {
                if (!done) { done = true; clearTimeout(t); cb({ url: url, reachable: false, note: 'fetch error' }); }
            }
        };
    }
    function checkServer(cb) {
        window.__probeStremioServer(window.__STREMIO_SERVER_URL__ || '', cb);
    }

    window.__showVidaaDiagnostic = function() {
        var existing = document.getElementById('vidaa-diagnostic');
        if (existing) { existing.remove(); return; }

        var dev = getDeviceInfo();
        var api = nativeApiStatus();
        var si = window.__STREAM_INFO__ || {};
        var container = si.container || (function() {
            try {
                var v = document.querySelector('video');
                var src = v ? (v.currentSrc || v.src || '') : '';
                var p = src.split('?')[0].toLowerCase();
                var m = p.match(/\.(mkv|mp4|m4v|webm|m3u8|mpd|mov)$/);
                return m ? m[1] : 'unknown';
            } catch(e) { return 'unknown'; }
        })();
        var res = (si.width || '?') + 'x' + (si.height || '?');
        var bitrate = si.bitrate ? (Math.round(si.bitrate / 1000) + ' kbps') : 'unknown';

        var panel = document.createElement('div');
        panel.id = 'vidaa-diagnostic';
        // BIG, centered, high-contrast — screenshot-friendly. Scrollable, not a
        // remote-trapping modal: the close button is the first focusable element.
        panel.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(720px,92vw);max-height:88vh;overflow:auto;background:#0c0c12;color:#fff;padding:28px 32px;border-radius:16px;font-family:PlusJakartaSans,monospace;z-index:100001;box-shadow:0 12px 50px rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.08);';

        function row(label, value, color) {
            return '<div style="display:flex;justify-content:space-between;gap:18px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:17px;">'
                + '<span style="color:rgba(255,255,255,0.55);">' + esc(label) + '</span>'
                + '<span style="font-weight:700;color:' + (color || '#fff') + ';text-align:right;word-break:break-all;">' + esc(value) + '</span></div>';
        }

        var handoffColor = api.sendExists ? '#4ade80' : '#f87171';
        var html = '<div style="font-size:24px;font-weight:800;margin-bottom:6px;">VIDAA Diagnostic</div>'
            + '<div style="font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:18px;">Photograph this screen to share when reporting a buffering issue.</div>'
            + '<div style="font-size:13px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin:14px 0 4px;">Device</div>'
            + row('Model', dev.model)
            + row('Firmware', dev.firmware)
            + row('Chipset', dev.chipset)
            + '<div style="font-size:13px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin:14px 0 4px;">Native player handoff</div>'
            + row('omi_platform present', api.omiExists ? 'YES' : 'NO', api.omiExists ? '#4ade80' : '#f87171')
            + row('sendPlatformMessage', api.sendExists ? 'YES (bridge present)' : 'NO', handoffColor)
            + '<div style="font-size:12px;color:rgba(255,255,255,0.45);padding:6px 0;line-height:1.4;">Note: even when the bridge is present, no confirmed VIDAA firmware acts on the play-video messages — the handoff is verified only by the browser actually backgrounding.</div>'
            + '<div style="font-size:13px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin:14px 0 4px;">Streaming server</div>'
            + '<div id="vidaa-diag-server">' + row('Server', 'checking…', '#fbbf24') + '</div>'
            + '<div style="font-size:13px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin:14px 0 4px;">Failing stream</div>'
            + row('Container', container)
            + row('Codec', si.videoCodec || 'unknown')
            + row('Resolution', res)
            + row('Bitrate', bitrate)
            + '<div style="font-size:13px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin:14px 0 4px;">Buffering toggles ON</div>'
            + row('Active', activeToggles());

        panel.innerHTML = html;

        var closeBtn = document.createElement('button');
        closeBtn.textContent = 'Close';
        closeBtn.style.cssText = 'margin-top:20px;width:100%;background:#7b5bf5;color:#fff;border:none;border-radius:10px;padding:12px;font-size:16px;font-family:inherit;font-weight:700;cursor:pointer;';
        closeBtn.setAttribute('tabindex', '0');
        closeBtn.onfocus = function() { this.style.outline = '3px solid #a78bfa'; };
        closeBtn.onblur = function() { this.style.outline = 'none'; };
        closeBtn.onclick = function() { panel.remove(); };
        // Insert close button as the FIRST child so spatial nav lands on it,
        // but visually keep it at the bottom via appendChild ordering.
        panel.appendChild(closeBtn);

        document.body.appendChild(panel);
        setTimeout(function() { closeBtn.focus(); }, 60);

        // Async server reachability — update the placeholder when it resolves.
        checkServer(function(s) {
            var slot = document.getElementById('vidaa-diag-server');
            if (!slot) return;
            slot.innerHTML = row('URL', s.url)
                + row('Reachable', s.reachable ? 'YES' : 'NO', s.reachable ? '#4ade80' : '#f87171')
                + row('Status', s.note, s.reachable ? '#4ade80' : '#f87171');
        });
    };

    // In-player color-button combo: Green (404) then Red (403) within 1.5s.
    var greenAt = 0;
    document.addEventListener('keydown', function(e) {
        if (e.keyCode === 404) { greenAt = Date.now(); return; }
        if (e.keyCode === 403) {
            if (greenAt && (Date.now() - greenAt) < 1500) {
                greenAt = 0;
                window.__showVidaaDiagnostic();
            }
        }
    }, true); // capture phase so we see it before the single-press handlers act

    // Settings ▸ VIDAA launchable item.
    var reg = setInterval(function() {
        if (!window.__registerVidaaSettingsItem) return;
        clearInterval(reg);
        window.__registerVidaaSettingsItem({
            id: 'vidaa-diagnostic-item',
            type: 'button',
            label: 'Run VIDAA Diagnostic',
            description: 'Shows a big, screenshot-friendly panel with your TV model/firmware/chipset, whether the native-player bridge exists on this device, whether your streaming server is reachable, and the failing stream’s details. In the player you can also press Green then Red. Photograph it to report buffering issues.',
            onClick: function() { window.__showVidaaDiagnostic(); },
            onToggle: function() { window.__showVidaaDiagnostic(); }
        });
    }, 200);
})();
</script>
<script>
// ═══════════════════════════════════════════════════════════════════════
// Task #4 — Helping a TV-only user (no PC) with streams too heavy for the
// VIDAA browser. Two deliverables, RELIABILITY over cleverness:
//   (A) honest, NON-BLOCKING choice card on the no-escape stall path
//   (B) an easy, guided helper-server setup flow
//
// HARD RULES (project): never block / skip / auto-change a stream without the
// user choosing it; no fullscreen overlay that traps the remote (corner card,
// focusable buttons, Back support); everything dismissible.
// ═══════════════════════════════════════════════════════════════════════
(function() {
    'use strict';

    var CARD_TOGGLE_KEY = 'stremio_heavy_choice_card';

    function serverReady() {
        var u = window.__STREMIO_SERVER_URL__ || '';
        return !!(u && u !== 'http://127.0.0.1:11470');
    }

    // ── Server URL setter — reuses the EXISTING mechanism (localStorage key
    // 'stremio_server_url' + window.__STREMIO_SERVER_URL__) and pushes the new
    // URL into the WASM core the same way the server-sync block does. ───────
    window.__setStremioServerUrl = function(url) {
        url = (url || '').trim().replace(/\/+$/, '');
        if (!url) return false;
        try { localStorage.setItem('stremio_server_url', url); } catch(e) {}
        window.__STREMIO_SERVER_URL__ = url;
        // Best-effort push into core (matches the server-sync IIFE near the top).
        try {
            if (window.core && typeof window.core.getState === 'function') {
                window.core.getState('ctx').then(function(ctxState) {
                    if (!ctxState || !ctxState.profile || !ctxState.profile.settings) return;
                    var cur = ctxState.profile.settings;
                    if (cur.streamingServerUrl === url) return;
                    var ns = {};
                    for (var k in cur) ns[k] = cur[k];
                    ns.streamingServerUrl = url;
                    return window.core.dispatch({ action: 'Ctx', args: { action: 'UpdateSettings', args: ns } }, 'ctx').then(function() {
                        return window.core.dispatch({ action: 'StreamingServer', args: { action: 'Reload' } }, 'streaming_server');
                    });
                }).catch(function() {});
            }
        } catch(e) {}
        return true;
    };

    // ── Read the current title's streams from core and find a direct-play
    // friendly one (≤1080p, MP4/H.264, or moderate HEVC-in-MP4). Cheap label
    // heuristic on the standard Stremio addon naming convention — same approach
    // the existing Auto-Play scorer uses. Returns the stream object or null.
    function streamText(s) {
        return ((s.title || '') + ' ' + (s.name || '') + ' ' + (s.description || '')).toLowerCase();
    }
    function isHeavyStreamText(t) {
        var is4k = /2160p|\b4k\b|uhd/.test(t);
        var isMkv = /\.mkv\b|matroska/.test(t);
        return is4k || isMkv;
    }
    function isDirectPlayText(t) {
        // Friendly: explicitly ≤1080p AND (mp4 or h264/avc/x264), OR an mp4 that
        // is not flagged 4K/HEVC-heavy.
        var lowRes = /1080p|720p|480p/.test(t);
        var isMp4 = /\.mp4\b|\bmp4\b/.test(t);
        var isH264 = /x264|h\.?264|avc/.test(t);
        var heavy = isHeavyStreamText(t);
        if (heavy) return false;
        if (lowRes && (isMp4 || isH264)) return true;
        if (isMp4 && !/hevc|x265|h\.?265/.test(t)) return true; // plain MP4
        return false;
    }

    window.__findDirectPlayStream = function() {
        try {
            if (!window.core || typeof window.core.getState !== 'function') return null;
            var state = window.core.getState('streaming');
            if (!state || !state.streams) state = window.core.getState('player');
            var streams = (state && state.streams) || [];
            if (!streams.length) return null;
            // Prefer a 1080p MP4/H.264 over anything else.
            var best = null, bestRank = -1;
            for (var i = 0; i < streams.length; i++) {
                var s = streams[i];
                if (!s || !(s.url || (s.deepLinks && s.deepLinks.player))) continue;
                var t = streamText(s);
                if (!isDirectPlayText(t)) continue;
                var rank = 0;
                if (/1080p/.test(t)) rank += 3; else if (/720p/.test(t)) rank += 2; else rank += 1;
                if (/\.mp4\b|\bmp4\b/.test(t)) rank += 1;
                if (/x264|h\.?264|avc/.test(t)) rank += 1;
                if (rank > bestRank) { bestRank = rank; best = s; }
            }
            return best;
        } catch(e) { return null; }
    };

    // ── Navigate from the player back to the streams list (metadetails) for the
    // SAME title. Robust: reconstruct the metadetails hash from the player hash
    // params (type/id/videoId); fall back to history.back(). Never auto-plays a
    // different stream — the user picks from the list.
    //
    // Accepts an optional `playerHash` so the caller can pass the hash captured
    // at the moment the stall was detected — this stays correct even if the app
    // has since navigated elsewhere (e.g. an unauthenticated redirect).
    window.__navigateToStreamsList = function(playerHash) {
        var hash = playerHash || window.location.hash || '';
        if (hash.indexOf('#/player/') === 0) {
            // #/player/<stream>/<streamTransportUrl>/<metaTransportUrl>/<type>/<id>/<videoId>
            var parts = hash.replace('#/player/', '').split('/');
            // type, id, videoId are the last three segments when present.
            if (parts.length >= 6) {
                var type = parts[3], id = parts[4], videoId = parts[5];
                if (type && id) {
                    var target = '#/metadetails/' + type + '/' + id + (videoId ? ('/' + videoId) : '');
                    window.location.hash = target;
                    return target;
                }
            }
            // Couldn't parse — robust fallback.
            try { window.history.back(); } catch(e) {}
            return null;
        }
        try { window.history.back(); } catch(e) {}
        return null;
    };

    function cardEnabled() {
        // Default ON: this is the user's lifeline when a stream won't play. Still
        // toggleable, and only ever appears on the explicit no-escape stall path.
        try { return localStorage.getItem(CARD_TOGGLE_KEY) !== 'false'; } catch(e) { return true; }
    }
    window.__heavyChoiceCardEnabled = cardEnabled;

    function mkButton(label, primary) {
        var b = document.createElement('button');
        b.textContent = label;
        b.style.cssText = 'background:' + (primary ? '#7b5bf5' : 'rgba(255,255,255,0.12)') + ';color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;text-align:center;';
        b.setAttribute('tabindex', '0');
        b.onfocus = function() { this.style.outline = '2px solid #a78bfa'; };
        b.onblur = function() { this.style.outline = 'none'; };
        return b;
    }

    function smallToast(text) {
        var t = document.createElement('div');
        t.style.cssText = 'position:fixed;top:40px;left:50%;transform:translateX(-50%);background:rgba(123,91,245,0.95);color:#fff;padding:10px 22px;border-radius:8px;font-family:PlusJakartaSans,sans-serif;font-size:0.92rem;z-index:100000;max-width:80%;text-align:center;line-height:1.4;';
        t.textContent = text;
        document.body.appendChild(t);
        setTimeout(function() { if (t.parentNode) t.remove(); }, 5000);
    }

    // ── (A) The non-blocking choice card. ──────────────────────────────────
    window.__showHeavyStreamChoiceCard = function() {
        if (document.getElementById('dv-heavy-choice')) return;

        // Capture the player hash NOW (when the stall is detected) so the
        // "back to streams" action stays correct even if the route changes later.
        var capturedPlayerHash = window.location.hash || '';

        var card = document.createElement('div');
        card.id = 'dv-heavy-choice';
        // Corner card — explicitly NOT fullscreen, never traps the remote.
        card.style.cssText = 'position:fixed;bottom:60px;left:50%;transform:translateX(-50%);max-width:560px;width:auto;background:rgba(18,18,22,0.97);color:#fff;padding:18px 22px;border-radius:14px;font-family:PlusJakartaSans,sans-serif;z-index:99999;display:flex;flex-direction:column;gap:12px;text-align:center;line-height:1.45;box-shadow:0 10px 40px rgba(0,0,0,0.6);';

        var msg = document.createElement('div');
        msg.style.cssText = 'font-size:14px;color:rgba(255,255,255,0.92);';
        msg.textContent = 'This stream looks too heavy for the TV’s built-in browser. How would you like to handle it?';
        card.appendChild(msg);

        var row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:8px;justify-content:center;flex-wrap:wrap;';

        // 1) PRIMARY — show a version that plays here.
        var playsBtn = mkButton('Show me a version that plays here', true);
        playsBtn.onclick = function() {
            card.remove();
            var direct = null;
            try { direct = window.__findDirectPlayStream(); } catch(e) {}
            if (direct && (direct.url || (direct.deepLinks && direct.deepLinks.player))) {
                // One-tap switch is available AND user chose it (not silent).
                var name = (direct.title || direct.name || 'a lighter version').toString().substring(0, 60);
                smallToast('Switching to ' + name + ' — these play on this TV.');
                try {
                    if (direct.deepLinks && direct.deepLinks.player) {
                        window.location.hash = direct.deepLinks.player;
                    } else if (window.core && window.core.dispatch) {
                        window.core.dispatch({ action: 'StreamClicked', args: { stream: direct } });
                    } else {
                        window.__navigateToStreamsList(capturedPlayerHash);
                    }
                } catch(e) { window.__navigateToStreamsList(capturedPlayerHash); }
                return;
            }
            // Robust baseline: back to the streams list + guidance.
            window.__navigateToStreamsList(capturedPlayerHash);
            smallToast('Pick a 1080p or MP4 / H.264 source — those play on this TV.');
        };
        row.appendChild(playsBtn);

        // 2) Set up free helper for 4K (opens flow B).
        var helperBtn = mkButton('Set up free helper for 4K');
        helperBtn.onclick = function() {
            card.remove();
            if (typeof window.__showHelperServerSetup === 'function') window.__showHelperServerSetup();
        };
        row.appendChild(helperBtn);

        // 3) Keep trying this one — dismiss, leave playback ALONE.
        var keepBtn = mkButton('Keep trying this one');
        keepBtn.onclick = function() { card.remove(); };
        row.appendChild(keepBtn);

        card.appendChild(row);
        document.body.appendChild(card);
        setTimeout(function() { playsBtn.focus(); }, 60);
        // Auto-hide so it never lingers; does NOT touch playback.
        setTimeout(function() { if (card.parentNode) card.remove(); }, 20000);
    };

    // ── (B) The guided helper-server setup card. ───────────────────────────
    window.__showHelperServerSetup = function() {
        var existing = document.getElementById('dv-helper-setup');
        if (existing) { existing.remove(); return; }

        var card = document.createElement('div');
        card.id = 'dv-helper-setup';
        // Corner-anchored, scrollable, NOT fullscreen.
        card.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);width:min(620px,92vw);max-height:80vh;overflow:auto;background:rgba(14,14,20,0.98);color:#fff;padding:22px 24px;border-radius:16px;font-family:PlusJakartaSans,sans-serif;z-index:100001;box-shadow:0 12px 50px rgba(0,0,0,0.7);';

        var title = document.createElement('div');
        title.style.cssText = 'font-size:20px;font-weight:800;margin-bottom:8px;';
        title.textContent = 'Set up free helper for 4K';
        card.appendChild(title);

        var steps = document.createElement('div');
        steps.style.cssText = 'font-size:14px;color:rgba(255,255,255,0.82);line-height:1.6;margin-bottom:14px;text-align:left;';
        steps.innerHTML =
            '<div style="margin-bottom:6px;">Heavy 4K files play once a small free helper does the hard work. It is quick:</div>'
            + '<div>1. On your phone or PC <b>on the same Wi-Fi</b>, install Stremio (free) from stremio.com.</div>'
            + '<div>2. Open it — it quietly runs a streaming server in the background.</div>'
            + '<div>3. Find that device’s address (usually like <code>http://192.168.1.x:11470</code>) and type it below.</div>';
        card.appendChild(steps);

        var input = document.createElement('input');
        input.type = 'text';
        input.placeholder = 'http://192.168.1.x:11470';
        input.value = (window.__STREMIO_SERVER_URL__ && window.__STREMIO_SERVER_URL__ !== 'http://127.0.0.1:11470') ? window.__STREMIO_SERVER_URL__ : '';
        input.style.cssText = 'width:100%;box-sizing:border-box;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.18);background:rgba(0,0,0,0.35);color:#fff;font-size:16px;font-family:Consolas,monospace;margin-bottom:12px;';
        input.setAttribute('tabindex', '0');
        card.appendChild(input);

        var status = document.createElement('div');
        status.id = 'dv-helper-status';
        status.style.cssText = 'font-size:14px;min-height:20px;margin-bottom:14px;font-weight:600;';
        card.appendChild(status);

        var row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;';

        var saveBtn = mkButton('Save & Check', true);
        saveBtn.onclick = function() {
            var url = (input.value || '').trim();
            if (!url) { status.style.color = '#fbbf24'; status.textContent = 'Type the helper’s address first.'; return; }
            if (!/^https?:\/\//i.test(url)) url = 'http://' + url;
            window.__setStremioServerUrl(url);
            status.style.color = '#fbbf24';
            status.textContent = 'Checking ' + url.replace(/\/+$/, '') + ' …';
            saveBtn.disabled = true;
            window.__probeStremioServer(url, function(res) {
                saveBtn.disabled = false;
                if (res.reachable) {
                    status.style.color = '#4ade80';
                    status.textContent = '✓ Connected — server is reachable (' + res.note + '). 4K transcoding is now available.';
                } else {
                    status.style.color = '#f87171';
                    status.textContent = '✗ Not reachable (' + res.note + '). Check the address and that both devices are on the same Wi-Fi.';
                }
            });
        };
        row.appendChild(saveBtn);

        var closeBtn = mkButton('Close');
        closeBtn.onclick = function() { card.remove(); };
        row.appendChild(closeBtn);

        card.appendChild(row);
        document.body.appendChild(card);
        setTimeout(function() { input.focus(); }, 60);
    };

    // ── Settings registration: choice-card toggle + helper-server launcher. ──
    var reg = setInterval(function() {
        if (!window.__registerVidaaSettingsItem) return;
        clearInterval(reg);
        window.__registerVidaaSettingsItem({
            id: 'heavy-stream-choice-card-toggle',
            type: 'toggle',
            label: 'Heavy-Stream Help Card',
            description: 'When a stream is too heavy for the TV browser and nothing else works, show a small dismissible card offering to find a lighter version, set up a 4K helper server, or keep trying. Never blocks or skips the stream. ON by default.',
            lsKey: CARD_TOGGLE_KEY,
            defaultValue: true
        });
        window.__registerVidaaSettingsItem({
            id: 'helper-server-setup-item',
            type: 'button',
            label: 'Set up helper server (for 4K)',
            description: 'Point this TV at a free Stremio streaming server (running on your phone or PC on the same Wi-Fi) so heavy 4K files get remuxed/transcoded and actually play. Step-by-step, with a reachability check.',
            onClick: function() { window.__showHelperServerSetup(); },
            onToggle: function() { window.__showHelperServerSetup(); }
        });
    }, 200);
})();
</script>

</html>
