    <script>
    // Configurable streaming server URL
    // Usage: ?server=http://192.168.1.50:11470
    // Saved to localStorage so you only need to pass it once.
    (function() {
        var params = new URLSearchParams(window.location.search);
        var server = params.get('server');
        if (server) {
            server = server.replace(/\/+$/, '');
            localStorage.setItem('stremio_server_url', server);
        }
        window.__STREMIO_SERVER_URL__ = localStorage.getItem('stremio_server_url') || 'http://127.0.0.1:11470';
    })();
    </script>
    <script>
    // XSS escape helper for dynamic innerHTML values
    function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    </script>
    <script>
    // VIDAA keyboard fix v5 — intercept programmatic input.value changes
    // The VIDAA system keyboard sets input.value directly without firing DOM events.
    // This script: (1) overrides the value setter to fire synthetic events,
    // (2) polls as fallback, (3) directly updates URL hash as nuclear option.
    (function() {
        window.__STREMIO_PATCH_VERSION__ = 5;

        // Layer 1: Override HTMLInputElement.prototype.value setter
        try {
            var desc = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
            if (desc && desc.set) {
                var origSet = desc.set;
                var origGet = desc.get;
                var guard = false;
                Object.defineProperty(HTMLInputElement.prototype, 'value', {
                    get: origGet,
                    set: function(v) {
                        var old = origGet.call(this);
                        origSet.call(this, v);
                        if (v !== old && !guard) {
                            guard = true;
                            try {
                                this.dispatchEvent(new Event('input', { bubbles: true }));
                            } catch(e) {}
                            guard = false;
                        }
                    },
                    configurable: true
                });
            }
        } catch(e) {}

        // Layer 2: Polling fallback (250ms — balanced for TV CPU)
        var _prev = '';
        setInterval(function() {
            try {
                var hash = window.location.hash || '';
                if (hash.indexOf('#/search') !== 0) { _prev = ''; return; }
                var el = document.querySelector('input[type="text"]')
                      || document.querySelector('input[placeholder]')
                      || document.querySelector('input');
                if (!el) return;
                var v = el.value || '';
                if (v === _prev) return;
                _prev = v;

                try {
                    el.dispatchEvent(new Event('input', { bubbles: true }));
                    el.dispatchEvent(new Event('change', { bubbles: true }));
                } catch(e) {}

                // Layer 3: Nuclear option — directly update URL hash
                if (v.length > 0) {
                    var encoded = encodeURIComponent(v);
                    if (hash.indexOf('query=' + encoded) === -1) {
                        window.location.hash = '#/search?query=' + encoded;
                    }
                }
            } catch(e) {}
        }, 250);
    })();
    </script>

<script>
// Server URL sync — push ?server= URL into WASM core
(function() {
    var serverUrl = window.__STREMIO_SERVER_URL__;
    if (!serverUrl || serverUrl === 'http://127.0.0.1:11470') return;

    var attempts = 0;
    var interval = setInterval(function() {
        if (++attempts > 60) { clearInterval(interval); return; }
        if (!window.core) return;
        clearInterval(interval);

        window.core.getState('ctx').then(function(ctxState) {
            if (!ctxState || !ctxState.profile || !ctxState.profile.settings) return;
            var currentSettings = ctxState.profile.settings;
            if (currentSettings.streamingServerUrl === serverUrl) {
                console.log('[server-sync] URL already correct');
                return;
            }
            console.log('[server-sync] Syncing URL to WASM core:', serverUrl);
            var newSettings = {};
            for (var k in currentSettings) newSettings[k] = currentSettings[k];
            newSettings.streamingServerUrl = serverUrl;
            window.core.dispatch({ action: 'Ctx', args: { action: 'UpdateSettings', args: newSettings } }, 'ctx').then(function() {
                console.log('[server-sync] Settings updated, reloading streaming server');
                return window.core.dispatch({ action: 'StreamingServer', args: { action: 'Reload' } }, 'streaming_server');
            }).then(function() {
                console.log('[server-sync] Streaming server reloaded successfully');
            }).catch(function(e) {
                console.error('[server-sync] Error:', e);
            });
        }).catch(function(e) {
            console.error('[server-sync] Failed to get ctx state:', e);
        });
    }, 500);
})();
</script>
<script>
// Auto-reload streaming server when URL changes in Settings UI
(function() {
    var lastKnownUrl = null;
    var watchDelay = 0;
    setInterval(function() {
        if (++watchDelay < 5) return; // Skip first 10 seconds to let server-sync finish
        if (!window.core) return;
        if ((window.location.hash || '').indexOf('#/settings') !== 0) return;
        window.core.getState('ctx').then(function(state) {
            if (!state || !state.profile || !state.profile.settings) return;
            var url = state.profile.settings.streamingServerUrl;
            if (lastKnownUrl === null) { lastKnownUrl = url; return; }
            if (url !== lastKnownUrl) {
                console.log('[server-watch] URL changed:', lastKnownUrl, '->', url);
                lastKnownUrl = url;
                window.__STREMIO_SERVER_URL__ = url;
                try { localStorage.setItem('stremio_server_url', url); } catch(e) {}
                window.core.dispatch({ action: 'StreamingServer', args: { action: 'Reload' } }, 'streaming_server').then(function() {
                    console.log('[server-watch] Streaming server reloaded');
                }).catch(function(e) {
                    console.error('[server-watch] Reload failed:', e);
                });
            }
        }).catch(function() {});
    }, 2000);
})();
</script>
<script>
// Smart DV/HDR stream handling
// Based on live hardware testing on Hisense PX1HE (100L5H):
// - DV+HDR in MKV at 4K: PLAYS NATIVELY (no transcoding needed)
// - DV+HDR in MP4: crashes browser (container issue)
// - Content >4K (4320p/8K upscale): black screen (decoder limit)
// - HEVC 4K 10-bit: plays fine
// - AV1: not supported
(function() {
    window.__DV_PROFILE7_DETECTED__ = false;
    window.__STREAM_INFO__ = {};

    // Monitor video element for playback failures — warn only on actual failure
    var watchInterval = null;

    function startPlaybackWatch() {
        if (watchInterval) return;
        watchInterval = setInterval(function() {
            var hash = window.location.hash || '';
            if (hash.indexOf('#/player/') !== 0) {
                if (watchInterval) { clearInterval(watchInterval); watchInterval = null; }
                return;
            }
            var video = document.querySelector('video');
            if (!video) return;

            // Check for >4K resolution (decoder limit)
            if (video.videoWidth > 4096 || video.videoHeight > 2160) {
                console.warn('[stream] Resolution ' + video.videoWidth + 'x' + video.videoHeight + ' exceeds 4K — may cause issues');
                window.__STREAM_INFO__.oversize = true;
            }

            // Detect stalled DV playback (black screen = video loads but no frames render)
            if (video.readyState >= 2 && video.currentTime === 0 && !video.paused && !video.ended) {
                // Video thinks it's playing but stuck at 0 — possible black screen
                if (!window.__STREAM_INFO__.stallCheck) {
                    window.__STREAM_INFO__.stallCheck = Date.now();
                } else if (Date.now() - window.__STREAM_INFO__.stallCheck > 8000) {
                    // 8 seconds with no progress — likely a black screen
                    console.warn('[stream] Playback stalled — possible codec/container issue');
                    showPlaybackWarning();
                    window.__STREAM_INFO__.stallCheck = null;
                }
            } else {
                window.__STREAM_INFO__.stallCheck = null;
            }
        }, 2000);
    }

    // Watch for player route
    var wasInPlayer = false;
    setInterval(function() {
        var hash = window.location.hash || '';
        var inPlayer = hash.indexOf('#/player/') === 0;
        if (inPlayer) {
            if (!wasInPlayer) { window.__STREAM_INFO__ = {}; }
            startPlaybackWatch();
        }
        if (!inPlayer) { window.__FORCE_TRANSCODE__ = false; }
        wasInPlayer = inPlayer;
    }, 1000);

    // Intercept probe responses — log codec info but DON'T block playback
    var origFetch = window.fetch;
    window.fetch = function(url, opts) {
        var result = origFetch.apply(this, arguments);
        try {
            if (typeof url === 'string' && url.indexOf('/hlsv2/') !== -1 && url.indexOf('probe') !== -1) {
                result.then(function(response) {
                    var cloned = response.clone();
                    cloned.json().then(function(data) {
                        if (data && Array.isArray(data.streams)) {
                            for (var i = 0; i < data.streams.length; i++) {
                                var s = data.streams[i];
                                if (s.track === 'video') {
                                    window.__STREAM_INFO__.videoCodec = s.codec;
                                    window.__STREAM_INFO__.width = s.width;
                                    window.__STREAM_INFO__.height = s.height;
                                    if (s.codec && /^dv(he|h1)/.test(s.codec)) {
                                        window.__DV_PROFILE7_DETECTED__ = s.codec;
                                        console.log('[DV] Detected:', s.codec, s.width + 'x' + s.height, '— letting browser attempt native playback');
                                    }
                                }
                            }
                        }
                    }).catch(function() {});
                });
            }
        } catch(e) {}
        return result;
    };

    function showPlaybackWarning() {
        var existing = document.getElementById('dv-warning');
        if (existing) return;

        var codec = window.__STREAM_INFO__.videoCodec || 'unknown';
        var res = (window.__STREAM_INFO__.width || '?') + 'x' + (window.__STREAM_INFO__.height || '?');
        var isOversize = window.__STREAM_INFO__.width > 4096 || window.__STREAM_INFO__.height > 2160;

        var overlay = document.createElement('div');
        overlay.id = 'dv-warning';
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:100000;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;font-family:PlusJakartaSans,sans-serif;';

        var title = isOversize ? 'Resolution Too High' : 'Playback Issue Detected';
        var detail = isOversize
            ? 'This stream is ' + esc(res) + ' which exceeds your TV\'s 4K decode limit. Try a 2160p or 1080p source instead.'
            : 'This stream (' + esc(codec) + ' @ ' + esc(res) + ') is not rendering. The container format may be incompatible. Try an MKV source, or transcode via your streaming server.';

        var inner = '<div style="font-size:2.2rem;margin-bottom:1rem;font-weight:700;">' + title + '</div>'
            + '<div style="font-size:1.1rem;color:rgba(255,255,255,0.65);margin-bottom:2rem;text-align:center;max-width:560px;line-height:1.5;">' + detail + '</div>'
            + '<div id="dv-actions" style="display:flex;gap:1.2rem;"></div>';
        overlay.innerHTML = inner;

        var actionsDiv = overlay.querySelector('#dv-actions');

        // Native Player button (VIDAA only)
        var hasNativePlayer = false;
        try { hasNativePlayer = typeof omi_platform !== 'undefined' && typeof omi_platform.sendPlatformMessage === 'function'; } catch(e) {}

        if (hasNativePlayer) {
            var nativeBtn = document.createElement('button');
            nativeBtn.textContent = 'Open in Native Player';
            nativeBtn.style.cssText = 'padding:0.9rem 2.2rem;font-size:1.1rem;background:#7b5bf5;color:white;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;';
            nativeBtn.setAttribute('tabindex', '0');
            nativeBtn.onfocus = function() { this.style.outline = '3px solid #a78bfa'; };
            nativeBtn.onblur = function() { this.style.outline = 'none'; };
            nativeBtn.onclick = function() {
                window.__STREAM_INFO__.stallCheck = null;
                var video = document.querySelector('video');
                var streamUrl = video ? video.currentSrc || video.src : null;
                if (streamUrl) {
                    window.__launchNativePlayer(streamUrl);
                    overlay.remove();
                }
            };
            actionsDiv.appendChild(nativeBtn);
        }

        var transBtn = document.createElement('button');
        transBtn.textContent = 'Force Transcode';
        transBtn.style.cssText = 'padding:0.9rem 2.2rem;font-size:1.1rem;background:' + (hasNativePlayer ? 'rgba(255,255,255,0.1)' : '#7b5bf5') + ';color:white;border:' + (hasNativePlayer ? '1px solid rgba(255,255,255,0.25)' : 'none') + ';border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;';
        transBtn.setAttribute('tabindex', '0');
        transBtn.onfocus = function() { this.style.outline = '3px solid #a78bfa'; };
        transBtn.onblur = function() { this.style.outline = 'none'; };
        transBtn.onclick = function() {
            window.__STREAM_INFO__.stallCheck = null;
            window.__FORCE_TRANSCODE__ = true;
            overlay.remove();
            var ch = window.location.hash;
            window.location.hash = '#/home';
            setTimeout(function() { window.location.hash = ch; }, 100);
        };
        actionsDiv.appendChild(transBtn);

        var skipBtn = document.createElement('button');
        skipBtn.textContent = 'Try Another Source';
        skipBtn.style.cssText = 'padding:0.9rem 2.2rem;font-size:1.1rem;background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.25);border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;';
        skipBtn.setAttribute('tabindex', '0');
        skipBtn.onfocus = function() { this.style.outline = '3px solid #a78bfa'; };
        skipBtn.onblur = function() { this.style.outline = 'none'; };
        skipBtn.onclick = function() {
            window.__STREAM_INFO__.stallCheck = null;
            overlay.remove();
            window.history.back();
        };
        actionsDiv.appendChild(skipBtn);

        var dismissBtn = document.createElement('button');
        dismissBtn.textContent = 'Dismiss';
        dismissBtn.style.cssText = 'padding:0.9rem 2.2rem;font-size:1.1rem;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;';
        dismissBtn.setAttribute('tabindex', '0');
        dismissBtn.onfocus = function() { this.style.outline = '3px solid #a78bfa'; };
        dismissBtn.onblur = function() { this.style.outline = 'none'; };
        dismissBtn.onclick = function() { window.__STREAM_INFO__.stallCheck = null; overlay.remove(); };
        actionsDiv.appendChild(dismissBtn);

        document.body.appendChild(overlay);
        setTimeout(function() { transBtn.focus(); }, 100);
    }
    window.__showPlaybackWarning = showPlaybackWarning;
})();
</script>
<script>
// Enhanced error messages for TV users
(function() {
    window.__STREMIO_ERROR_ENHANCER__ = function(err) {
        if (!err) return null;
        var msg = err.message || '';
        var code = err.code || 0;

        if (window.__DV_PROFILE7_DETECTED__ && window.__STREAM_INFO__ && window.__STREAM_INFO__.stallCheck) {
            return 'Dolby Vision stream (' + window.__DV_PROFILE7_DETECTED__ + ') failed to render. Try an MKV source or use a streaming server for transcoding.';
        }
        if (msg.indexOf('not supported') !== -1 || msg === 'MEDIA_ERR_SRC_NOT_SUPPORTED') {
            return 'This video codec is not supported by your TV. Try a different source, or configure a streaming server for transcoding (Settings \u2192 Server).';
        }
        if (msg === 'MEDIA_ERR_DECODE') {
            return 'Video decode error \u2014 the codec may not be compatible. Try a different source or enable transcoding.';
        }
        if (msg === 'MEDIA_ERR_NETWORK') {
            return 'Network error \u2014 check your connection and streaming server status.';
        }
        if (msg.indexOf('CONVERT_FAILED') !== -1 || msg.indexOf('transcode') !== -1 || msg.indexOf('Transcode') !== -1) {
            return 'Transcoding failed \u2014 verify your streaming server is running and accessible.';
        }
        return msg;
    };
})();
</script>
<script>
// Splash screen — remove when core is ready
(function() {
    var bar = document.getElementById('splash-bar');
    var progress = 0;
    var tick = setInterval(function() {
        progress = Math.min(progress + Math.random() * 15, 90);
        if (bar) bar.style.width = progress + '%';
    }, 400);
    var safetyTimer = null;
    var check = setInterval(function() {
        if (window.core && typeof window.core.getState === 'function') {
            clearInterval(check);
            clearInterval(tick);
            if (safetyTimer) clearTimeout(safetyTimer);
            if (bar) bar.style.width = '100%';
            setTimeout(function() {
                var splash = document.getElementById('splash');
                if (splash) {
                    splash.style.transition = 'opacity 0.3s';
                    splash.style.opacity = '0';
                    setTimeout(function() { splash.remove(); }, 300);
                }
            }, 200);
        }
    }, 300);
    // Safety: remove after 30s regardless
    safetyTimer = setTimeout(function() {
        clearInterval(check);
        clearInterval(tick);
        var splash = document.getElementById('splash');
        if (splash) splash.remove();
    }, 30000);
})();
</script>
<script>
// Resolution indicator in player
(function() {
    var indicator = null;
    var hideTimer = null;

    function createIndicator() {
        if (indicator) return indicator;
        indicator = document.createElement('div');
        indicator.id = 'quality-indicator';
        indicator.style.cssText = 'position:fixed;top:14px;right:14px;background:rgba(0,0,0,0.75);color:white;padding:5px 12px;border-radius:6px;font-size:13px;z-index:99998;pointer-events:none;font-family:monospace;display:none;backdrop-filter:blur(4px);';
        document.body.appendChild(indicator);
        return indicator;
    }

    function showIndicator() {
        if (!indicator) return;
        indicator.style.display = 'block';
        indicator.style.opacity = '1';
        clearTimeout(hideTimer);
        hideTimer = setTimeout(function() {
            if (indicator) { indicator.style.transition = 'opacity 0.5s'; indicator.style.opacity = '0'; }
        }, 5000);
    }

    document.addEventListener('keydown', function() {
        if ((window.location.hash || '').indexOf('#/player/') === 0 && indicator) {
            indicator.style.transition = 'none';
            showIndicator();
        }
    });

    setInterval(function() {
        var hash = window.location.hash || '';
        if (hash.indexOf('#/player/') !== 0) {
            if (indicator) indicator.style.display = 'none';
            return;
        }
        if (!indicator) createIndicator();
        var video = document.querySelector('video');
        if (!video || !video.videoWidth) return;

        var el = indicator;
        var w = video.videoWidth, h = video.videoHeight;
        var label;
        if (w >= 3840) label = '4K';
        else if (w >= 2560) label = '1440p';
        else if (w >= 1920) label = '1080p';
        else if (w >= 1280) label = '720p';
        else if (w >= 854) label = '480p';
        else label = w + 'x' + h;

        // Append codec/HDR info from VIDAA state
        if (window.__VIDAA_STATE__) {
            if (window.__VIDAA_STATE__.videoCodec) label += ' ' + window.__VIDAA_STATE__.videoCodec;
            if (window.__VIDAA_STATE__.hdr) label += ' ' + window.__VIDAA_STATE__.hdr;
            if (window.__VIDAA_STATE__.dolbyVision) label += ' DV';
        }
        if (window.__STREAM_INFO__ && window.__STREAM_INFO__.videoCodec) {
            if (label.indexOf(window.__STREAM_INFO__.videoCodec) === -1) {
                label += ' ' + window.__STREAM_INFO__.videoCodec;
            }
        }

        // Buffer health dot
        var bufferSec = 0;
        try { if (video.buffered.length) bufferSec = video.buffered.end(video.buffered.length - 1) - video.currentTime; } catch(e) {}
        var dotColor = bufferSec > 30 ? '#4ade80' : bufferSec > 10 ? '#fbbf24' : '#f87171';
        el.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + dotColor + ';margin-right:6px;vertical-align:middle;"></span>' + esc(label);
        if (el.style.display === 'none') showIndicator();
    }, 3000);
})();
</script>
<script>
// VIDAA remote color button mappings
(function() {
    var healthOverlay = null;

    document.addEventListener('keydown', function(e) {
        var code = e.keyCode;

        // Red (403) — toggle quality indicator
        if (code === 403) {
            var qi = document.getElementById('quality-indicator');
            if (qi) qi.style.display = qi.style.display === 'none' ? 'block' : 'none';
        }

        // Green (404) — toggle server health overlay
        if (code === 404) {
            if (healthOverlay) { healthOverlay.remove(); healthOverlay = null; return; }
            var h = window.__SERVER_HEALTH__ || {};
            healthOverlay = document.createElement('div');
            healthOverlay.style.cssText = 'position:fixed;bottom:60px;right:14px;background:rgba(0,0,0,0.85);color:white;padding:16px 20px;border-radius:10px;font-size:13px;z-index:99999;font-family:monospace;min-width:220px;backdrop-filter:blur(4px);';
            healthOverlay.innerHTML = '<div style="font-weight:700;margin-bottom:8px;font-size:14px;">Server Health</div>'
                + '<div>Status: <span style="color:' + (h.status === 'online' ? '#4ade80' : '#f87171') + ';">' + esc(h.status || 'unknown') + '</span></div>'
                + '<div>Latency: ' + (h.latency ? h.latency + 'ms' : 'N/A') + '</div>'
                + '<div>Version: ' + esc(h.version || 'N/A') + '</div>'
                + '<div>URL: ' + esc(window.__STREMIO_SERVER_URL__ || 'default') + '</div>';
            document.body.appendChild(healthOverlay);
            setTimeout(function() { if (healthOverlay) { healthOverlay.remove(); healthOverlay = null; } }, 8000);
        }

        // Blue (406) — force transcode current stream (reloads player)
        if (code === 406) {
            var ph = window.location.hash || '';
            if (ph.indexOf('#/player/') === 0) {
                window.__FORCE_TRANSCODE__ = true;
                console.log('[remote] Force transcode enabled, reloading stream');
                window.location.hash = '#/home';
                setTimeout(function() { window.location.hash = ph; }, 100);
            }
        }

        // Info (457) — show stream info
        if (code === 457) {
            var video = document.querySelector('video');
            if (!video) return;
            var info = document.getElementById('stream-info');
            if (info) { info.remove(); return; }
            info = document.createElement('div');
            info.id = 'stream-info';

                return ctrl.signal;
            }

    }

    function checkHealth() {
        if ((window.location.hash || '').indexOf('#/player/') === 0) return;
        var url = window.__STREMIO_SERVER_URL__;

                version: data.serverVersion || data.version || null

            }).catch(function() {

// Lazy load poster images to reduce memory pressure
(function() {

    var observer = new MutationObserver(function(mutations) {
        for (var i = 0; i < mutations.length; i++) {
            var added = mutations[i].addedNodes;
            for (var j = 0; j < added.length; j++) {
                if (added[j].nodeType !== 1) continue;
                var imgs = added[j].querySelectorAll ? added[j].querySelectorAll('img:not([loading])') : [];
                for (var k = 0; k < imgs.length; k++) {
                    imgs[k].setAttribute('loading', 'lazy');
                }
                if (added[j].tagName === 'IMG' && !added[j].getAttribute('loading')) {
                    added[j].setAttribute('loading', 'lazy');
                }
            }
        }
    });
    observer.observe(document.body, { childList: true, subtree: true });
})();

<script>
// #9 — Save and restore playback speed & volume
// Persists user's preferred playback rate and volume in localStorage.
// Restores them automatically when a new video starts playing.
(function() {
    var SPEED_KEY = 'stremio_playback_speed';
    var VOLUME_KEY = 'stremio_volume';
    var applied = false;
    var lastVideoSrc = '';

    function getSavedSpeed() {
        try { var v = parseFloat(localStorage.getItem(SPEED_KEY)); return (v && v > 0 && v <= 4) ? v : null; } catch(e) { return null; }
    }
    function getSavedVolume() {
        try { var v = parseFloat(localStorage.getItem(VOLUME_KEY)); return (v >= 0 && v <= 1) ? v : null; } catch(e) { return null; }
    }

    // Watch for video element and apply saved settings
    setInterval(function() {
        var hash = window.location.hash || '';
        if (hash.indexOf('#/player/') !== 0) { applied = false; lastVideoSrc = ''; return; }

        var video = document.querySelector('video');
        if (!video) return;

        var src = video.currentSrc || video.src || '';
        if (src && src !== lastVideoSrc) {
            lastVideoSrc = src;
            applied = false;
        }

        if (!applied && video.readyState >= 1) {
            var savedSpeed = getSavedSpeed();
            if (savedSpeed !== null && video.playbackRate !== savedSpeed) {
                video.playbackRate = savedSpeed;
                console.log('[playback] Restored speed:', savedSpeed);
            }
            var savedVol = getSavedVolume();
            if (savedVol !== null && Math.abs(video.volume - savedVol) > 0.01) {
                video.volume = savedVol;
                console.log('[playback] Restored volume:', savedVol);
            }
            applied = true;
        }

        // Continuously monitor for user changes to save them
        if (video.readyState >= 1) {
            var currentSpeed = video.playbackRate;
            var currentVol = video.volume;
            try {
                var storedSpeed = getSavedSpeed();
                if (currentSpeed && currentSpeed > 0 && currentSpeed !== storedSpeed) {
                    localStorage.setItem(SPEED_KEY, String(currentSpeed));
                }
                var storedVol = getSavedVolume();
                if (currentVol >= 0 && (storedVol === null || Math.abs(currentVol - storedVol) > 0.01)) {
                    localStorage.setItem(VOLUME_KEY, String(currentVol));
                }
            } catch(e) {}
        }
    }, 1500);
})();
</script>
<script>

(function() {
    var SIZE_KEY = 'stremio_subtitle_size';

    function getSavedSize() {
        try { var v = parseInt(localStorage.getItem(SIZE_KEY), 10); return (v && v >= 50 && v <= 250) ? v : null; } catch(e) { return null; }
    }

    // Monitor subtitle size changes in core state and persist them
    var lastAppliedSize = null;
    var lastPlayerHash = '';

    setInterval(function() {
        var hash = window.location.hash || '';
        if (hash.indexOf('#/player/') !== 0) { lastPlayerHash = ''; return; }

        // On new player session, apply saved size
        if (hash !== lastPlayerHash) {
            lastPlayerHash = hash;
            lastAppliedSize = null;

            // Apply saved subtitle size after a short delay for core to initialise
            var savedSize = getSavedSize();
            if (savedSize !== null && window.core) {
                setTimeout(function() {
                    try {
                        window.core.dispatch({
                            action: 'Player',
                            args: { action: 'SetProp', args: { propName: 'subtitleSize', propValue: savedSize } }
                        }, 'player');
                        console.log('[subs] Applied saved subtitle size:', savedSize);
                        lastAppliedSize = savedSize;
                    } catch(e) { console.log('[subs] Failed to apply subtitle size:', e.message); }
                }, 2000);
            }
        }

        // Watch for user changes to subtitle size
        if (window.core && typeof window.core.getState === 'function') {
            window.core.getState('player').then(function(state) {
                if (!state) return;
                var size = null;
                // Try multiple paths where subtitle size might live
                try { size = state.subtitleSize || (state.settings && state.settings.subtitleSize); } catch(e) {}
                if (size && size >= 50 && size <= 250 && size !== lastAppliedSize) {
                    lastAppliedSize = size;
                    try { localStorage.setItem(SIZE_KEY, String(size)); } catch(e) {}
                }
            }).catch(function() {});
        }
    }, 3000);
})();

<script>

(function() {

    function getSavedLang() {

    }

        var hash = window.location.hash || '';

            lastPlayerHash = hash;
            appliedForHash = '';
        }

        if (!window.core || typeof window.core.getState !== 'function') return;

        window.core.getState('player').then(function(state) {

            var currentLang = null;
            try {
                if (state.selectedSubtitleTrack) {
                    currentLang = state.selectedSubtitleTrack.lang || state.selectedSubtitleTrack.language || null;
                }
                // Also check subtitleTracks for the active one
                if (!currentLang && state.subtitleTracks && Array.isArray(state.subtitleTracks)) {
                    for (var i = 0; i < state.subtitleTracks.length; i++) {

            for (var k = 0; k < tracks.length; k++) {

                if (tLang2.indexOf(savedLang.toLowerCase().substring(0, 2)) === 0) {

<script>
// #12 — Pass full title to native player
// Scrapes the title from the player DOM or core state and passes it in the
// __launchNativePlayer() payload so the native VIDAA player shows the correct title.
(function() {
    // Store the original launcher if it exists, and wrap it
    var origLauncher = window.__launchNativePlayer;

    function getPlayerTitle() {
        // Try 1: Scrape from player DOM (Stremio shows title in player header)
        var titleEls = document.querySelectorAll('[class*="title"], [class*="Title"]');
        for (var i = 0; i < titleEls.length; i++) {
            var txt = (titleEls[i].textContent || '').trim();
            // Filter out very short or very long strings, and UI labels
            if (txt.length > 3 && txt.length < 200 && txt.indexOf('Settings') === -1 && txt.indexOf('Stremio') === -1) {
                return txt;
            }
        }
        // Try 2: Look in the player hash URL for title hints
        var hash = window.location.hash || '';
        var match = hash.match(/[?&]title=([^&]+)/);
        if (match) return decodeURIComponent(match[1]);
        // Try 3: Check window.__STREAM_INFO__ if title was cached there
        if (window.__STREAM_INFO__ && window.__STREAM_INFO__.title) {
            return window.__STREAM_INFO__.title;
        }
        return 'Stremio';
    }

    // Cache title from meta/details page before entering player
    var cachedTitle = 'Stremio';
    setInterval(function() {
        var hash = window.location.hash || '';
        // On detail pages, scrape the title for when user enters player
        if (hash.indexOf('#/detail') === 0 || hash.indexOf('#/metadetails') === 0) {
            var h1s = document.querySelectorAll('h1, h2, [class*="title"], [class*="Title"], [class*="name"], [class*="Name"]');
            for (var i = 0; i < h1s.length; i++) {
                var txt = (h1s[i].textContent || '').trim();
                if (txt.length > 2 && txt.length < 200) {
                    cachedTitle = txt;
                    window.__STREAM_INFO__ = window.__STREAM_INFO__ || {};
                    window.__STREAM_INFO__.title = txt;
                    break;
                }
            }
        }
    }, 2000);

    // Override __launchNativePlayer to include title
    function enhancedLaunchNativePlayer(url) {
        if (!url) {
            var video = document.querySelector('video');
            url = video ? video.currentSrc || video.src : null;
        }
        if (!url) { console.log('[native] No stream URL found'); return false; }

        var title = getPlayerTitle() || cachedTitle || 'Stremio';
        console.log('[native] Launching native player with title:', title);

        try {
            var hasNative = typeof omi_platform !== 'undefined' && typeof omi_platform.sendPlatformMessage === 'function';
            if (!hasNative) return false;

            var messages = [
                {type: 'launchNativePlayer', url: url, title: title, mimeType: 'video/mp4'},
                {type: 'openMediaPlayer', url: url, title: title},
                {type: 'playVideo', url: url, mimeType: 'video/mp4', title: title}
            ];
            for (var i = 0; i < messages.length; i++) {
                try {
                    omi_platform.sendPlatformMessage(JSON.stringify(messages[i]));
                    console.log('[native] Sent:', messages[i].type, 'with title:', title);
                } catch(e) {}
            }
            return true;
        } catch(e) { return false; }
    }

    // Wait for the original to be defined, then override
    var overrideCheck = setInterval(function() {
        if (window.__launchNativePlayer && window.__launchNativePlayer !== enhancedLaunchNativePlayer) {
            window.__launchNativePlayer = enhancedLaunchNativePlayer;
            clearInterval(overrideCheck);
            console.log('[native] Enhanced native player launcher with title support');
        }
    }, 500);
    // Also set it directly in case the original hasn't loaded yet
    setTimeout(function() {
        window.__launchNativePlayer = enhancedLaunchNativePlayer;
        clearInterval(overrideCheck);
    }, 10000);
})();
</script>
<script>
// #13 — Mark as watched after native player handoff
// After launching the native player, we can't track actual progress.
// This patch estimates the user watched enough to mark it and dispatches
// a mark-as-watched action to stremio-core after a configurable delay.
(function() {
    var HANDOFF_KEY = 'stremio_native_handoff';

    // Hook into the native player launch
    var origLaunch = null;
    var hookInstalled = false;

    function installHook() {
        if (hookInstalled) return;
        if (!window.__launchNativePlayer) return;

        origLaunch = window.__launchNativePlayer;
        var wrappedLaunch = function(url) {
            var result = origLaunch(url);
            if (result) {
                // Record the handoff with current player state
                try {
                    var hash = window.location.hash || '';
                    var video = document.querySelector('video');
                    var duration = video ? video.duration : 0;
                    var currentTime = video ? video.currentTime : 0;

                    var handoff = {
                        hash: hash,
                        time: Date.now(),
                        duration: duration,
                        currentTime: currentTime
                    };
                    localStorage.setItem(HANDOFF_KEY, JSON.stringify(handoff));
                    console.log('[watched] Native handoff recorded, duration:', duration, 'currentTime:', currentTime);

                    // After a delay, mark as watched
                    // Assume user will watch enough content in native player
                    setTimeout(function() {
                        markAsWatched(handoff);
                    }, 30000); // 30 seconds — reasonable assumption they're watching
                } catch(e) {
                    console.log('[watched] Failed to record handoff:', e.message);
                }
            }
            return result;
        };
        window.__launchNativePlayer = wrappedLaunch;
        hookInstalled = true;
        console.log('[watched] Native player handoff hook installed');
    }

    function markAsWatched(handoff) {
        if (!window.core || !handoff || !handoff.hash) return;

        // Parse the player hash to extract video/stream info
        // Hash format: #/player/...
        var hash = handoff.hash;

        try {
            // Get current library state and find the item
            window.core.getState('player').then(function(playerState) {
                if (!playerState) return;

                // Try to get meta info from player state
                var metaId = null;
                var videoId = null;
                try {
                    if (playerState.metaItem) metaId = playerState.metaItem.id;
                    if (playerState.video) videoId = playerState.video.id;
                } catch(e) {}

                // Estimate progress: if we know duration, mark 90% watched
                var duration = handoff.duration || 0;
                var estimatedTime = duration > 0 ? duration * 0.9 : 0;

                if (duration > 0) {
                    // Dispatch time update to mark progress
                    try {
                        window.core.dispatch({
                            action: 'Player',
                            args: { action: 'SetProp', args: { propName: 'currentTime', propValue: estimatedTime } }
                        }, 'player');
                        console.log('[watched] Set estimated progress to', Math.round(estimatedTime), 's of', Math.round(duration), 's');
                    } catch(e) {}
                }

                // Also try to push to library as watched
                if (metaId) {
                    try {
                        window.core.dispatch({
                            action: 'Ctx',
                            args: { action: 'MarkAsWatched', args: { id: metaId, videoId: videoId, isWatched: true } }
                        }, 'ctx');
                        console.log('[watched] Marked as watched:', metaId, videoId);
                    } catch(e) {
                        console.log('[watched] MarkAsWatched dispatch failed:', e.message);
                    }
                }
            }).catch(function(e) {
                console.log('[watched] Failed to get player state:', e.message);
            });
        } catch(e) {}

        try { localStorage.removeItem(HANDOFF_KEY); } catch(e) {}
    }

    // Install hook with retry (native player patch may load after us)
    var hookInterval = setInterval(function() {
        if (window.__launchNativePlayer) {
            installHook();
            clearInterval(hookInterval);
        }
    }, 500);
    setTimeout(function() { clearInterval(hookInterval); }, 30000);
})();
</script>
<script>
// #14 — Full subtitle filenames in picker
// Stremio truncates subtitle track names in the picker, losing useful info like
// source, codec, and release group. This patch intercepts addon subtitle responses,
// caches full labels, and patches the subtitle picker DOM to show them.
(function() {
    var fullSubLabels = {};

    // Intercept fetch responses that contain subtitle data from addons
    var origFetch = window.fetch;
    window.fetch = function(url, opts) {
        var result = origFetch.apply(this, arguments);
        try {
            if (typeof url === 'string' && url.indexOf('/subtitles/') !== -1) {
                result.then(function(response) {
                    var cloned = response.clone();
                    cloned.json().then(function(data) {
                        if (data && data.subtitles && Array.isArray(data.subtitles)) {
                            for (var i = 0; i < data.subtitles.length; i++) {
                                var sub = data.subtitles[i];
                                var id = sub.id || sub.url || ('sub_' + i);
                                var fullLabel = '';
                                if (sub.filename) fullLabel = sub.filename;
                                else if (sub.title) fullLabel = sub.title;
                                else if (sub.lang) fullLabel = sub.lang;
                                if (fullLabel) {
                                    // Clean up filename: remove extension, replace dots/underscores
                                    fullLabel = fullLabel.replace(/\.(srt|ass|ssa|sub|vtt|idx)$/i, '');
                                    fullSubLabels[id] = fullLabel;
                                }
                            }
                            console.log('[subs] Cached', Object.keys(fullSubLabels).length, 'full subtitle labels');
                        }
                    }).catch(function() {});
                }).catch(function() {});
            }
        } catch(e) {}
        return result;
    };

    // Expose for debugging
    window.__fullSubLabels = fullSubLabels;

    // Patch subtitle picker DOM to show full filenames
    var patchObserver = new MutationObserver(function() {
        var hash = window.location.hash || '';
        if (hash.indexOf('#/player/') !== 0) return;
        if (Object.keys(fullSubLabels).length === 0) return;

        // Find subtitle picker elements
        var options = document.querySelectorAll('[class*="track"], [class*="Track"], [class*="subtitle"] [class*="option"], [class*="subtitlesPicker"] [class*="row"]');
        for (var i = 0; i < options.length; i++) {
            if (options[i].getAttribute('data-full-label')) continue;
            var text = (options[i].textContent || '').trim();
            // Try to find a matching full label
            for (var id in fullSubLabels) {
                var full = fullSubLabels[id];
                // Match if the truncated text is a prefix of the full label, or if the language matches
                if (full.toLowerCase().indexOf(text.toLowerCase()) === 0 ||
                    text.toLowerCase().indexOf(full.substring(0, 10).toLowerCase()) === 0) {
                    options[i].setAttribute('data-full-label', full);
                    options[i].setAttribute('title', full);
                    // Show a truncated but longer version
                    if (full.length > 60) {
                        options[i].textContent = full.substring(0, 57) + '...';
                    } else {
                        options[i].textContent = full;
                    }
                    break;
                }
            }
        }
    });

    // Activate observer when in player
    setInterval(function() {
        var hash = window.location.hash || '';
        if (hash.indexOf('#/player/') === 0) {
            patchObserver.observe(document.body, { childList: true, subtree: true });
        } else {
            patchObserver.disconnect();
            fullSubLabels = {};
            window.__fullSubLabels = fullSubLabels;
        }
    }, 2000);
})();
</script>
<script>
// #15 — Prefetch next episode
// When the user is watching an episode, extract the next episode info and fire
// a background fetch to warm the streaming server cache, reducing load time
// when they advance to the next episode.
(function() {
    var prefetchedUrl = '';
    var lastPlayerHash = '';

    setInterval(function() {
        var hash = window.location.hash || '';
        if (hash.indexOf('#/player/') !== 0) { lastPlayerHash = ''; prefetchedUrl = ''; return; }
        if (hash === lastPlayerHash) return;
        lastPlayerHash = hash;
        prefetchedUrl = '';

        // Wait for video to be playing for a bit before prefetching
        setTimeout(function() {
            if (!window.core || typeof window.core.getState !== 'function') return;

            window.core.getState('player').then(function(state) {
                if (!state) return;

                // Look for next video/episode info in player state
                var nextVideo = null;
                try {
                    if (state.nextVideo) nextVideo = state.nextVideo;
                    else if (state.seriesInfo && state.seriesInfo.nextVideo) nextVideo = state.seriesInfo.nextVideo;
                    else if (state.nextEpisode) nextVideo = state.nextEpisode;
                } catch(e) {}

                if (!nextVideo) {
                    console.log('[prefetch] No next episode data found');
                    return;
                }

                // Extract stream URL for next episode
                var nextUrl = null;
                try {
                    if (nextVideo.stream && nextVideo.stream.url) nextUrl = nextVideo.stream.url;
                    else if (nextVideo.url) nextUrl = nextVideo.url;
                    else if (nextVideo.deepLinks && nextVideo.deepLinks.player) {
                        // We can navigate to this to load it, but for prefetch we need
                        // to trigger the streaming server to prepare the stream
                        var serverUrl = window.__STREMIO_SERVER_URL__;
                        if (serverUrl && serverUrl !== 'http://127.0.0.1:11470') {
                            // Try to construct a prefetch hint URL for the server
                            console.log('[prefetch] Next episode available via deepLink:', nextVideo.deepLinks.player);
                        }
                    }
                } catch(e) {}

                if (nextUrl && nextUrl !== prefetchedUrl) {
                    prefetchedUrl = nextUrl;
                    console.log('[prefetch] Warming cache for next episode:', nextUrl.substring(0, 80));

                    // Fire a HEAD request to warm the streaming server cache
                    // This triggers the server to start fetching/preparing the stream
                    try {
                        fetch(nextUrl, {
                            method: 'HEAD',
                            mode: 'no-cors'
                        }).then(function() {
                            console.log('[prefetch] Cache warm request sent successfully');
                        }).catch(function() {
                            // no-cors may "fail" but the request still goes out
                            console.log('[prefetch] Cache warm request sent (no-cors)');
                        });
                    } catch(e) {
                        console.log('[prefetch] Failed to send prefetch:', e.message);
                    }
                }
            }).catch(function() {});
        }, 15000); // Wait 15s into playback before prefetching next
    }, 5000);
})();
</script>
<script>
// #16 — WebTorrent in-browser torrent streaming (Experimental)
// Intercepts magnet: URIs from torrent addons and streams them via WebTorrent.
// Settings toggle in Settings page, status overlay in player.
(function() {
    'use strict';

    var LS_KEY = 'stremio_webtorrent_enabled';
    var LOG_PREFIX = '[torrent]';
    var MAX_BUFFER_MB = 100;
    var OVERLAY_HIDE_DELAY = 10000;
    var TRACKERS = [
        'wss://tracker.webtorrent.dev',
        'wss://tracker.openwebtorrent.com',
        'wss://tracker.btorrent.xyz'
    ];

    // ─── State ────────────────────────────────────────────────────
    var clientLoaded = false;
    var clientLoading = false;
    var activeTorrent = null;
    var activeBlobUrl = null;
    var overlayEl = null;
    var overlayTimer = null;
    var statsInterval = null;
    var lastInterceptedSrc = '';

    function isEnabled() {
        try { return localStorage.getItem(LS_KEY) === 'true'; } catch(e) { return false; }
    }

    function setEnabled(val) {
        try { localStorage.setItem(LS_KEY, val ? 'true' : 'false'); } catch(e) {}
    }

    function log() {
        var args = [LOG_PREFIX];
        for (var i = 0; i < arguments.length; i++) args.push(arguments[i]);
        console.log.apply(console, args);
    }

    // ─── CDN Loader ───────────────────────────────────────────────
    function loadWebTorrentLib(cb) {
        if (window.WebTorrent) { clientLoaded = true; cb(null); return; }
        if (clientLoading) {
            var waitCount = 0;
            var waitId = setInterval(function() {
                waitCount++;
                if (window.WebTorrent) { clearInterval(waitId); clientLoaded = true; cb(null); }
                else if (waitCount > 100) { clearInterval(waitId); cb(new Error('Timeout loading WebTorrent')); }
            }, 200);
            return;
        }
        clientLoading = true;
        log('Loading WebTorrent library from CDN...');
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js';
        s.onload = function() {
            clientLoaded = true;
            clientLoading = false;
            log('WebTorrent library loaded successfully');
            cb(null);
        };
        s.onerror = function() {
            clientLoading = false;
            log('Failed to load WebTorrent library');
            cb(new Error('Failed to load WebTorrent from CDN'));
        };
        document.head.appendChild(s);
    }

    // ─── Client Management ────────────────────────────────────────
    function getClient() {
        if (window.__webtorrentClient && !window.__webtorrentClient.destroyed) {
            return window.__webtorrentClient;
        }
        if (!window.WebTorrent) return null;
        log('Creating new WebTorrent client');
        window.__webtorrentClient = new window.WebTorrent({
            maxConns: 5,
            tracker: { announce: TRACKERS }
        });
        window.__webtorrentClient.on('error', function(err) {
            log('Client error:', err.message);
        });
        return window.__webtorrentClient;
    }

    function destroyClient() {
        if (statsInterval) { clearInterval(statsInterval); statsInterval = null; }
        if (activeTorrent) {
            try { activeTorrent.destroy(); } catch(e) {}
            activeTorrent = null;
        }
        if (activeBlobUrl) {
            try { URL.revokeObjectURL(activeBlobUrl); } catch(e) {}
            activeBlobUrl = null;
        }
        if (window.__webtorrentClient) {
            try { window.__webtorrentClient.destroy(); } catch(e) {}
            window.__webtorrentClient = null;
        }
        removeOverlay();
        log('Client destroyed and cleaned up');
    }

    // ─── Overlay ──────────────────────────────────────────────────
    function createOverlay() {
        if (overlayEl) return overlayEl;
        overlayEl = document.createElement('div');
        overlayEl.id = 'webtorrent-overlay';
        overlayEl.style.cssText = 'position:fixed;bottom:60px;left:16px;background:rgba(0,0,0,0.75);color:#fff;font-family:PlusJakartaSans,monospace;font-size:0.8rem;padding:8px 14px;border-radius:8px;z-index:99999;pointer-events:none;transition:opacity 0.3s;opacity:1;max-width:350px;';
        overlayEl.textContent = 'Connecting to peers...';
        document.body.appendChild(overlayEl);
        scheduleOverlayHide();
        return overlayEl;
    }

    function removeOverlay() {
        if (overlayEl) {
            try { overlayEl.remove(); } catch(e) {}
            overlayEl = null;
        }
        if (overlayTimer) { clearTimeout(overlayTimer); overlayTimer = null; }
    }

    function scheduleOverlayHide() {
        if (overlayTimer) clearTimeout(overlayTimer);
        overlayTimer = setTimeout(function() {
            if (overlayEl) overlayEl.style.opacity = '0';
        }, OVERLAY_HIDE_DELAY);
    }

    function showOverlay() {
        if (overlayEl) {
            overlayEl.style.opacity = '1';
            scheduleOverlayHide();
        }
    }

    function updateOverlayStats(torrent) {
        if (!overlayEl || !torrent) return;
        var dlSpeed = (torrent.downloadSpeed / (1024 * 1024)).toFixed(1);
        var peers = torrent.numPeers || 0;
        var progress = Math.round((torrent.progress || 0) * 100);
        var ulSpeed = (torrent.uploadSpeed / (1024 * 1024)).toFixed(1);
        overlayEl.textContent = '\u2193 ' + dlSpeed + ' MB/s | ' + peers + ' peers | ' + progress + '% buffered' + (parseFloat(ulSpeed) > 0 ? ' | \u2191 ' + ulSpeed + ' MB/s' : '');
        overlayEl.style.opacity = '1';
    }

    // ─── Magnet Detection & Streaming ─────────────────────────────
    function isMagnet(url) {
        return typeof url === 'string' && url.indexOf('magnet:') === 0;
    }

    function showDisabledMessage() {
        var existing = document.getElementById('webtorrent-disabled-msg');
        if (existing) return;
        var msg = document.createElement('div');
        msg.id = 'webtorrent-disabled-msg';
        msg.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:99999;';
        msg.innerHTML = '<div style="text-align:center;max-width:500px;padding:32px;">' +
            '<div style="font-size:1.5rem;color:#fff;font-family:PlusJakartaSans,sans-serif;font-weight:700;margin-bottom:16px;">Torrent Stream Detected</div>' +
            '<div style="color:#aaa;font-size:1rem;line-height:1.5;font-family:PlusJakartaSans,sans-serif;margin-bottom:24px;">This stream requires torrent support. Enable <span style="color:#7b5bf5;font-weight:600;">Direct Torrent Streaming</span> in Settings, or use Real-Debrid / a streaming server.</div>' +
            '<div style="color:#666;font-size:0.85rem;font-family:PlusJakartaSans,sans-serif;">Press Back to return.</div>' +
            '</div>';
        document.body.appendChild(msg);
        // Remove on back/hash change
        var removeMsg = function() {
            try { msg.remove(); } catch(e) {}
            window.removeEventListener('hashchange', removeMsg);
        };
        window.addEventListener('hashchange', removeMsg);
        // Also remove on Back key (keyCode 8 or 461)
        var keyHandler = function(e) {
            if (e.keyCode === 8 || e.keyCode === 461 || e.keyCode === 10009) {
                removeMsg();
                document.removeEventListener('keydown', keyHandler, true);
            }
        };
        document.addEventListener('keydown', keyHandler, true);
    }

    function streamMagnet(magnetURI, videoEl) {
        log('Streaming magnet:', magnetURI.substring(0, 80) + '...');
        loadWebTorrentLib(function(err) {
            if (err) {
                log('Cannot stream — library failed to load');
                showDisabledMessage();
                return;
            }
            var client = getClient();
            if (!client) {
                log('Cannot create WebTorrent client');
                return;
            }

            // Destroy previous torrent if any
            if (activeTorrent) {
                try { activeTorrent.destroy(); } catch(e) {}
                activeTorrent = null;
            }
            if (activeBlobUrl) {
                try { URL.revokeObjectURL(activeBlobUrl); } catch(e) {}
                activeBlobUrl = null;
            }

            createOverlay();
            overlayEl.textContent = 'Connecting to peers...';

            // Check if torrent already added
            var existing = client.get(magnetURI);
            if (existing) {
                handleTorrent(existing, videoEl);
                return;
            }

            client.add(magnetURI, {
                announce: TRACKERS,
                strategy: 'sequential'
            }, function(torrent) {
                handleTorrent(torrent, videoEl);
            });
        });
    }

    function handleTorrent(torrent, videoEl) {
        activeTorrent = torrent;
        log('Torrent ready:', torrent.name, '| Files:', torrent.files.length);

        // Find largest file (the video)
        var videoFile = torrent.files[0];
        for (var i = 1; i < torrent.files.length; i++) {
            if (torrent.files[i].length > videoFile.length) {
                videoFile = torrent.files[i];
            }
        }
        log('Selected file:', videoFile.name, '(' + Math.round(videoFile.length / 1048576) + ' MB)');

        // Deselect all files, then select only the video file for sequential download
        torrent.files.forEach(function(f) { try { f.deselect(); } catch(e) {} });
        try { videoFile.select(); } catch(e) {}

        // Get blob URL and set video source
        videoFile.getBlobURL(function(err, url) {
            if (err) {
                log('Failed to get blob URL:', err.message);
                // Fallback: try streaming via renderTo
                try {
                    videoFile.renderTo(videoEl, { autoplay: true }, function(err2) {
                        if (err2) log('renderTo also failed:', err2.message);
                        else log('Streaming via renderTo');
                    });
                } catch(e2) {
                    log('All streaming methods failed');
                }
                return;
            }
            activeBlobUrl = url;
            videoEl.src = url;
            videoEl.play().catch(function() {});
            log('Streaming started via blob URL');
        });

        // Stats overlay update
        if (statsInterval) clearInterval(statsInterval);
        statsInterval = setInterval(function() {
            if (!activeTorrent || activeTorrent.destroyed) {
                clearInterval(statsInterval);
                statsInterval = null;
                return;
            }
            updateOverlayStats(torrent);

            // Memory management: deselect already-played pieces
            if (videoEl.currentTime > 0 && videoFile.length > 0) {
                try {
                    var playedRatio = videoEl.currentTime / (videoEl.duration || 1);
                    var playedBytes = Math.floor(playedRatio * videoFile.length);
                    // Rough piece calculation — deselect old pieces to free memory
                    if (torrent.pieceLength && playedBytes > torrent.pieceLength * 10) {
                        var playedPieces = Math.floor(playedBytes / torrent.pieceLength);
                        for (var p = 0; p < playedPieces - 5; p++) {
                            try { torrent.deselect(p, p, false); } catch(e) {}
                        }
                    }
                } catch(e) {}
            }

            // Memory pressure check
            try {
                if (performance && performance.memory && performance.memory.usedJSHeapSize) {
                    var usedMB = performance.memory.usedJSHeapSize / 1048576;
                    if (usedMB > MAX_BUFFER_MB * 3) {
                        log('Memory pressure detected (' + Math.round(usedMB) + 'MB), reducing connections');
                        if (torrent.maxWebConns > 2) torrent.maxWebConns = 2;
                    }
                }
            } catch(e) {}
        }, 2000);

        torrent.on('error', function(err) {
            log('Torrent error:', err.message);
        });

        torrent.on('done', function() {
            log('Torrent download complete');
            if (overlayEl) overlayEl.textContent = 'Download complete | Seeding';
        });
    }

    // ─── Video Source Interception ─────────────────────────────────
    // Poll for video element src changes — more reliable on VIDAA than MutationObserver
    setInterval(function() {
        var hash = window.location.hash || '';
        if (hash.indexOf('#/player/') !== 0) return;

        var video = document.querySelector('video');
        if (!video) return;

        var src = video.currentSrc || video.src || '';
        if (!src || src === lastInterceptedSrc) return;
        if (!isMagnet(src)) return;

        lastInterceptedSrc = src;
        log('Magnet URI detected in video source');

        if (!isEnabled()) {
            showDisabledMessage();
            return;
        }

        // Clear the invalid magnet src from video element
        video.pause();
        video.removeAttribute('src');
        video.load();

        streamMagnet(src, video);
    }, 500);

    // Also try to intercept via core state
    setInterval(function() {
        var hash = window.location.hash || '';
        if (hash.indexOf('#/player/') !== 0) return;
        try {
            var state = window.core && window.core.getState('player');
            if (!state) return;
            var streamUrl = null;
            if (state.stream && state.stream.url) streamUrl = state.stream.url;
            else if (state.stream && state.stream.infoHash) {
                // Torrent stream detected via infoHash — construct magnet
                streamUrl = 'magnet:?xt=urn:btih:' + state.stream.infoHash;
                if (state.stream.fileIdx !== undefined) streamUrl += '&so=' + state.stream.fileIdx;
            }
            if (!streamUrl || !isMagnet(streamUrl)) return;
            if (streamUrl === lastInterceptedSrc) return;

            lastInterceptedSrc = streamUrl;
            log('Magnet/infoHash detected in core state');

            var video = document.querySelector('video');
            if (!video) return;

            if (!isEnabled()) {
                showDisabledMessage();
                return;
            }

            video.pause();
            video.removeAttribute('src');
            video.load();

            streamMagnet(streamUrl, video);
        } catch(e) {}
    }, 1000);

    // ─── Cleanup on Navigation Away from Player ───────────────────
    var wasInPlayer = false;
    setInterval(function() {
        var hash = window.location.hash || '';
        var inPlayer = hash.indexOf('#/player/') === 0;
        if (wasInPlayer && !inPlayer) {
            log('Left player — cleaning up');
            destroyClient();
            lastInterceptedSrc = '';
        }
        wasInPlayer = inPlayer;
    }, 1000);

    // ─── Info Button Shows Overlay ────────────────────────────────
    document.addEventListener('keydown', function(e) {
        // Info/Display button on remote (keyCode 457) or i key
        if ((e.keyCode === 457 || e.keyCode === 73) && activeTorrent) {
            var hash = window.location.hash || '';
            if (hash.indexOf('#/player/') !== 0) return;
            showOverlay();
        }
    }, true);

    // ─── Settings Toggle Injection ────────────────────────────────
    var lastSettingsCheck = '';
    setInterval(function() {
        var hash = window.location.hash || '';
        if (hash.indexOf('#/settings') !== 0) { lastSettingsCheck = ''; return; }
        if (lastSettingsCheck === hash) return;
        lastSettingsCheck = hash;

        setTimeout(function() {
            if (document.getElementById('webtorrent-toggle')) return;

            // Find settings container (same approach as exit button patch)
            var containers = document.querySelectorAll('[class*="settings"]');
            var target = null;
            for (var i = 0; i < containers.length; i++) {
                if (containers[i].scrollHeight > 100) { target = containers[i]; break; }
            }
            if (!target) {
                var divs = document.querySelectorAll('div');
                for (var j = divs.length - 1; j >= 0; j--) {
                    if (divs[j].scrollHeight > 300 && divs[j].children.length > 2) {
                        target = divs[j]; break;
                    }
                }
            }
            if (!target) return;

            var enabled = isEnabled();

            var toggleDiv = document.createElement('div');
            toggleDiv.id = 'webtorrent-toggle';
            toggleDiv.setAttribute('tabindex', '0');
            toggleDiv.style.cssText = 'margin:16px auto;padding:14px 24px;background:rgba(123,91,245,0.1);border:1px solid rgba(123,91,245,0.3);border-radius:10px;max-width:400px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;';

            var labelDiv = document.createElement('div');
            labelDiv.innerHTML = '<div style="color:#ccc;font-size:0.95rem;font-weight:600;">Direct Torrent Streaming</div>' +
                '<div style="color:#777;font-size:0.8rem;">Experimental \u2014 streams torrents in-browser via WebTorrent</div>';

            var indicatorDiv = document.createElement('div');
            indicatorDiv.id = 'wt-toggle-indicator';
            indicatorDiv.style.cssText = 'width:44px;height:24px;border-radius:12px;background:' + (enabled ? '#7b5bf5' : '#333') + ';position:relative;transition:background 0.2s;flex-shrink:0;';

            var knob = document.createElement('div');
            knob.style.cssText = 'width:20px;height:20px;border-radius:10px;background:#fff;position:absolute;top:2px;left:' + (enabled ? '22px' : '2px') + ';transition:left 0.2s;';
            indicatorDiv.appendChild(knob);

            toggleDiv.appendChild(labelDiv);
            toggleDiv.appendChild(indicatorDiv);

            // Status message
            var statusDiv = document.createElement('div');
            statusDiv.id = 'wt-status-msg';
            statusDiv.style.cssText = 'margin:0 auto;max-width:400px;text-align:center;font-size:0.75rem;color:#666;font-family:PlusJakartaSans,sans-serif;min-height:1.2em;';
            statusDiv.textContent = enabled ? 'WebTorrent is enabled. Magnet links will stream in-browser.' : '';

            function doToggle() {
                var nowEnabled = !isEnabled();
                setEnabled(nowEnabled);
                indicatorDiv.style.background = nowEnabled ? '#7b5bf5' : '#333';
                knob.style.left = nowEnabled ? '22px' : '2px';
                statusDiv.textContent = nowEnabled ? 'WebTorrent is enabled. Magnet links will stream in-browser.' : 'WebTorrent is disabled.';
                log('WebTorrent toggled:', nowEnabled ? 'ON' : 'OFF');

                // Pre-load library when enabling
                if (nowEnabled && !clientLoaded) {
                    statusDiv.textContent = 'Loading WebTorrent library...';
                    loadWebTorrentLib(function(err) {
                        if (err) statusDiv.textContent = 'Failed to load library. Check connection.';
                        else statusDiv.textContent = 'WebTorrent ready. Magnet links will stream in-browser.';
                    });
                }
            }

            toggleDiv.onclick = doToggle;
            toggleDiv.onkeydown = function(e) { if (e.keyCode === 13 || e.keyCode === 32) { e.preventDefault(); doToggle(); } };
            toggleDiv.onfocus = function() { this.style.outline = '3px solid #7b5bf5'; };
            toggleDiv.onblur = function() { this.style.outline = 'none'; };

            // Insert before exit button if it exists, otherwise append
            var exitBtn = document.getElementById('vidaa-exit-btn');
            if (exitBtn) {
                target.insertBefore(statusDiv, exitBtn);
                target.insertBefore(toggleDiv, statusDiv);
            } else {
                target.appendChild(toggleDiv);
                target.appendChild(statusDiv);
            }

            log('Settings toggle injected');
        }, 800);
    }, 1000);

    // ─── Programmatic API ─────────────────────────────────────────
    window.__toggleWebTorrent = function() {
        var nowEnabled = !isEnabled();
        setEnabled(nowEnabled);
        log('WebTorrent toggled programmatically:', nowEnabled ? 'ON' : 'OFF');
        if (nowEnabled && !clientLoaded) {
            loadWebTorrentLib(function(err) {
                if (err) log('Failed to pre-load library');
            });
        }
        return nowEnabled;
    };

    window.__getWebTorrentStatus = function() {
        return {
            enabled: isEnabled(),
            libraryLoaded: clientLoaded,
            clientActive: !!(window.__webtorrentClient && !window.__webtorrentClient.destroyed),
            activeTorrent: activeTorrent ? {
                name: activeTorrent.name,
                progress: Math.round((activeTorrent.progress || 0) * 100),
                downloadSpeed: activeTorrent.downloadSpeed,
                peers: activeTorrent.numPeers
            } : null
        };
    };

    log('WebTorrent patch loaded (enabled:', isEnabled(), ')');
})();
</script>
