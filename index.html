    <script>
    // Configurable streaming server URL
    // Usage: ?server=http://192.168.1.50:11470
    // Saved to localStorage so you only need to pass it once.
    (function() {
        var params = new URLSearchParams(window.location.search);
        var server = params.get('server');
        if (server) {
            server = server.replace(/\/+$/, '');
            localStorage.setItem('stremio_server_url', server);
        }
        window.__STREMIO_SERVER_URL__ = localStorage.getItem('stremio_server_url') || 'http://127.0.0.1:11470';
    })();
    </script>
    <script>
    // XSS escape helper for dynamic innerHTML values
    function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    </script>
    <script>
    // VIDAA keyboard fix v5 — intercept programmatic input.value changes
    // The VIDAA system keyboard sets input.value directly without firing DOM events.
    // This script: (1) overrides the value setter to fire synthetic events,
    // (2) polls as fallback, (3) directly updates URL hash as nuclear option.
    (function() {
        window.__STREMIO_PATCH_VERSION__ = 5;

        // Layer 1: Override HTMLInputElement.prototype.value setter
        try {
            var desc = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
            if (desc && desc.set) {
                var origSet = desc.set;
                var origGet = desc.get;
                var guard = false;
                Object.defineProperty(HTMLInputElement.prototype, 'value', {
                    get: origGet,
                    set: function(v) {
                        var old = origGet.call(this);
                        origSet.call(this, v);
                        if (v !== old && !guard) {
                            guard = true;
                            try {
                                this.dispatchEvent(new Event('input', { bubbles: true }));
                            } catch(e) {}
                            guard = false;
                        }
                    },
                    configurable: true
                });
            }
        } catch(e) {}

        // Layer 2: Polling fallback (250ms — balanced for TV CPU)
        var _prev = '';
        setInterval(function() {
            try {
                var hash = window.location.hash || '';
                if (hash.indexOf('#/search') !== 0) { _prev = ''; return; }
                var el = document.querySelector('input[type="text"]')
                      || document.querySelector('input[placeholder]')
                      || document.querySelector('input');
                if (!el) return;
                var v = el.value || '';
                if (v === _prev) return;
                _prev = v;

                try {
                    el.dispatchEvent(new Event('input', { bubbles: true }));
                    el.dispatchEvent(new Event('change', { bubbles: true }));
                } catch(e) {}

                // Layer 3: Nuclear option — directly update URL hash
                if (v.length > 0) {
                    var encoded = encodeURIComponent(v);
                    if (hash.indexOf('query=' + encoded) === -1) {
                        window.location.hash = '#/search?query=' + encoded;
                    }
                }
            } catch(e) {}
        }, 250);
    })();
    </script>

<script>
// Server URL sync — push ?server= URL into WASM core
(function() {
    var serverUrl = window.__STREMIO_SERVER_URL__;
    if (!serverUrl || serverUrl === 'http://127.0.0.1:11470') return;

    var attempts = 0;
    var interval = setInterval(function() {
        if (++attempts > 60) { clearInterval(interval); return; }
        if (!window.core) return;
        clearInterval(interval);

        window.core.getState('ctx').then(function(ctxState) {
            if (!ctxState || !ctxState.profile || !ctxState.profile.settings) return;
            var currentSettings = ctxState.profile.settings;
            if (currentSettings.streamingServerUrl === serverUrl) {
                console.log('[server-sync] URL already correct');
                return;
            }
            console.log('[server-sync] Syncing URL to WASM core:', serverUrl);
            var newSettings = {};
            for (var k in currentSettings) newSettings[k] = currentSettings[k];
            newSettings.streamingServerUrl = serverUrl;
            window.core.dispatch({ action: 'Ctx', args: { action: 'UpdateSettings', args: newSettings } }, 'ctx').then(function() {
                console.log('[server-sync] Settings updated, reloading streaming server');
                return window.core.dispatch({ action: 'StreamingServer', args: { action: 'Reload' } }, 'streaming_server');
            }).then(function() {
                console.log('[server-sync] Streaming server reloaded successfully');
            }).catch(function(e) {
                console.error('[server-sync] Error:', e);
            });
        }).catch(function(e) {
            console.error('[server-sync] Failed to get ctx state:', e);
        });
    }, 500);
})();
</script>
<script>
// Auto-reload streaming server when URL changes in Settings UI
(function() {
    var lastKnownUrl = null;
    var watchDelay = 0;
    setInterval(function() {
        if (++watchDelay < 5) return; // Skip first 10 seconds to let server-sync finish
        if (!window.core) return;
        if ((window.location.hash || '').indexOf('#/settings') !== 0) return;
        window.core.getState('ctx').then(function(state) {
            if (!state || !state.profile || !state.profile.settings) return;
            var url = state.profile.settings.streamingServerUrl;
            if (lastKnownUrl === null) { lastKnownUrl = url; return; }
            if (url !== lastKnownUrl) {
                console.log('[server-watch] URL changed:', lastKnownUrl, '->', url);
                lastKnownUrl = url;
                window.__STREMIO_SERVER_URL__ = url;
                try { localStorage.setItem('stremio_server_url', url); } catch(e) {}
                window.core.dispatch({ action: 'StreamingServer', args: { action: 'Reload' } }, 'streaming_server').then(function() {
                    console.log('[server-watch] Streaming server reloaded');
                }).catch(function(e) {
                    console.error('[server-watch] Reload failed:', e);
                });
            }
        }).catch(function() {});
    }, 2000);
})();
</script>
<script>
// Smart DV/HDR stream handling
// Based on live hardware testing on Hisense PX1HE (100L5H):
// - DV+HDR in MKV at 4K: PLAYS NATIVELY (no transcoding needed)
// - DV+HDR in MP4: crashes browser (container issue)
// - Content >4K (4320p/8K upscale): black screen (decoder limit)
// - HEVC 4K 10-bit: plays fine
// - AV1: not supported
// NOTE: Other TVs may have different codec support — users can disable
// the playback warning via Settings > VIDAA > Playback Warning
(function() {
    var WARN_KEY = 'stremio_playback_warning';
    window.__DV_PROFILE7_DETECTED__ = false;
    window.__STREAM_INFO__ = {};

    // Default OFF — do not block streams that look stalled, many eventually recover
    // and the full-screen overlay blocks the TV remote from navigating elsewhere.
    // Users who want the codec/stall helper can opt in via Settings > VIDAA > Playback Warning.
    try { if (localStorage.getItem(WARN_KEY) === null) localStorage.setItem(WARN_KEY, 'false'); } catch(e) {}

    function isWarningEnabled() {
        try { return localStorage.getItem(WARN_KEY) === 'true'; } catch(e) { return false; }
    }

    // Monitor video element for playback failures — warn only on actual failure
    var watchInterval = null;

    function startPlaybackWatch() {
        if (watchInterval) return;
        watchInterval = setInterval(function() {
            var hash = window.location.hash || '';
            if (hash.indexOf('#/player/') !== 0) {
                if (watchInterval) { clearInterval(watchInterval); watchInterval = null; }
                return;
            }
            if (!isWarningEnabled()) return; // User disabled playback warning
            if (window.__QUIET_PLAYER_ACTIVE__) return; // Freed CPU for the video decoder
            var video = document.querySelector('video');
            if (!video) return;

            // Check for >4K resolution (decoder limit)
            if (video.videoWidth > 4096 || video.videoHeight > 2160) {
                console.warn('[stream] Resolution ' + video.videoWidth + 'x' + video.videoHeight + ' exceeds 4K — may cause issues');
                window.__STREAM_INFO__.oversize = true;
            }

            // Detect stalled DV playback (black screen = video loads but no frames render)
            if (video.readyState >= 2 && video.currentTime === 0 && !video.paused && !video.ended) {
                // Video thinks it's playing but stuck at 0 — possible black screen
                if (!window.__STREAM_INFO__.stallCheck) {
                    window.__STREAM_INFO__.stallCheck = Date.now();
                } else if (Date.now() - window.__STREAM_INFO__.stallCheck > 8000) {
                    // 8 seconds with no progress — likely a black screen
                    console.warn('[stream] Playback stalled — possible codec/container issue');
                    showPlaybackWarning();
                    window.__STREAM_INFO__.stallCheck = null;
                }
            } else {
                window.__STREAM_INFO__.stallCheck = null;
            }
        }, 2000);
    }

    // Watch for player route
    var wasInPlayer = false;
    setInterval(function() {
        var hash = window.location.hash || '';
        var inPlayer = hash.indexOf('#/player/') === 0;
        if (inPlayer) {
            if (!wasInPlayer) { window.__STREAM_INFO__ = {}; }
            startPlaybackWatch();
        }
        if (!inPlayer) { window.__FORCE_TRANSCODE__ = false; }
        wasInPlayer = inPlayer;
    }, 1000);

    // Intercept probe responses — log codec info but DON'T block playback
    var origFetch = window.fetch;
    window.fetch = function(url, opts) {
        var result = origFetch.apply(this, arguments);
        try {
            if (typeof url === 'string' && url.indexOf('/hlsv2/') !== -1 && url.indexOf('probe') !== -1) {
                result.then(function(response) {
                    var cloned = response.clone();
                    cloned.json().then(function(data) {
                        if (data && Array.isArray(data.streams)) {
                            for (var i = 0; i < data.streams.length; i++) {
                                var s = data.streams[i];
                                if (s.track === 'video') {
                                    window.__STREAM_INFO__.videoCodec = s.codec;
                                    window.__STREAM_INFO__.width = s.width;
                                    window.__STREAM_INFO__.height = s.height;
                                    if (s.codec && /^dv(he|h1)/.test(s.codec)) {
                                        window.__DV_PROFILE7_DETECTED__ = s.codec;
                                        console.log('[DV] Detected:', s.codec, s.width + 'x' + s.height, '— letting browser attempt native playback');
                                    }
                                }
                            }
                        }
                    }).catch(function() {});
                });
            }
        } catch(e) {}
        return result;
    };

    function showPlaybackWarning() {
        var existing = document.getElementById('dv-warning');
        if (existing) return;

        var codec = window.__STREAM_INFO__.videoCodec || 'unknown';
        var res = (window.__STREAM_INFO__.width || '?') + 'x' + (window.__STREAM_INFO__.height || '?');
        var isOversize = window.__STREAM_INFO__.width > 4096 || window.__STREAM_INFO__.height > 2160;

        var overlay = document.createElement('div');
        overlay.id = 'dv-warning';
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:100000;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;font-family:PlusJakartaSans,sans-serif;';

        var title = isOversize ? 'Resolution Too High' : 'Playback Issue Detected';
        var detail = isOversize
            ? 'This stream is ' + esc(res) + ' which exceeds your TV\'s 4K decode limit. Try a 2160p or 1080p source instead.'
            : 'This stream (' + esc(codec) + ' @ ' + esc(res) + ') is not rendering. The container format may be incompatible. Try an MKV source, or transcode via your streaming server.';

        var inner = '<div style="font-size:2.2rem;margin-bottom:1rem;font-weight:700;">' + title + '</div>'
            + '<div style="font-size:1.1rem;color:rgba(255,255,255,0.65);margin-bottom:2rem;text-align:center;max-width:560px;line-height:1.5;">' + detail + '</div>'
            + '<div id="dv-actions" style="display:flex;gap:1.2rem;"></div>';
        overlay.innerHTML = inner;

        var actionsDiv = overlay.querySelector('#dv-actions');

        // Native Player button (VIDAA only)
        var hasNativePlayer = false;
        try { hasNativePlayer = typeof omi_platform !== 'undefined' && typeof omi_platform.sendPlatformMessage === 'function'; } catch(e) {}

        if (hasNativePlayer) {
            var nativeBtn = document.createElement('button');
            nativeBtn.textContent = 'Open in Native Player';
            nativeBtn.style.cssText = 'padding:0.9rem 2.2rem;font-size:1.1rem;background:#7b5bf5;color:white;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;';
            nativeBtn.setAttribute('tabindex', '0');
            nativeBtn.onfocus = function() { this.style.outline = '3px solid #a78bfa'; };
            nativeBtn.onblur = function() { this.style.outline = 'none'; };
            nativeBtn.onclick = function() {
                window.__STREAM_INFO__.stallCheck = null;
                var video = document.querySelector('video');
                var streamUrl = video ? video.currentSrc || video.src : null;
                if (streamUrl) {
                    window.__launchNativePlayer(streamUrl);
                    overlay.remove();
                }
            };
            actionsDiv.appendChild(nativeBtn);
        }

        var transBtn = document.createElement('button');
        transBtn.textContent = 'Force Transcode';
        transBtn.style.cssText = 'padding:0.9rem 2.2rem;font-size:1.1rem;background:' + (hasNativePlayer ? 'rgba(255,255,255,0.1)' : '#7b5bf5') + ';color:white;border:' + (hasNativePlayer ? '1px solid rgba(255,255,255,0.25)' : 'none') + ';border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;';
        transBtn.setAttribute('tabindex', '0');
        transBtn.onfocus = function() { this.style.outline = '3px solid #a78bfa'; };
        transBtn.onblur = function() { this.style.outline = 'none'; };
        transBtn.onclick = function() {
            window.__STREAM_INFO__.stallCheck = null;
            window.__FORCE_TRANSCODE__ = true;
            overlay.remove();
            var ch = window.location.hash;
            window.location.hash = '#/home';
            setTimeout(function() { window.location.hash = ch; }, 100);
        };
        actionsDiv.appendChild(transBtn);

        var skipBtn = document.createElement('button');
        skipBtn.textContent = 'Try Another Source';
        skipBtn.style.cssText = 'padding:0.9rem 2.2rem;font-size:1.1rem;background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.25);border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;';
        skipBtn.setAttribute('tabindex', '0');
        skipBtn.onfocus = function() { this.style.outline = '3px solid #a78bfa'; };
        skipBtn.onblur = function() { this.style.outline = 'none'; };
        skipBtn.onclick = function() {
            window.__STREAM_INFO__.stallCheck = null;
            overlay.remove();
            window.history.back();
        };
        actionsDiv.appendChild(skipBtn);

        var dismissBtn = document.createElement('button');
        dismissBtn.textContent = 'Dismiss';
        dismissBtn.style.cssText = 'padding:0.9rem 2.2rem;font-size:1.1rem;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;';
        dismissBtn.setAttribute('tabindex', '0');
        dismissBtn.onfocus = function() { this.style.outline = '3px solid #a78bfa'; };
        dismissBtn.onblur = function() { this.style.outline = 'none'; };
        dismissBtn.onclick = function() { window.__STREAM_INFO__.stallCheck = null; overlay.remove(); };
        actionsDiv.appendChild(dismissBtn);

        document.body.appendChild(overlay);
        setTimeout(function() { transBtn.focus(); }, 100);
    }
    window.__showPlaybackWarning = showPlaybackWarning;

    // Register settings toggle
    var regInterval = setInterval(function() {
        if (!window.__registerVidaaSettingsItem) return;
        clearInterval(regInterval);
        window.__registerVidaaSettingsItem({
            id: 'playback-warning-toggle',
            type: 'toggle',
            label: 'Playback Warning',
            description: 'Shows a helper overlay when playback stalls (offers native player / transcode / go-back). OFF by default — most streams eventually recover and the overlay blocks the remote.',
            lsKey: WARN_KEY,
            defaultValue: false
        });
    }, 200);
})();
</script>
<script>
// Enhanced error messages for TV users
(function() {
    window.__STREMIO_ERROR_ENHANCER__ = function(err) {
        if (!err) return null;
        var msg = err.message || '';
        var code = err.code || 0;

        if (window.__DV_PROFILE7_DETECTED__ && window.__STREAM_INFO__ && window.__STREAM_INFO__.stallCheck) {
            return 'Dolby Vision stream (' + window.__DV_PROFILE7_DETECTED__ + ') failed to render. Try an MKV source or use a streaming server for transcoding.';
        }
        if (msg.indexOf('not supported') !== -1 || msg === 'MEDIA_ERR_SRC_NOT_SUPPORTED') {
            return 'This video codec is not supported by your TV. Try a different source, or configure a streaming server for transcoding (Settings \u2192 Server).';
        }
        if (msg === 'MEDIA_ERR_DECODE') {
            return 'Video decode error \u2014 the codec may not be compatible. Try a different source or enable transcoding.';
        }
        if (msg === 'MEDIA_ERR_NETWORK') {
            return 'Network error \u2014 check your connection and streaming server status.';
        }
        if (msg.indexOf('CONVERT_FAILED') !== -1 || msg.indexOf('transcode') !== -1 || msg.indexOf('Transcode') !== -1) {
            return 'Transcoding failed \u2014 verify your streaming server is running and accessible.';
        }
        return msg;
    };
})();
</script>
<script>
// Splash screen — remove when core is ready
(function() {
    var bar = document.getElementById('splash-bar');
    var progress = 0;
    var tick = setInterval(function() {
        progress = Math.min(progress + Math.random() * 15, 90);
        if (bar) bar.style.width = progress + '%';
    }, 400);
    var safetyTimer = null;
    var check = setInterval(function() {
        if (window.core && typeof window.core.getState === 'function') {
            clearInterval(check);
            clearInterval(tick);
            if (safetyTimer) clearTimeout(safetyTimer);
            if (bar) bar.style.width = '100%';
            setTimeout(function() {
                var splash = document.getElementById('splash');
                if (splash) {
                    splash.style.transition = 'opacity 0.3s';
                    splash.style.opacity = '0';
                    setTimeout(function() { splash.remove(); }, 300);
                }
            }, 200);
        }
    }, 300);
    // Safety: remove after 30s regardless
    safetyTimer = setTimeout(function() {
        clearInterval(check);
        clearInterval(tick);
        var splash = document.getElementById('splash');
        if (splash) splash.remove();
    }, 30000);
})();
</script>
<script>
// Resolution indicator in player
(function() {
    var indicator = null;
    var hideTimer = null;

    function createIndicator() {
        if (indicator) return indicator;
        indicator = document.createElement('div');
        indicator.id = 'quality-indicator';
        indicator.style.cssText = 'position:fixed;top:14px;right:14px;background:rgba(0,0,0,0.75);color:white;padding:5px 12px;border-radius:6px;font-size:13px;z-index:99998;pointer-events:none;font-family:monospace;display:none;backdrop-filter:blur(4px);';
        document.body.appendChild(indicator);
        return indicator;
    }

    function showIndicator() {
        if (!indicator) return;
        indicator.style.display = 'block';
        indicator.style.opacity = '1';
        clearTimeout(hideTimer);
        hideTimer = setTimeout(function() {
            if (indicator) { indicator.style.transition = 'opacity 0.5s'; indicator.style.opacity = '0'; }
        }, 5000);
    }

    document.addEventListener('keydown', function() {
        if ((window.location.hash || '').indexOf('#/player/') === 0 && indicator) {
            indicator.style.transition = 'none';
            showIndicator();
        }
    });

    setInterval(function() {
        var hash = window.location.hash || '';
        if (hash.indexOf('#/player/') !== 0) {
            if (indicator) { indicator.style.display = 'none'; indicator.style.opacity = '0'; }
            return;
        }
        if (!indicator) createIndicator();
        var video = document.querySelector('video');
        if (!video || !video.videoWidth) return;

        var el = indicator;
        var w = video.videoWidth, h = video.videoHeight;
        var label;
        if (w >= 3840) label = '4K';
        else if (w >= 2560) label = '1440p';
        else if (w >= 1920) label = '1080p';
        else if (w >= 1280) label = '720p';
        else if (w >= 854) label = '480p';
        else label = w + 'x' + h;

        // Append codec/HDR info from VIDAA state
        if (window.__VIDAA_STATE__) {
            if (window.__VIDAA_STATE__.videoCodec) label += ' ' + window.__VIDAA_STATE__.videoCodec;
            if (window.__VIDAA_STATE__.hdr) label += ' ' + window.__VIDAA_STATE__.hdr;
            if (window.__VIDAA_STATE__.dolbyVision) label += ' DV';
        }
        if (window.__STREAM_INFO__ && window.__STREAM_INFO__.videoCodec) {
            if (label.indexOf(window.__STREAM_INFO__.videoCodec) === -1) {
                label += ' ' + window.__STREAM_INFO__.videoCodec;
            }
        }

        // Buffer health dot
        var bufferSec = 0;
        try { if (video.buffered.length) bufferSec = video.buffered.end(video.buffered.length - 1) - video.currentTime; } catch(e) {}
        var dotColor = bufferSec > 30 ? '#4ade80' : bufferSec > 10 ? '#fbbf24' : '#f87171';
        el.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + dotColor + ';margin-right:6px;vertical-align:middle;"></span>' + esc(label);
        // Only refresh content — do NOT auto-show. The indicator is shown on Red button
        // press (in player with stats disabled) or on any keydown in player. This prevents
        // the icon from being stuck visible permanently.
    }, 3000);
})();
</script>
<script>
// VIDAA remote color button mappings
(function() {
    var healthOverlay = null;

    function showToast(msg, bg, ms) {
        var t = document.createElement('div');
        t.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:' + (bg || 'rgba(0,0,0,0.88)') + ';color:white;padding:16px 28px;border-radius:10px;font-size:1.05rem;font-family:PlusJakartaSans,sans-serif;z-index:100000;pointer-events:none;text-align:center;max-width:500px;';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(function() { t.remove(); }, ms || 2500);
    }

    document.addEventListener('keydown', function(e) {
        var code = e.keyCode;

        // Red (403) — toggle quality indicator (only outside the player).
        // Inside the player the Stream Stats overlay owns Red (registered on window).
        // Outside the player, show the quality indicator even though the interval
        // normally only renders it in player — just to confirm the button is wired.
        if (code === 403) {
            var inPlayer = (window.location.hash || '').indexOf('#/player/') !== -1;
            if (!inPlayer) {
                var qi = document.getElementById('quality-indicator');
                if (qi) qi.style.display = qi.style.display === 'none' ? 'block' : 'none';
            }
        }

        // Green (404) — toggle server health overlay
        if (code === 404) {
            if (healthOverlay) { healthOverlay.remove(); healthOverlay = null; return; }
            var h = window.__SERVER_HEALTH__ || {};
            var url = window.__STREMIO_SERVER_URL__ || 'default';
            var isDefault = !url || url === 'default' || url === 'http://127.0.0.1:11470';
            var statusColor, statusText;
            if (h.status === 'online') { statusColor = '#4ade80'; statusText = 'online'; }
            else if (isDefault) { statusColor = '#94a3b8'; statusText = 'not configured'; }
            else { statusColor = '#f87171'; statusText = h.status || 'offline'; }
            healthOverlay = document.createElement('div');
            healthOverlay.style.cssText = 'position:fixed;bottom:60px;right:14px;background:rgba(0,0,0,0.9);color:white;padding:16px 20px;border-radius:10px;font-size:13px;z-index:99999;font-family:monospace;min-width:260px;backdrop-filter:blur(4px);';
            var note = isDefault && h.status !== 'online'
                ? '<div style="margin-top:8px;color:rgba(255,255,255,0.6);font-size:11px;line-height:1.4;">Streaming server is optional. Real-Debrid users do not need one.</div>'
                : '';
            healthOverlay.innerHTML = '<div style="font-weight:700;margin-bottom:8px;font-size:14px;">Server Health</div>'
                + '<div>Status: <span style="color:' + statusColor + ';">' + esc(statusText) + '</span></div>'
                + '<div>Latency: ' + (h.latency ? h.latency + 'ms' : 'N/A') + '</div>'
                + '<div>Version: ' + esc(h.version || 'N/A') + '</div>'
                + '<div>URL: ' + esc(url) + '</div>'
                + note;
            document.body.appendChild(healthOverlay);
            setTimeout(function() { if (healthOverlay) { healthOverlay.remove(); healthOverlay = null; } }, 10000);
        }

        // Blue (406) — force transcode current stream (reloads player).
        // Only useful if a streaming server is configured — otherwise show a toast.
        if (code === 406) {
            var ph = window.location.hash || '';
            if (ph.indexOf('#/player/') !== 0) return;
            var srvUrl = window.__STREMIO_SERVER_URL__ || '';
            var serverReady = srvUrl && srvUrl !== 'http://127.0.0.1:11470';
            var srvOnline = window.__SERVER_HEALTH__ && window.__SERVER_HEALTH__.status === 'online';
            if (!serverReady || !srvOnline) {
                showToast('Force transcode needs a streaming server.\nCheck Settings > Server.', 'rgba(180,60,60,0.92)', 3500);
                return;
            }
            window.__FORCE_TRANSCODE__ = true;
            console.log('[remote] Force transcode enabled, reloading stream');
            showToast('Forcing transcode...', null, 1500);
            try {
                window.location.hash = '#/home';
                setTimeout(function() { window.location.hash = ph; }, 200);
            } catch(err) {
                console.error('[remote] Force transcode reload failed:', err.message);
                showToast('Could not reload stream', 'rgba(180,60,60,0.92)', 2500);
            }
        }

        // Info (457) — show one-shot stream info panel.
        // Only fires when Stream Stats overlay is explicitly disabled — otherwise
        // Info is owned by the stats overlay and we'd be double-triggering.
        // Some remotes (55Q6QV projector, many Hisense projectors) have no Info
        // button at all, so Red is accepted as an alias when in the player and
        // the stats overlay is off.
        var inPlayerNow = (window.location.hash || '').indexOf('#/player/') === 0;
        var statsDisabled = localStorage.getItem('stremio_stream_stats') === 'false';
        var infoTriggered = (code === 457) || (code === 403 && inPlayerNow && statsDisabled);
        if (infoTriggered && statsDisabled) {
            var video = document.querySelector('video');
            if (!video) return;
            var info = document.getElementById('stream-info');
            if (info) { info.remove(); return; }
            info = document.createElement('div');
            info.id = 'stream-info';
            info.style.cssText = 'position:fixed;top:60px;left:14px;background:rgba(0,0,0,0.85);color:white;padding:16px 20px;border-radius:10px;font-size:13px;z-index:99999;font-family:monospace;min-width:260px;backdrop-filter:blur(4px);';
            var bufferedStr = 'N/A';
            try { if (video.buffered.length) bufferedStr = Math.round(video.buffered.end(video.buffered.length - 1)) + 's'; } catch(e) {}
            info.innerHTML = '<div style="font-weight:700;margin-bottom:8px;font-size:14px;">Stream Info</div>'
                + '<div>Resolution: ' + esc((video.videoWidth || '?') + 'x' + (video.videoHeight || '?')) + '</div>'
                + '<div>Duration: ' + Math.round(video.duration || 0) + 's</div>'
                + '<div>Buffered: ' + esc(bufferedStr) + '</div>'
                + '<div>Current: ' + Math.round(video.currentTime || 0) + 's</div>'
                + '<div>Paused: ' + video.paused + '</div>'
                + '<div>DV P7: ' + esc(window.__DV_PROFILE7_DETECTED__ || 'No') + '</div>';
            if (window.__VIDAA_CAPS__) {
                info.innerHTML += '<div style="margin-top:8px;border-top:1px solid rgba(255,255,255,0.15);padding-top:8px;">'
                    + '<div style="font-weight:700;margin-bottom:4px;">VIDAA Device</div>'
                    + '<div>Model: ' + esc(window.__VIDAA_CAPS__.model || '?') + '</div>'
                    + '<div>Chipset: ' + esc(window.__VIDAA_CAPS__.chipset || '?') + '</div>'
                    + '<div>HDR: ' + esc(JSON.stringify(window.__VIDAA_CAPS__.hdrInfo || {})) + '</div>'
                    + '<div>Atmos: ' + esc(window.__VIDAA_CAPS__.dolbyAtmos || '?') + '</div>'
                    + '</div>';
            }
            if (window.__VIDAA_STATE__ && Object.keys(window.__VIDAA_STATE__).length > 0) {
                info.innerHTML += '<div style="margin-top:4px;">'
                    + '<div>DV: ' + esc(window.__VIDAA_STATE__.dolbyVision || 'N/A') + '</div>'
                    + '<div>HDR: ' + esc(window.__VIDAA_STATE__.hdr || 'N/A') + '</div>'
                    + '<div>Codec: ' + esc(window.__VIDAA_STATE__.videoCodec || 'N/A') + '</div>'
                    + '</div>';
            }
            document.body.appendChild(info);
            setTimeout(function() { if (info) info.remove(); }, 10000);
        }
    });
})();
</script>
<script>
// Native player handoff — hand stream URL to VIDAA system player
// The native player has full hardware DV decode with metadata intact.
// Check omi_platform lazily — on some VIDAA firmwares it's injected after page load,
// so an early-return at script init time silently disables the Yellow button forever.
(function() {
    function hasNative() {
        try { return typeof omi_platform !== 'undefined' && typeof omi_platform.sendPlatformMessage === 'function'; } catch(e) { return false; }
    }

    window.__launchNativePlayer = function(url) {
        if (!hasNative()) { console.log('[native] omi_platform unavailable — native player not supported on this device'); return false; }
        if (!url) {
            var video = document.querySelector('video');
            url = video ? video.currentSrc || video.src : null;
        }
        if (!url) { console.log('[native] No stream URL found'); return false; }

        console.log('[native] Launching native player with:', url.substring(0, 100));

        // Try multiple message types — different VIDAA versions respond to different ones
        var messages = [
            {type: 'launchNativePlayer', url: url, title: 'Stremio', mimeType: 'video/mp4'},
            {type: 'openMediaPlayer', url: url, title: 'Stremio'},
            {type: 'playVideo', url: url, mimeType: 'video/mp4', title: 'Stremio'}
        ];

        var anySent = false;
        for (var i = 0; i < messages.length; i++) {
            try {
                omi_platform.sendPlatformMessage(JSON.stringify(messages[i]));
                console.log('[native] Sent:', messages[i].type);
                anySent = true;
            } catch(e) {
                console.log('[native] Failed:', messages[i].type, e.message);
            }
        }
        return anySent;
    };

    // Yellow button (405) — launch native player with current stream.
    // Always bind; check omi_platform at press time so later-injected APIs still work.
    document.addEventListener('keydown', function(e) {
        if (e.keyCode !== 405) return;
        var hash = window.location.hash || '';
        if (hash.indexOf('#/player/') !== 0) return;

        var toast = document.createElement('div');
        toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);color:white;padding:20px 40px;border-radius:12px;font-size:1.2rem;font-family:PlusJakartaSans,sans-serif;z-index:100000;pointer-events:none;text-align:center;max-width:500px;';

        if (!hasNative()) {
            toast.textContent = 'Native player not available on this device';
            toast.style.background = 'rgba(180,60,60,0.92)';
            document.body.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
            return;
        }

        var launched = window.__launchNativePlayer();
        toast.textContent = launched ? 'Opening in native player...' : 'Native player could not open this stream';
        if (!launched) toast.style.background = 'rgba(180,60,60,0.92)';
        document.body.appendChild(toast);
        setTimeout(function() { toast.remove(); }, 3000);
    });
})();
</script>
<script>
// Server health monitoring
(function() {
    window.__SERVER_HEALTH__ = { status: 'unknown', latency: null, version: null };

    function makeTimeoutSignal(ms) {
        try {
            if (typeof AbortController !== 'undefined') {
                var ctrl = new AbortController();
                setTimeout(function() { ctrl.abort(); }, ms);
                return ctrl.signal;
            }
        } catch(e) {}
        return undefined;
    }

    function checkHealth() {
        if ((window.location.hash || '').indexOf('#/player/') === 0) return;
        var url = window.__STREMIO_SERVER_URL__;
        if (!url) return;
        var signal = makeTimeoutSignal(5000);
        var start = Date.now();
        fetch(url + '/settings', { signal: signal }).then(function(r) {
            return r.json();
        }).then(function(data) {
            window.__SERVER_HEALTH__ = {
                status: 'online',
                latency: Date.now() - start,
                version: data.serverVersion || data.version || null
            };
        }).catch(function() {
            var start2 = Date.now();
            fetch(url + '/heartbeat', { signal: makeTimeoutSignal(5000) }).then(function() {
                window.__SERVER_HEALTH__ = { status: 'online', latency: Date.now() - start2, version: null };
            }).catch(function() {
                window.__SERVER_HEALTH__ = { status: 'offline', latency: null, version: null };
            });
        });
    }

    setInterval(checkHealth, 10000);
    setTimeout(checkHealth, 3000);
})();
</script>
<script>
// Watchdog — auto-recover from UI freeze
(function() {
    window.__WATCHDOG_PAUSE__ = false;
    var lastTick = Date.now();
    setInterval(function() { lastTick = Date.now(); }, 1000);
    setInterval(function() {
        if (window.__WATCHDOG_PAUSE__) { lastTick = Date.now(); return; }
        if (Date.now() - lastTick > 15000) {
            console.error('[watchdog] UI freeze detected (>15s), reloading');
            location.reload();
        }
    }, 5000);
    document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
            window.__WATCHDOG_PAUSE__ = true;
        } else {
            lastTick = Date.now();
            window.__WATCHDOG_PAUSE__ = false;
        }
    });
})();
</script>
<script>
// Memory pressure monitoring
(function() {
    if (typeof performance === 'undefined' || !performance.memory) return;
    setInterval(function() {
        var used = performance.memory.usedJSHeapSize;
        var limit = performance.memory.jsHeapSizeLimit;
        var pct = Math.round((used / limit) * 100);
        if (pct > 85) {
            console.warn('[memory] High usage: ' + Math.round(used/1048576) + 'MB / ' + Math.round(limit/1048576) + 'MB (' + pct + '%)');
        }
    }, 30000);
})();

<script>
// VIDAA API Integration — register trusted domain + expose device capabilities
(function() {
    // Only run on VIDAA devices
    try { Hisense_GetOSVersion(); } catch(e) { return; }

    window.__VIDAA_DEVICE__ = true;

    // Register GitHub Pages as trusted domain (enables privileged APIs on future loads)
    try {
        var domains = Hisense_GetInsecureDomain();
        if (!Array.isArray(domains)) domains = [];
        var ghDomain = 'noobygains.github.io';
        var found = false;
        for (var i = 0; i < domains.length; i++) {
            if (domains[i] === ghDomain) { found = true; break; }
        }
        if (!found) {
            var result = Hisense_AddInsecureDomain(ghDomain);
            console.log('[vidaa] Registered trusted domain:', ghDomain, result);
        }
    } catch(e) {
        console.log('[vidaa] AddInsecureDomain not available:', e.message);
    }

    // Normalize a VIDAA capability value to a friendly label.
    // Different firmwares return various shapes: true/false, "0"/"1", 0/1, strings, objects.
    function normaliseCap(v) {
        if (v === undefined || v === null) return 'unknown';
        if (typeof v === 'boolean') return v ? 'yes' : 'no';
        if (typeof v === 'number') return v ? 'yes' : 'no';
        if (typeof v === 'string') {
            var s = v.trim().toLowerCase();
            if (s === '1' || s === 'true' || s === 'yes' || s === 'supported') return 'yes';
            if (s === '0' || s === 'false' || s === 'no' || s === 'unsupported' || s === '') return 'no';
            return v;
        }
        return v;
    }
    window.__normaliseVidaaCap = normaliseCap;

    // Collect device capabilities. Try multiple APIs per feature — different
    // firmware builds expose different function names, and on some projector
    // builds the older Hisense_* aliases return the right answer while the
    // newer camelCase/omi_ variants throw.
    try {
        window.__VIDAA_CAPS__ = {};
        var caps = window.__VIDAA_CAPS__;

        try { caps.hdrInfo = Hisense_GetSupportForHDRInfo(); } catch(e) {}
        try { caps.pictureInfo = Hisense_GetPictureInfo(); } catch(e) {}

        // Atmos detection — multiple paths, first non-empty answer wins.
        var atmosRaw = undefined;
        try { atmosRaw = Hisense_GetSupportForDolbyAtmos(); } catch(e) {}
        if (atmosRaw === undefined) {
            try {
                var pic = caps.pictureInfo;
                if (pic && (pic.dolbyAtmos !== undefined || pic.atmos !== undefined)) {
                    atmosRaw = pic.dolbyAtmos !== undefined ? pic.dolbyAtmos : pic.atmos;
                }
            } catch(e) {}
        }
        if (atmosRaw === undefined) {
            try {
                var hdr = caps.hdrInfo;
                if (hdr && (hdr.atmos !== undefined || hdr.dolbyAtmos !== undefined)) {
                    atmosRaw = hdr.atmos !== undefined ? hdr.atmos : hdr.dolbyAtmos;
                }
            } catch(e) {}
        }
        caps.dolbyAtmosRaw = atmosRaw;
        caps.dolbyAtmos = normaliseCap(atmosRaw);

        try { caps.chipset = Hisense_GetChipSetName(); } catch(e) {}
        try { caps.panelRes = Hisense_GetPanelResolution(); } catch(e) {}
        try { caps.drmInfo = Hisense_GetDrmInfo(); } catch(e) {}
        try { caps.model = Hisense_GetModelName(); } catch(e) {}
        try { caps.firmware = Hisense_GetFirmWareVersion(); } catch(e) {}
        try { caps.osVersion = Hisense_GetOSVersion(); } catch(e) {}
        console.log('[vidaa] Device caps:', JSON.stringify(caps));
    } catch(e) {}

    // Register observers for real-time video state
    try {
        window.__VIDAA_STATE__ = {};
        var keys = ['dolbyVision', 'hdr', 'videoCodec', 'audioCodec', 'playerState', 'mediaState', 'resolution', 'dolbyAtmos', 'atmos'];
        for (var j = 0; j < keys.length; j++) {
            (function(key) {
                try {
                    Hisense_RegisterObserver(key, function(val) {
                        window.__VIDAA_STATE__[key] = val;
                        console.log('[vidaa] Observer:', key, '=', val);
                    });
                } catch(e) {}
            })(keys[j]);
        }
    } catch(e) {}
})();
</script>
<script>
// Install to Launcher — first-run prompt for VIDAA devices
(function() {
    if (!window.__VIDAA_DEVICE__) return;
    var SESSION_DISMISS_KEY = 'stremio_install_banner_dismissed_session';
    var LAST_SUCCESS_KEY = 'stremio_install_banner_last_success_at';
    var SUCCESS_SUPPRESS_MS = 24 * 60 * 60 * 1000;
    if (sessionStorage.getItem(SESSION_DISMISS_KEY)) return;

    try {
        var lastSuccessAt = parseInt(localStorage.getItem(LAST_SUCCESS_KEY), 10);
        if (lastSuccessAt && (Date.now() - lastSuccessAt) < SUCCESS_SUPPRESS_MS) return;
    } catch (e) {}

    // Check if install API is available
    var canInstall = false;
    try { canInstall = typeof Hisense_installApp === 'function'; } catch(e) {}
    if (!canInstall) return;

    // Show install banner after app loads (delay to let splash screen clear)
    setTimeout(function() {
        var banner = document.createElement('div');
        banner.id = 'install-banner';
        banner.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(123,91,245,0.95);color:white;padding:14px 28px;border-radius:12px;z-index:99999;font-family:PlusJakartaSans,sans-serif;font-size:1rem;display:flex;align-items:center;gap:16px;backdrop-filter:blur(8px);box-shadow:0 4px 20px rgba(0,0,0,0.4);';

        var text = document.createElement('span');
        text.textContent = 'Add Stremio to your TV launcher?';
        banner.appendChild(text);

        var btn = document.createElement('button');
        btn.textContent = 'Install';
        btn.style.cssText = 'background:white;color:#7b5bf5;border:none;padding:8px 20px;border-radius:8px;font-weight:700;font-size:0.95rem;cursor:pointer;font-family:inherit;';
        btn.setAttribute('tabindex', '0');
        btn.onfocus = function() { this.style.outline = '3px solid white'; };
        btn.onblur = function() { this.style.outline = 'none'; };
        btn.onclick = function() {
            var appUrl = 'https://noobygains.github.io/stremio-vidaa-tv/';
            var iconUrl = appUrl + 'icon.png';
            var appId = 'stremio-vidaa';
            try {
                Hisense_installApp(appId, 'Stremio', iconUrl, iconUrl, iconUrl, appUrl, 'store', function(status) {
                    if (status === 0) {
                        sessionStorage.setItem(SESSION_DISMISS_KEY, '1');
                        try { localStorage.setItem(LAST_SUCCESS_KEY, String(Date.now())); } catch (e) {}
                        // Tell the Hisense launcher to refresh — the official Stremio
                        // installer does this and without it many firmware builds report
                        // install success but never actually show the new icon.
                        try {
                            var refreshMsg = {
                                type: 'APPMessage', MsgType: 'appControl', action: 'updateAppState',
                                source: 'browser', startAppType: 0x2,
                                param: { event: 'AllAppsUpdate', SubModuleName: 'AllApps', startFrom: '', appInfo: appId }
                            };
                            if (window.omi_platform && typeof window.omi_platform.sendPlatformMessage === 'function') {
                                window.omi_platform.sendPlatformMessage(JSON.stringify(refreshMsg));
                            } else if (window.opera_omi && typeof window.opera_omi.sendPlatformMessage === 'function') {
                                window.opera_omi.sendPlatformMessage(JSON.stringify(refreshMsg));
                            }
                        } catch(refreshErr) { console.log('[install] launcher refresh failed:', refreshErr.message); }
                        text.textContent = 'Install requested. Fully restart your TV (unplug 10s). If nothing shows in your launcher — common on projectors and newer firmware — just bookmark this page in the TV Browser, it works the same.';
                        btn.style.display = 'none';
                        setTimeout(function() { banner.remove(); }, 12000);
                    } else {
                        text.textContent = 'Install failed (code ' + status + '). Bookmark this page in the TV Browser instead.';
                    }
                });
            } catch(e) {
                text.textContent = 'Install not available from this domain. Bookmark this page in the TV Browser and open it from there.';
                setTimeout(function() { banner.remove(); }, 7000);
            }
        };
        banner.appendChild(btn);

        var dismiss = document.createElement('button');
        dismiss.textContent = '\u00D7';
        dismiss.style.cssText = 'background:none;color:rgba(255,255,255,0.6);border:none;font-size:1.4rem;cursor:pointer;padding:0 4px;';
        dismiss.onclick = function() {
            sessionStorage.setItem(SESSION_DISMISS_KEY, '1');
            banner.remove();
        };
        banner.appendChild(dismiss);

        document.body.appendChild(banner);

        // Auto-dismiss after 15 seconds
        setTimeout(function() { if (banner.parentNode) banner.remove(); }, 15000);
    }, 5000);
})();
</script>
<script>
// VIDAA Diagnostics — copyable debug blob for install/runtime reports
(function() {
    function safeRead(fn, fallback) {
        try { return fn(); } catch (e) { return fallback; }
    }

    function collectDiagnostics() {
        var trackedKeys = [
            'stremio_720p_mode',
            'stremio_720p_zoom',
            'stremio_zoom_disable_in_player',
            'stremio_stream_stats',
            'stremio_low_memory',
            'stremio_auto_rebuffer',
            'stremio_install_banner_last_success_at'
        ];
        var settings = {};
        for (var i = 0; i < trackedKeys.length; i++) {
            settings[trackedKeys[i]] = safeRead(function(key) {
                return localStorage.getItem(key);
            }.bind(null, trackedKeys[i]), null);
        }

        return {
            build: window.__BUILD_COMMIT__ || null,
            patchVersion: window.__STREMIO_PATCH_VERSION__ || null,
            href: window.location.href,
            origin: window.location.origin,
            host: window.location.host,
            hash: window.location.hash,
            userAgent: navigator.userAgent,
            vidaaDetected: !!window.__VIDAA_DEVICE__,
            isVidaaHubDomain: window.location.hostname === 'vidaahub.com',
            availableApis: {
                installApp: safeRead(function() { return typeof Hisense_installApp === 'function'; }, false),
                addInsecureDomain: safeRead(function() { return typeof Hisense_AddInsecureDomain === 'function'; }, false),
                getOSVersion: safeRead(function() { return typeof Hisense_GetOSVersion === 'function'; }, false),
                registerObserver: safeRead(function() { return typeof Hisense_RegisterObserver === 'function'; }, false)
            },
            viewport: {
                innerWidth: window.innerWidth,
                innerHeight: window.innerHeight,
                screenWidth: safeRead(function() { return window.screen.width; }, null),
                screenHeight: safeRead(function() { return window.screen.height; }, null),
                screen720p: !!window.screen720p,
                uiZoomApplied: document.body && document.body.getAttribute('data-vidaa-ui-zoom') === 'true',
                zoomMode: safeRead(function() { return window.__get720pMode ? window.__get720pMode() : settings.stremio_720p_mode; }, null),
                zoomEnabled: settings.stremio_720p_zoom !== 'false',
                playerZoomDisabled: settings.stremio_zoom_disable_in_player !== 'false',
                playerRoute: (window.location.hash || '').indexOf('#/player/') === 0
            },
            serviceWorker: {
                controlled: !!navigator.serviceWorker && !!navigator.serviceWorker.controller
            },
            installBanner: {

                    corruptedVideoFrames: quality.corruptedVideoFrames,
                    creationTime: quality.creationTime
                } : null
            } : null,
            playerState: null
        };

        return Promise.resolve().then(function() {
            if (!window.core || typeof window.core.getState !== 'function') return diag;
            return window.core.getState('player').then(function(state) {
                if (!state) return diag;
                diag.playerState = {

                    selectedSubtitleTrack: safeRead(function() { return state.selectedSubtitleTrack; }, null),
                    selectedAudioTrackId: safeRead(function() { return state.selectedAudioTrack && state.selectedAudioTrack.id; }, null),
                    selectedAudioTrack: safeRead(function() { return state.selectedAudioTrack; }, null),
                    stream: safeRead(function() { return state.stream; }, null)
                };
                return diag;
            }).catch(function(err) {
                diag.playerState = { error: err && err.message ? err.message : 'getState failed' };
                return diag;
            });
        });
    }

<script>
// Lazy load poster images to reduce memory pressure
(function() {
    if (!('IntersectionObserver' in window)) return;
    var observer = new MutationObserver(function(mutations) {
        for (var i = 0; i < mutations.length; i++) {
            var added = mutations[i].addedNodes;
            for (var j = 0; j < added.length; j++) {
                if (added[j].nodeType !== 1) continue;
                var imgs = added[j].querySelectorAll ? added[j].querySelectorAll('img:not([loading])') : [];
                for (var k = 0; k < imgs.length; k++) {
                    imgs[k].setAttribute('loading', 'lazy');
                }
                if (added[j].tagName === 'IMG' && !added[j].getAttribute('loading')) {
                    added[j].setAttribute('loading', 'lazy');
                }
            }
        }
    });
    observer.observe(document.body, { childList: true, subtree: true });
})();
</script>
<script>
// Channel Up/Down quick seek (60s forward/back)
(function() {
    document.addEventListener('keydown', function(e) {
        var code = e.keyCode;

        // Channel Up (427) — skip forward 60s
        if (code === 427) {
            var vid = document.querySelector('video');
            if (vid && (window.location.hash || '').indexOf('#/player/') === 0) {
                vid.currentTime = Math.min(vid.currentTime + 60, vid.duration || Infinity);
                var toast = document.createElement('div');
                toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:white;padding:12px 24px;border-radius:8px;font-size:1.5rem;font-family:PlusJakartaSans,sans-serif;z-index:100000;pointer-events:none;';
                toast.textContent = '+60s';
                document.body.appendChild(toast);
                setTimeout(function() { toast.remove(); }, 1500);
            }
        }

        // Channel Down (428) — skip back 60s
        if (code === 428) {
            var vid2 = document.querySelector('video');
            if (vid2 && (window.location.hash || '').indexOf('#/player/') === 0) {
                vid2.currentTime = Math.max(vid2.currentTime - 60, 0);
                var toast2 = document.createElement('div');
                toast2.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:white;padding:12px 24px;border-radius:8px;font-size:1.5rem;font-family:PlusJakartaSans,sans-serif;z-index:100000;pointer-events:none;';
                toast2.textContent = '-60s';
                document.body.appendChild(toast2);
                setTimeout(function() { toast2.remove(); }, 1500);
            }
        }
    });
})();

<script>
    // 720p Zoom Correction
    // Auto mode detects 720p VIDAA viewports and scales the UI only.
    // Player layout stays untouched unless users explicitly opt into legacy player zoom.
    (function() {
        var MODE_KEY = 'stremio_720p_mode';
        var ZOOM_KEY = 'stremio_720p_zoom';
        var PLAYER_ZOOM_KEY = 'stremio_zoom_disable_in_player';
        var UI_ZOOM_SCALE = '65%';
        var VALID_MODES = {
            'auto': true,
            'ui-only': true,
            'ui-and-player': true,
            'off': true
        };
        var MODE_LABELS = {
            'auto': 'Auto',
            'ui-only': 'UI Only',
            'ui-and-player': 'UI + Player',
            'off': 'Off'
        };
        var RESET_EXCLUDE_KEYS = {
            stremio_server_url: true
        };

        function isPlayerRoute() {
            return (window.location.hash || '').indexOf('#/player/') === 0;
        }

        function readStoredMode() {
            try {
                var mode = localStorage.getItem(MODE_KEY);
                return VALID_MODES[mode] ? mode : null;
            } catch (e) {
                return null;
            }
        }

        function inferLegacyMode() {
            var zoomEnabled = true;
            var playerZoomDisabled = true;
            try {
                zoomEnabled = localStorage.getItem(ZOOM_KEY) !== 'false';
                playerZoomDisabled = localStorage.getItem(PLAYER_ZOOM_KEY) !== 'false';
            } catch (e) {
                zoomEnabled = true;
                playerZoomDisabled = true;
            }
            if (!zoomEnabled) return 'off';
            return playerZoomDisabled ? 'auto' : 'ui-and-player';
        }

        function getModeLabel(mode) {
            return MODE_LABELS[mode] || MODE_LABELS.auto;
        }

        function get720pMode() {
            return readStoredMode() || inferLegacyMode();
        }

        function syncLegacyZoomKeys(mode) {
            try {
                if (mode === 'off') {
                    localStorage.setItem(ZOOM_KEY, 'false');
                    localStorage.setItem(PLAYER_ZOOM_KEY, 'true');
                    return;
                }
                localStorage.setItem(ZOOM_KEY, 'true');
                localStorage.setItem(PLAYER_ZOOM_KEY, mode === 'ui-and-player' ? 'false' : 'true');
            } catch (e) {}
        }

        function set720pMode(mode) {
            if (!VALID_MODES[mode]) mode = 'auto';
            try {
                localStorage.setItem(MODE_KEY, mode);
            } catch (e) {}
            syncLegacyZoomKeys(mode);
        }

        function shouldTreatAs720pContext() {
            var mode = get720pMode();
            if (mode === 'off') return false;
            if (mode === 'ui-only' || mode === 'ui-and-player') return true;
            return !!window.screen720p;
        }

        function shouldZoomPlayerRoute() {
            return get720pMode() === 'ui-and-player';
        }

        function removeModal(id) {
            var existing = document.getElementById(id);
            if (existing) existing.remove();
        }

        function focusFallback(refs) {
            for (var i = 0; i < refs.length; i++) {
                if (refs[i] && typeof refs[i].focus === 'function') {
                    refs[i].focus();
                    return;
                }
            }
        }

        function setUiZoom(active) {
            var nextZoom = active ? UI_ZOOM_SCALE : '';
            if (document.body.style.zoom !== nextZoom) {
                document.body.style.zoom = nextZoom;
            }
            document.body.setAttribute('data-vidaa-ui-zoom', active ? 'true' : 'false');
        }

        function shouldApplyUiZoom() {
            if (!shouldTreatAs720pContext()) return false;
            if (isPlayerRoute() && !shouldZoomPlayerRoute()) return false;
            return true;
        }

        function refreshZoom(reason) {
            var shouldApply = shouldApplyUiZoom();
            setUiZoom(shouldApply);
            console.log('[zoom] ' + (shouldApply ? 'Applied' : 'Removed') + ' UI zoom' + (reason ? ' (' + reason + ')' : ''));
        }

        function nextMode(mode) {
            if (mode === 'auto') return 'ui-only';
            if (mode === 'ui-only') return 'ui-and-player';
            if (mode === 'ui-and-player') return 'off';
            return 'auto';
        }

        window.__get720pMode = get720pMode;
        window.__get720pModeLabel = function() {
            return getModeLabel(get720pMode());
        };

        window.__applyZoom = function() {
            refreshZoom('settings-on');
        };
        window.__removeZoom = function() {
            setUiZoom(false);
            console.log('[zoom] Removed UI zoom (settings-off)');
        };
        window.__refreshZoom = refreshZoom;
        window.__set720pMode = function(mode) {
            set720pMode(mode);
            refreshZoom('mode-change:' + mode);
        };
        window.__cycle720pMode = function() {
            var mode = nextMode(get720pMode());
            set720pMode(mode);
            refreshZoom('mode-cycle:' + mode);
            if (window.__showVidaaToast) {
                window.__showVidaaToast('720p Mode: ' + getModeLabel(mode), 1800);
            }
            return mode;
        };
        window.__show720pModePicker = window.__cycle720pMode;

        function performResetVidaaTweaks() {
            try {
                var keys = [];
                for (var i = 0; i < localStorage.length; i++) {
                    var key = localStorage.key(i);
                    if (key && key.indexOf('stremio_') === 0 && !RESET_EXCLUDE_KEYS[key]) keys.push(key);
                }
                for (var j = 0; j < keys.length; j++) localStorage.removeItem(keys[j]);
                sessionStorage.removeItem('stremio_install_banner_dismissed_session');
            } catch (e) {}
            location.reload();
        }

        var resetVidaaTweaksArmedUntil = 0;
        var resetVidaaTweaksTimer = null;

        function disarmResetVidaaTweaks() {
            resetVidaaTweaksArmedUntil = 0;
            if (resetVidaaTweaksTimer) {
                clearTimeout(resetVidaaTweaksTimer);
                resetVidaaTweaksTimer = null;
            }
        }

        window.__getResetVidaaTweaksLabel = function() {
            return Date.now() < resetVidaaTweaksArmedUntil ? 'Confirm Reset VIDAA Tweaks' : 'Reset VIDAA Tweaks';
        };

        window.__triggerResetVidaaTweaks = function() {
            if (Date.now() < resetVidaaTweaksArmedUntil) {
                disarmResetVidaaTweaks();
                performResetVidaaTweaks();
                return true;
            }
            resetVidaaTweaksArmedUntil = Date.now() + 10000;
            if (resetVidaaTweaksTimer) clearTimeout(resetVidaaTweaksTimer);
            resetVidaaTweaksTimer = setTimeout(disarmResetVidaaTweaks, 10050);
            if (window.__showVidaaToast) {
                window.__showVidaaToast('Press again to confirm reset', 2200);
            }
            return false;
        };
        window.__resetVidaaTweaks = window.__triggerResetVidaaTweaks;

        window.addEventListener('hashchange', function() {
            refreshZoom('route-change');
        });

        setTimeout(function() {
            window.screen720p = false;
            setUiZoom(false);
            syncLegacyZoomKeys(get720pMode());

            // ?nozoom=1 URL param forces off
            var params = new URLSearchParams(window.location.search);
            if (params.get('nozoom') === '1') {
                set720pMode('off');
                console.log('[zoom] Zoom disabled via ?nozoom=1');
                return;
            }

            // Original auto-detect: Hisense firmware + 720p viewport
            try {
                if (Hisense_GetFirmWareVersion() && window.innerHeight === 720) {
                    window.screen720p = true;
                }
            } catch (e) {}

            refreshZoom('detect');
        }, 2000);
    })();
</script>
<script>
// #10 — Suppress F key crash
// Fullscreen API is meaningless on VIDAA (browser is always fullscreen).
// Pressing F (keyCode 70) triggers requestFullscreen() which crashes the VIDAA browser.
(function() {
    document.addEventListener('keydown', function(e) {
        if (e.keyCode === 70 || e.key === 'f' || e.key === 'F') {
            // Only suppress when not typing in an input field
            var tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
            if (tag === 'input' || tag === 'textarea') return;
            e.preventDefault();
            e.stopPropagation();
            console.log('[patch] Suppressed F key (fullscreen crash prevention)');
        }
    }, true); // capture phase to intercept before Stremio's handler
})();
</script>
<script>
// #6 — Exit button for VIDAA TV
// Exit logic — UI is now registered via the VIDAA settings tab system.
(function() {
    function exitApp() {

<script>
// #9 — Save and restore playback speed & volume
// Persists user's preferred playback rate and volume in localStorage.
// Restores them automatically when a new video starts playing.
(function() {
    var SPEED_KEY = 'stremio_playback_speed';
    var VOLUME_KEY = 'stremio_volume';
    var applied = false;
    var lastVideoSrc = '';

    function getSavedSpeed() {
        try { var v = parseFloat(localStorage.getItem(SPEED_KEY)); return (v && v > 0 && v <= 4) ? v : null; } catch(e) { return null; }
    }
    function getSavedVolume() {
        try { var v = parseFloat(localStorage.getItem(VOLUME_KEY)); return (v >= 0 && v <= 1) ? v : null; } catch(e) { return null; }
    }

    // Watch for video element and apply saved settings.
    // Save path is debounced by last-persisted cache to avoid the
    // synchronous localStorage writes the old code did on every 1.5s tick.
    var lastPersistedSpeed = null;
    var lastPersistedVol = null;
    setInterval(function() {
        var hash = window.location.hash || '';
        if (hash.indexOf('#/player/') !== 0) { applied = false; lastVideoSrc = ''; return; }
        // Quiet Player Mode — only the one-shot apply is allowed, no polling saves.
        if (window.__QUIET_PLAYER_ACTIVE__ && applied) return;

        var video = document.querySelector('video');
        if (!video) return;

        var src = video.currentSrc || video.src || '';
        if (src && src !== lastVideoSrc) {
            lastVideoSrc = src;
            applied = false;
            lastPersistedSpeed = null;
            lastPersistedVol = null;
        }

        if (!applied && video.readyState >= 1) {
            var savedSpeed = getSavedSpeed();
            if (savedSpeed !== null && video.playbackRate !== savedSpeed) {
                video.playbackRate = savedSpeed;
                console.log('[playback] Restored speed:', savedSpeed);
            }
            var savedVol = getSavedVolume();
            if (savedVol !== null && Math.abs(video.volume - savedVol) > 0.01) {
                video.volume = savedVol;
                console.log('[playback] Restored volume:', savedVol);
            }
            applied = true;
            lastPersistedSpeed = video.playbackRate;
            lastPersistedVol = video.volume;
        }

        // Continuously monitor for user changes and persist them — but only
        // write when the value actually changed vs what we last wrote, so we
        // don't do a synchronous localStorage.setItem on every tick.
        if (video.readyState >= 1) {
            if (window.__QUIET_PLAYER_ACTIVE__) return;
            var currentSpeed = video.playbackRate;
            var currentVol = video.volume;
            try {
                if (currentSpeed && currentSpeed > 0 && currentSpeed !== lastPersistedSpeed) {
                    localStorage.setItem(SPEED_KEY, String(currentSpeed));
                    lastPersistedSpeed = currentSpeed;
                }
                if (currentVol >= 0 && (lastPersistedVol === null || Math.abs(currentVol - lastPersistedVol) > 0.01)) {
                    localStorage.setItem(VOLUME_KEY, String(currentVol));
                    lastPersistedVol = currentVol;
                }
            } catch(e) {}
        }
    }, 1500);
})();
</script>

<script>
// #7 — Remember subtitle language preference
// Stores the user's selected subtitle language and auto-selects matching track
// when a new video starts.
(function() {
    var LANG_KEY = 'stremio_subtitle_lang';

    function getSavedLang() {
        try { return localStorage.getItem(LANG_KEY) || null; } catch(e) { return null; }
    }

    var lastPlayerHash = '';
    var appliedForHash = '';

    setInterval(function() {
        var hash = window.location.hash || '';
        if (hash.indexOf('#/player/') !== 0) { lastPlayerHash = ''; return; }

        if (hash !== lastPlayerHash) {
            lastPlayerHash = hash;
            appliedForHash = '';
        }

        if (!window.core || typeof window.core.getState !== 'function') return;

        // Skip the expensive getState WASM bridge call once we've already
        // auto-selected a language for this player session. Saves CPU during
        // playback — the main reason this poller was stealing cycles on
        // MediaTek VIDAA SoCs.
        if (appliedForHash === lastPlayerHash) return;
        // Quiet Player Mode — user opted out of background pollers during
        // playback because their stream was buffering.
        if (window.__QUIET_PLAYER_ACTIVE__) return;

        window.core.getState('player').then(function(state) {
            if (!state) return;

            // Detect current subtitle selection and save it
            var currentLang = null;
            try {
                if (state.selectedSubtitleTrack) {
                    currentLang = state.selectedSubtitleTrack.lang || state.selectedSubtitleTrack.language || null;
                }
                // Also check subtitleTracks for the active one
                if (!currentLang && state.subtitleTracks && Array.isArray(state.subtitleTracks)) {
                    for (var i = 0; i < state.subtitleTracks.length; i++) {
                        if (state.subtitleTracks[i].selected || state.subtitleTracks[i].active) {
                            currentLang = state.subtitleTracks[i].lang || state.subtitleTracks[i].language;
                            break;
                        }
                    }
                }
            } catch(e) {}

            if (currentLang) {
                try { localStorage.setItem(LANG_KEY, currentLang); } catch(e) {}
            }

            // Auto-select saved language on new video (only once per player session)
            if (appliedForHash === lastPlayerHash) return;
            var savedLang = getSavedLang();
            if (!savedLang) return;

            var tracks = null;
            try { tracks = state.subtitleTracks; } catch(e) {}
            if (!tracks || !Array.isArray(tracks) || tracks.length === 0) return;

            // Find matching track
            for (var j = 0; j < tracks.length; j++) {
                var tLang = tracks[j].lang || tracks[j].language || '';
                if (tLang.toLowerCase() === savedLang.toLowerCase()) {
                    appliedForHash = lastPlayerHash;
                    try {
                        window.core.dispatch({
                            action: 'Player',
                            args: { action: 'SetProp', args: { propName: 'selectedSubtitleTrackId', propValue: tracks[j].id } }
                        }, 'player');
                        console.log('[subs] Auto-selected subtitle language:', savedLang, 'track:', tracks[j].id);
                    } catch(e) { console.log('[subs] Failed to auto-select subtitle:', e.message); }
                    return;
                }
            }
            // Partial match (e.g. "en" matches "eng")
            for (var k = 0; k < tracks.length; k++) {
                var tLang2 = (tracks[k].lang || tracks[k].language || '').toLowerCase();
                if (tLang2.indexOf(savedLang.toLowerCase().substring(0, 2)) === 0) {
                    appliedForHash = lastPlayerHash;
                    try {
                        window.core.dispatch({
                            action: 'Player',
                            args: { action: 'SetProp', args: { propName: 'selectedSubtitleTrackId', propValue: tracks[k].id } }
                        }, 'player');
                        console.log('[subs] Auto-selected subtitle (partial match):', tLang2, 'track:', tracks[k].id);
                    } catch(e) {}
                    return;
                }
            }
        }).catch(function() {});
    }, 3000);
})();
</script>
<script>
// #11 — Subtitle off/unload option
// Stremio's subtitle picker doesn't include a "None/Off" option.
// This patch injects one into the subtitle picker DOM and wires it to disable subtitles.

            }, 'player');

        } catch(e) {

        }
        // Also try to remove subtitle display elements directly
        try {
            var subEls = document.querySelectorAll('[class*="subtitle"], [class*="Subtitle"]');
            for (var i = 0; i < subEls.length; i++) {
                if (subEls[i].style && subEls[i].textContent && subEls[i].offsetHeight < 200) {
                    // Likely a subtitle text overlay, not a menu
                }
            }
        } catch(e) {}
        // Clear saved language preference when user explicitly turns off subs
        try { localStorage.removeItem('stremio_subtitle_lang'); } catch(e) {}
    }
    window.__disableSubtitles = disableSubtitles;

    // Watch for subtitle picker menu and inject "Off" option

        if (menuItems.length === 0) return;

        offOption.textContent = 'Off';
        offOption.style.cssText = (offOption.style.cssText || '') + ';cursor:pointer;opacity:0.8;';
        offOption.setAttribute('tabindex', '0');
