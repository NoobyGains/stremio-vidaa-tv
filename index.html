        --nyx-glass-border: rgba(255,255,255,.08);
        --nyx-glass-blur: blur(12px) saturate(160%);

        /* Cards */

        /* Borders */
        --nyx-border-subtle: rgba(255,255,255,.06);
        --nyx-border-default: rgba(255,255,255,.1);
        --nyx-border-glass: rgba(255,255,255,.15);
        --nyx-border-strong: rgba(255,255,255,.2);

        /* Text */
        --nyx-text-primary: #ffffff;
        --nyx-text-secondary: #c9d1d9;
        --nyx-text-muted: #8b949e;
        --nyx-text-disabled: rgba(255,255,255,.3);
        --nyx-text-icon: rgba(255,255,255,.4);

        /* Accent — using Stremio purple */
        --nyx-accent: #7b5bf5;
        --nyx-accent-hover: #6a4de0;
        --nyx-accent-subtle: rgba(123,91,245,.15);
        --nyx-accent-glow: 0 0 20px rgba(123,91,245,.4);

        --nyx-violet: #4a4ad0;
        --nyx-violet-subtle: rgba(74,74,208,.06);

        --nyx-error: #ef4444;

        --nyx-text-sm: .8125rem;
        --nyx-text-md: .875rem;
        --nyx-text-base: 1rem;
        --nyx-text-lg: 1.125rem;
        --nyx-text-xl: 1.25rem;
        --nyx-text-2xl: 1.75rem;
        --nyx-text-3xl: 2.25rem;
        --nyx-text-4xl: 2.5rem;
        --nyx-text-5xl: 3.5rem;
        --nyx-leading-tight: 1.2;
        --nyx-leading-normal: 1.5;
        --nyx-leading-relaxed: 1.6;

        --nyx-sp-1: .25rem;
        --nyx-sp-2: .5rem;
        --nyx-sp-3: .75rem;
        --nyx-sp-4: 1rem;
        --nyx-sp-5: 1.25rem;
        --nyx-sp-6: 1.5rem;
        --nyx-sp-8: 2rem;
        --nyx-sp-10: 2.5rem;
        --nyx-sp-12: 3rem;
        --nyx-sp-16: 4rem;

        --nyx-radius-sm: .25rem;
        --nyx-radius-md: .5rem;
        --nyx-radius-lg: .75rem;
        --nyx-radius-xl: 1rem;

        --nyx-duration-slow: .4s;

                var origGet = desc.get;
                var guard = false;

                    get: origGet,

(function() {
    var serverUrl = window.__STREMIO_SERVER_URL__;
    if (!serverUrl || serverUrl === 'http://127.0.0.1:11470') return;

    var attempts = 0;
    var interval = setInterval(function() {
        if (++attempts > 60) { clearInterval(interval); return; }
        if (!window.core) return;
        clearInterval(interval);

        window.core.getState('ctx').then(function(ctxState) {
            if (!ctxState || !ctxState.profile || !ctxState.profile.settings) return;
            var currentSettings = ctxState.profile.settings;
            if (currentSettings.streamingServerUrl === serverUrl) {
                console.log('[server-sync] URL already correct');
                return;
            }
            console.log('[server-sync] Syncing URL to WASM core:', serverUrl);
            var newSettings = {};
            for (var k in currentSettings) newSettings[k] = currentSettings[k];
            newSettings.streamingServerUrl = serverUrl;
            window.core.dispatch({ action: 'Ctx', args: { action: 'UpdateSettings', args: newSettings } }, 'ctx').then(function() {
                console.log('[server-sync] Settings updated, reloading streaming server');
                return window.core.dispatch({ action: 'StreamingServer', args: { action: 'Reload' } }, 'streaming_server');
            }).then(function() {
                console.log('[server-sync] Streaming server reloaded successfully');

(function() {

    function createIndicator() {
        if (indicator) return indicator;
        indicator = document.createElement('div');
        indicator.id = 'quality-indicator';
        indicator.style.cssText = 'position:fixed;top:14px;right:14px;background:rgba(0,0,0,0.75);color:white;padding:5px 12px;border-radius:6px;font-size:13px;z-index:99998;pointer-events:none;font-family:monospace;display:none;backdrop-filter:blur(4px);';
        document.body.appendChild(indicator);
        return indicator;
    }

    function showIndicator() {
        if (!indicator) return;
        indicator.style.display = 'block';
        indicator.style.opacity = '1';
        clearTimeout(hideTimer);
        hideTimer = setTimeout(function() {
            if (indicator) { indicator.style.transition = 'opacity 0.5s'; indicator.style.opacity = '0'; }
        }, 5000);
    }

    document.addEventListener('keydown', function() {
        if ((window.location.hash || '').indexOf('#/player/') === 0 && indicator) {
            indicator.style.transition = 'none';

    setInterval(function() {
        var hash = window.location.hash || '';
        if (hash.indexOf('#/player/') !== 0) {
            if (indicator) indicator.style.display = 'none';
            return;
        }
        if (!indicator) createIndicator();
        var video = document.querySelector('video');
        if (!video || !video.videoWidth) return;

        var el = indicator;
        var w = video.videoWidth, h = video.videoHeight;
        var label;
        if (w >= 3840) label = '4K';
        else if (w >= 2560) label = '1440p';
        else if (w >= 1920) label = '1080p';
        else if (w >= 1280) label = '720p';
        else if (w >= 854) label = '480p';

            if (window.__VIDAA_STATE__.dolbyVision) label += ' DV';

                label += ' ' + window.__STREAM_INFO__.videoCodec;

(function() {
    var hasNative = false;
    try { hasNative = typeof omi_platform !== 'undefined' && typeof omi_platform.sendPlatformMessage === 'function'; } catch(e) {}
    if (!hasNative) return;

    window.__launchNativePlayer = function(url) {

            var video = document.querySelector('video');
            url = video ? video.currentSrc || video.src : null;
        }
        if (!url) { console.log('[native] No stream URL found'); return false; }

        console.log('[native] Launching native player with:', url.substring(0, 100));

        // Try multiple message types — different VIDAA versions respond to different ones
        var messages = [
            {type: 'launchNativePlayer', url: url, title: 'Stremio', mimeType: 'video/mp4'},
            {type: 'openMediaPlayer', url: url, title: 'Stremio'},
            {type: 'playVideo', url: url, mimeType: 'video/mp4', title: 'Stremio'}
        ];

        for (var i = 0; i < messages.length; i++) {
            try {
                omi_platform.sendPlatformMessage(JSON.stringify(messages[i]));
                console.log('[native] Sent:', messages[i].type);
            } catch(e) {
                console.log('[native] Failed:', messages[i].type, e.message);
            }
        }
        return true;

    // Yellow button (405) — launch native player with current stream
    document.addEventListener('keydown', function(e) {

<script>
// Server health monitoring
(function() {
    window.__SERVER_HEALTH__ = { status: 'unknown', latency: null, version: null };

    function makeTimeoutSignal(ms) {
        try {
            if (typeof AbortController !== 'undefined') {
                var ctrl = new AbortController();
                setTimeout(function() { ctrl.abort(); }, ms);
                return ctrl.signal;
            }
        } catch(e) {}
        return undefined;
    }

    function checkHealth() {
        if ((window.location.hash || '').indexOf('#/player/') === 0) return;
        var url = window.__STREMIO_SERVER_URL__;
        if (!url) return;
        var signal = makeTimeoutSignal(5000);
        var start = Date.now();
        fetch(url + '/settings', { signal: signal }).then(function(r) {
            return r.json();
        }).then(function(data) {
            window.__SERVER_HEALTH__ = {
                status: 'online',
                latency: Date.now() - start,
                version: data.serverVersion || data.version || null
            };
        }).catch(function() {
            var start2 = Date.now();
            fetch(url + '/heartbeat', { signal: makeTimeoutSignal(5000) }).then(function() {
                window.__SERVER_HEALTH__ = { status: 'online', latency: Date.now() - start2, version: null };
            }).catch(function() {
                window.__SERVER_HEALTH__ = { status: 'offline', latency: null, version: null };
            });
        });
    }

    setInterval(checkHealth, 10000);
    setTimeout(checkHealth, 3000);
})();

                var imgs = added[j].querySelectorAll ? added[j].querySelectorAll('img:not([loading])') : [];
                for (var k = 0; k < imgs.length; k++) {
                    imgs[k].setAttribute('loading', 'lazy');
                }
                if (added[j].tagName === 'IMG' && !added[j].getAttribute('loading')) {
                    added[j].setAttribute('loading', 'lazy');
                }
            }
        }
    });
    observer.observe(document.body, { childList: true, subtree: true });
})();
</script>
<script>
// Channel Up/Down quick seek (60s forward/back)
(function() {
    document.addEventListener('keydown', function(e) {
        var code = e.keyCode;

        // Channel Up (427) — skip forward 60s
        if (code === 427) {
            var vid = document.querySelector('video');
            if (vid && (window.location.hash || '').indexOf('#/player/') === 0) {
                vid.currentTime = Math.min(vid.currentTime + 60, vid.duration || Infinity);
                var toast = document.createElement('div');
                toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:white;padding:12px 24px;border-radius:8px;font-size:1.5rem;font-family:PlusJakartaSans,sans-serif;z-index:100000;pointer-events:none;';
                toast.textContent = '+60s';
                document.body.appendChild(toast);
                setTimeout(function() { toast.remove(); }, 1500);
            }
        }

        // Channel Down (428) — skip back 60s
        if (code === 428) {
            var vid2 = document.querySelector('video');
            if (vid2 && (window.location.hash || '').indexOf('#/player/') === 0) {
                vid2.currentTime = Math.max(vid2.currentTime - 60, 0);
                var toast2 = document.createElement('div');
                toast2.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:white;padding:12px 24px;border-radius:8px;font-size:1.5rem;font-family:PlusJakartaSans,sans-serif;z-index:100000;pointer-events:none;';
                toast2.textContent = '-60s';
                document.body.appendChild(toast2);
                setTimeout(function() { toast2.remove(); }, 1500);
            }
        }
    });
})();
</script>
<script>
// Hero Carousel + Trending Row for Home Page
(function() {
    var CINEMETA_URL = 'https://v3-cinemeta.strem.io/catalog/movie/top.json';
    var HERO_COUNT = 5;
    var ROTATE_MS = 8000;
    var heroIndex = 0;
    var heroTimer = null;
    var lastRoute = '';

    function fetchHeroData(cb) {
        if (window.__HERO_DATA__) { cb(window.__HERO_DATA__); return; }
        fetch(CINEMETA_URL).then(function(r) { return r.json(); }).then(function(data) {
            var metas = (data && data.metas) ? data.metas : [];
            if (metas.length) window.__HERO_DATA__ = metas;
            cb(metas);
        }).catch(function(e) {
            console.error('[hero] Fetch failed:', e);
            cb([]);
        });
    }

    function truncate(str, max) {
        if (!str) return '';
        if (str.length <= max) return str;
        return str.substring(0, max) + '...';
    }

    function buildHero(metas) {
        var items = metas.slice(0, HERO_COUNT);
        if (!items.length) return null;

        var wrap = document.createElement('div');
        wrap.id = 'stremio-hero';
        wrap.style.cssText = 'position:relative;width:100%;height:55vh;overflow:hidden;margin-bottom:0.5rem;flex-shrink:0;';

        // Slides container
        var slides = document.createElement('div');
        slides.id = 'hero-slides';
        slides.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;';

        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var slide = document.createElement('div');
            slide.className = 'hero-slide';
            slide.setAttribute('data-index', String(i));
            slide.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;opacity:' + (i === 0 ? '1' : '0') + ';transition:opacity 0.8s ease;';

            // Background image
            var bg = document.createElement('div');
            bg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background-image:url(' + esc(item.background || item.poster || '') + ');background-size:cover;background-position:center top;';
            slide.appendChild(bg);

            // Gradient overlay
            var grad = document.createElement('div');
            grad.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to top, #0c0c10 0%, rgba(12,12,16,0.7) 40%, transparent 70%);';
            slide.appendChild(grad);

            // Side gradient for readability
            var sideGrad = document.createElement('div');
            sideGrad.style.cssText = 'position:absolute;top:0;left:0;width:60%;height:100%;background:linear-gradient(to right, rgba(12,12,16,0.8) 0%, transparent 100%);';
            slide.appendChild(sideGrad);

            // Content
            var content = document.createElement('div');
            content.style.cssText = 'position:absolute;bottom:4rem;left:4rem;right:40%;z-index:2;';

            // Metadata pills
            var pills = document.createElement('div');
            pills.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:0.8rem;flex-wrap:wrap;';
            if (item.year) {
                var yearPill = document.createElement('span');
                yearPill.style.cssText = 'background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);padding:4px 10px;border-radius:4px;font-size:0.85rem;font-family:PlusJakartaSans,sans-serif;';
                yearPill.textContent = String(item.year);
                pills.appendChild(yearPill);
            }
            if (item.imdbRating) {
                var ratingPill = document.createElement('span');
                ratingPill.style.cssText = 'background:rgba(255,255,255,0.12);color:#fbbf24;padding:4px 10px;border-radius:4px;font-size:0.85rem;font-family:PlusJakartaSans,sans-serif;font-weight:600;';
                ratingPill.textContent = '\u2605 ' + item.imdbRating;
                pills.appendChild(ratingPill);
            }
            if (item.genres && item.genres.length) {
                var genreCount = Math.min(item.genres.length, 3);
                for (var g = 0; g < genreCount; g++) {
                    var gPill = document.createElement('span');
                    gPill.style.cssText = 'background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.65);padding:4px 10px;border-radius:4px;font-size:0.85rem;font-family:PlusJakartaSans,sans-serif;';
                    gPill.textContent = item.genres[g];
                    pills.appendChild(gPill);
                }
            }
            content.appendChild(pills);

            // Title
            var title = document.createElement('div');
            title.style.cssText = 'font-size:2.5rem;font-weight:700;color:white;margin-bottom:0.6rem;font-family:PlusJakartaSans,sans-serif;text-shadow:0 2px 8px rgba(0,0,0,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
            title.textContent = item.name || '';
            content.appendChild(title);

            // Description
            var desc = document.createElement('div');
            desc.style.cssText = 'font-size:1rem;color:rgba(255,255,255,0.6);font-family:PlusJakartaSans,sans-serif;line-height:1.5;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden;margin-bottom:1.2rem;max-width:500px;';
            desc.textContent = truncate(item.description || '', 200);
            content.appendChild(desc);

            // Buttons
            var btnRow = document.createElement('div');
            btnRow.style.cssText = 'display:flex;gap:12px;';

            var watchBtn = document.createElement('button');
            watchBtn.setAttribute('tabindex', '0');
            watchBtn.setAttribute('data-hero-btn', 'watch');
            watchBtn.setAttribute('data-type', item.type || 'movie');
            watchBtn.setAttribute('data-id', item.id || '');
            watchBtn.style.cssText = 'background:#7b5bf5;color:white;border:none;padding:10px 28px;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;font-family:PlusJakartaSans,sans-serif;transition:background 0.2s;';
            watchBtn.textContent = 'Watch';
            watchBtn.onfocus = function() { this.style.background = '#6d4de0'; this.style.outline = '3px solid #a78bfa'; this.style.outlineOffset = '2px'; };
            watchBtn.onblur = function() { this.style.background = '#7b5bf5'; this.style.outline = 'none'; };
            watchBtn.onclick = function() {
                var t = this.getAttribute('data-type');
                var id = this.getAttribute('data-id');
                window.location.hash = '#/detail/' + t + '/' + id;
            };
            btnRow.appendChild(watchBtn);

            var detailBtn = document.createElement('button');
            detailBtn.setAttribute('tabindex', '0');
            detailBtn.setAttribute('data-hero-btn', 'details');
            detailBtn.setAttribute('data-type', item.type || 'movie');
            detailBtn.setAttribute('data-id', item.id || '');
            detailBtn.style.cssText = 'background:transparent;color:white;border:1px solid rgba(255,255,255,0.3);padding:10px 28px;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;font-family:PlusJakartaSans,sans-serif;transition:background 0.2s;';
            detailBtn.textContent = 'Details';
            detailBtn.onfocus = function() { this.style.background = 'rgba(255,255,255,0.1)'; this.style.outline = '3px solid #a78bfa'; this.style.outlineOffset = '2px'; };
            detailBtn.onblur = function() { this.style.background = 'transparent'; this.style.outline = 'none'; };
            detailBtn.onclick = function() {
                var t = this.getAttribute('data-type');
                var id = this.getAttribute('data-id');
                window.location.hash = '#/detail/' + t + '/' + id;
            };
            btnRow.appendChild(detailBtn);

            content.appendChild(btnRow);
            slide.appendChild(content);
            slides.appendChild(slide);
        }

        wrap.appendChild(slides);

        // Pagination dots
        var dotsWrap = document.createElement('div');
        dotsWrap.id = 'hero-dots';
        dotsWrap.style.cssText = 'position:absolute;bottom:1.2rem;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:3;';
        for (var d = 0; d < items.length; d++) {
            var dot = document.createElement('button');
            dot.className = 'hero-dot';
            dot.setAttribute('data-dot', String(d));
            dot.setAttribute('tabindex', '-1');
            dot.style.cssText = 'width:10px;height:10px;border-radius:50%;border:none;cursor:pointer;padding:0;transition:background 0.3s,transform 0.3s;' + (d === 0 ? 'background:white;transform:scale(1.2);' : 'background:rgba(255,255,255,0.3);transform:scale(1);');
            dot.onfocus = function() { this.style.outline = '2px solid #a78bfa'; };
            dot.onblur = function() { this.style.outline = 'none'; };
            (function(idx) {
                dot.onclick = function() { goToSlide(idx); };
            })(d);
            dotsWrap.appendChild(dot);
        }
        wrap.appendChild(dotsWrap);

        return wrap;
    }

    function goToSlide(idx) {
        var slides = document.querySelectorAll('.hero-slide');
        if (!slides.length) return;
        heroIndex = idx % slides.length;
        for (var i = 0; i < slides.length; i++) {
            slides[i].style.opacity = i === heroIndex ? '1' : '0';
        }
        var dots = document.querySelectorAll('.hero-dot');
        for (var j = 0; j < dots.length; j++) {
            dots[j].style.background = j === heroIndex ? 'white' : 'rgba(255,255,255,0.3)';
            dots[j].style.transform = j === heroIndex ? 'scale(1.2)' : 'scale(1)';
        }
        resetTimer();
    }

    function nextSlide() {
        var slides = document.querySelectorAll('.hero-slide');
        if (!slides.length) return;
        goToSlide(heroIndex + 1);
    }

    function resetTimer() {
        if (heroTimer) clearInterval(heroTimer);
        heroTimer = setInterval(nextSlide, ROTATE_MS);
    }

    function buildTrendingRow(metas) {
        var items = metas.slice(0, 20);
        if (!items.length) return null;

        var section = document.createElement('div');
        section.id = 'stremio-trending';
        section.style.cssText = 'padding:0 4rem 1.5rem 4rem;flex-shrink:0;';

        var heading = document.createElement('div');
        heading.style.cssText = 'font-size:1.3rem;font-weight:700;color:white;margin-bottom:0.8rem;font-family:PlusJakartaSans,sans-serif;';
        heading.textContent = 'Trending Now';
        section.appendChild(heading);

        var scrollWrap = document.createElement('div');
        scrollWrap.id = 'trending-scroll';
        scrollWrap.style.cssText = 'display:flex;gap:12px;overflow-x:auto;overflow-y:hidden;scroll-behavior:smooth;padding-bottom:8px;-webkit-overflow-scrolling:touch;';
        scrollWrap.style.scrollbarWidth = 'none';

        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var card = document.createElement('div');
            card.setAttribute('tabindex', '0');
            card.setAttribute('data-trending-id', item.id || '');
            card.setAttribute('data-trending-type', item.type || 'movie');
            card.className = 'trending-card';
            card.style.cssText = 'flex:0 0 auto;width:160px;cursor:pointer;transition:transform 0.2s;position:relative;';

            // Poster
            var poster = document.createElement('img');
            poster.setAttribute('loading', 'lazy');
            poster.src = item.poster || '';
            poster.alt = item.name || '';
            poster.style.cssText = 'width:160px;height:240px;object-fit:cover;border-radius:6px;display:block;background:#1a1a2e;';
            card.appendChild(poster);

            // Rating badge
            if (item.imdbRating) {
                var badge = document.createElement('div');
                badge.style.cssText = 'position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.75);color:#fbbf24;padding:2px 6px;border-radius:4px;font-size:0.75rem;font-weight:600;font-family:PlusJakartaSans,sans-serif;backdrop-filter:blur(4px);';
                badge.textContent = '\u2605 ' + item.imdbRating;
                card.appendChild(badge);
            }

            // Title
            var cardTitle = document.createElement('div');
            cardTitle.style.cssText = 'font-size:0.85rem;color:rgba(255,255,255,0.8);margin-top:6px;font-family:PlusJakartaSans,sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:160px;';
            cardTitle.textContent = item.name || '';
            card.appendChild(cardTitle);

            card.onfocus = function() { this.style.transform = 'scale(1.08)'; this.style.outline = '2px solid #7b5bf5'; this.style.outlineOffset = '2px'; this.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' }); };
            card.onblur = function() { this.style.transform = 'scale(1)'; this.style.outline = 'none'; };
            card.onclick = function() {
                var t = this.getAttribute('data-trending-type');
                var id = this.getAttribute('data-trending-id');
                window.location.hash = '#/detail/' + t + '/' + id;
            };
            card.onkeydown = function(e) {
                if (e.keyCode === 13 || e.keyCode === 32) { this.click(); e.preventDefault(); }
            };

            scrollWrap.appendChild(card);
        }

        section.appendChild(scrollWrap);

        // D-pad left/right scrolling for trending row
        scrollWrap.addEventListener('keydown', function(e) {
            if (e.keyCode === 39) { // Right
                var focused = document.activeElement;
                if (focused && focused.nextElementSibling && focused.nextElementSibling.classList.contains('trending-card')) {
                    focused.nextElementSibling.focus();
                    e.preventDefault();
                    e.stopPropagation();
                }
            } else if (e.keyCode === 37) { // Left
                var focused2 = document.activeElement;
                if (focused2 && focused2.previousElementSibling && focused2.previousElementSibling.classList.contains('trending-card')) {
                    focused2.previousElementSibling.focus();
                    e.preventDefault();
                    e.stopPropagation();
                }
            }
        });

        return section;
    }

    function injectHome() {
        if (document.getElementById('stremio-hero')) return;

        // Find the home page container
        var homeEl = document.querySelector('.home-qPkGc');
        if (!homeEl) return;

        var contentEl = homeEl.querySelector('.content-BPvBy');
        if (!contentEl) return;

        fetchHeroData(function(metas) {
            if (!metas.length) return;
            if (document.getElementById('stremio-hero')) return;

            var hero = buildHero(metas);
            if (hero) {
                contentEl.insertBefore(hero, contentEl.firstChild);
                resetTimer();
            }

            var trending = buildTrendingRow(metas);
            if (trending) {
                var heroEl = document.getElementById('stremio-hero');
                if (heroEl && heroEl.nextSibling) {
                    contentEl.insertBefore(trending, heroEl.nextSibling);
                } else {
                    contentEl.appendChild(trending);
                }
            }
        });
    }

    function cleanup() {
        var hero = document.getElementById('stremio-hero');
        if (hero) hero.remove();
        var trending = document.getElementById('stremio-trending');
        if (trending) trending.remove();
        if (heroTimer) { clearInterval(heroTimer); heroTimer = null; }
    }

    // Route watcher
    setInterval(function() {
        var hash = window.location.hash || '';
        var isHome = hash === '' || hash === '#/' || hash === '#/home' || hash.indexOf('#/board') === 0;
        if (isHome && lastRoute !== 'home') {
            lastRoute = 'home';
            // Slight delay for DOM to render
            setTimeout(injectHome, 500);
        } else if (isHome) {
            // Re-check if elements got removed by framework re-render
            if (!document.getElementById('stremio-hero')) {
                setTimeout(injectHome, 300);
            }
        } else {
            if (lastRoute === 'home') {
                cleanup();
            }
            lastRoute = 'other';
        }
    }, 800);
})();
</script>
<script>
// Enhanced Details Page — Metadata Pills
(function() {
    var lastDetailHash = '';
    var injectedPills = false;

    function buildPills(meta) {
        var container = document.createElement('div');
        container.id = 'stremio-detail-pills';
        container.style.cssText = 'display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0.3rem 0 0.5rem 0;';

        // Type pill
        if (meta.type) {
            var typePill = document.createElement('span');
            typePill.style.cssText = 'background:rgba(123,91,245,0.25);color:#a78bfa;padding:4px 12px;border-radius:20px;font-size:0.85rem;font-family:PlusJakartaSans,sans-serif;font-weight:600;';
            typePill.textContent = meta.type === 'movie' ? 'Movie' : meta.type === 'series' ? 'Series' : meta.type;
            container.appendChild(typePill);
        }

        // Year pill
        if (meta.year) {
            var yearPill = document.createElement('span');
            yearPill.style.cssText = 'background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.75);padding:4px 12px;border-radius:20px;font-size:0.85rem;font-family:PlusJakartaSans,sans-serif;';
            yearPill.textContent = String(meta.year);
            container.appendChild(yearPill);
        }

        // Runtime pill
        if (meta.runtime) {
            var rtPill = document.createElement('span');
            rtPill.style.cssText = 'background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.75);padding:4px 12px;border-radius:20px;font-size:0.85rem;font-family:PlusJakartaSans,sans-serif;';
            rtPill.textContent = meta.runtime;
            container.appendChild(rtPill);
        }

        // Rating pill
        if (meta.imdbRating) {
            var rPill = document.createElement('span');
            rPill.style.cssText = 'background:rgba(251,191,36,0.15);color:#fbbf24;padding:4px 12px;border-radius:20px;font-size:0.85rem;font-family:PlusJakartaSans,sans-serif;font-weight:600;';
            rPill.textContent = '\u2605 ' + meta.imdbRating;
            container.appendChild(rPill);
        }

        // Genre pills
        if (meta.genres && meta.genres.length) {
            var genreCount = Math.min(meta.genres.length, 4);
            for (var i = 0; i < genreCount; i++) {
                var gPill = document.createElement('span');
                gPill.style.cssText = 'background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.55);padding:4px 12px;border-radius:20px;font-size:0.85rem;font-family:PlusJakartaSans,sans-serif;';
                gPill.textContent = meta.genres[i];
                container.appendChild(gPill);
            }
        }

        return container;
    }

    function injectDetailPills() {
        if (document.getElementById('stremio-detail-pills')) return;

        var detailEl = document.querySelector('.details-omgjE');
        if (!detailEl) return;

        var infoEl = detailEl.querySelector('.info-c3Gsa');
        if (!infoEl) return;

        var titleEl = infoEl.querySelector('.title-OL31B');
        var descEl = infoEl.querySelector('.description-Vy9xR');
        if (!titleEl) return;

        // Extract meta ID from hash
        var hash = window.location.hash || '';
        var parts = hash.replace('#/detail/', '').split('/');
        if (parts.length < 2) return;
        var type = parts[0];
        var metaId = parts[1];

        // Fetch meta from Cinemeta (cached)
        var cacheKey = type + '/' + metaId;
        if (window.__META_CACHE__[cacheKey]) {
            var cached = window.__META_CACHE__[cacheKey];
            if (!document.getElementById('stremio-detail-pills')) {
                var cp = buildPills(cached);
                if (cp) { var te = document.querySelector('.title-OL31B'); if (te && te.parentNode) te.parentNode.insertBefore(cp, te.nextSibling); }
            }
            return;
        }
        var apiUrl = 'https://v3-cinemeta.strem.io/meta/' + encodeURIComponent(type) + '/' + encodeURIComponent(metaId) + '.json';
        fetch(apiUrl).then(function(r) { return r.json(); }).then(function(data) {
            if (data && data.meta) window.__META_CACHE__[cacheKey] = data.meta;
            if (!data || !data.meta) return;
            if (document.getElementById('stremio-detail-pills')) return;

            var pills = buildPills(data.meta);
            // Insert after title, before description
            if (descEl) {
                infoEl.insertBefore(pills, descEl);
            } else {
                if (titleEl.parentNode) titleEl.parentNode.insertBefore(pills, titleEl.nextSibling);
            }
            injectedPills = true;
        }).catch(function(e) {
            console.error('[detail-pills] Fetch failed:', e);
        });
    }

    function cleanupPills() {
        var pills = document.getElementById('stremio-detail-pills');
        if (pills) pills.remove();
        injectedPills = false;
    }

    setInterval(function() {
        var hash = window.location.hash || '';
        var isDetail = hash.indexOf('#/detail/') === 0;
        if (isDetail) {
            if (hash !== lastDetailHash) {
                cleanupPills();
                lastDetailHash = hash;
                setTimeout(injectDetailPills, 600);
            } else if (!injectedPills && !document.getElementById('stremio-detail-pills')) {
                setTimeout(injectDetailPills, 400);
            }
        } else {
            if (lastDetailHash) {
                cleanupPills();
                lastDetailHash = '';
            }
        }
    }, 800);
})();
</script>
